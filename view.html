<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laudo Interativo</title>
    <style>
        :root { --bg-color: #000; --panel-bg: #151515; --text-color: #eee; --accent: #007bff; }
        body { margin: 0; padding: 0; background: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; overflow: hidden; }

        #viewer-area { flex: 1; position: relative; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; }
        canvas { display: block; }

        #sidebar { 
            width: 350px; background: var(--panel-bg); display: flex; flex-direction: column; 
            border-left: 1px solid #333; z-index: 20; box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }

        #header { padding: 12px; background: #1f1f1f; text-align: center; border-bottom: 1px solid #333; flex-shrink: 0; }
        #header h2 { margin: 0; color: var(--accent); font-size: 18px; }

        .instruction-box {
            background: #252525; color: #aaa; font-size: 12px; padding: 10px;
            text-align: center; border-bottom: 1px solid #333; flex-shrink: 0;
        }

        #findings-list { flex: 1; overflow-y: auto; padding: 15px; }
        
        .finding-item { 
            background: #2a2a2a; margin-bottom: 10px; padding: 12px; border-radius: 6px; 
            cursor: pointer; border-left: 5px solid transparent; transition: all 0.2s;
            font-size: 14px; line-height: 1.4; color: #ccc;
        }
        .finding-item:hover { background: #333; color: #fff; transform: translateX(2px); }
        .finding-item.active { background: #383838; color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.1); }

        #controls { padding: 15px; border-top: 1px solid #333; background: #1f1f1f; display: flex; gap: 10px; flex-direction: column; flex-shrink: 0; }
        .btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        /* Área da Assinatura Fixa */
        #signature-area { 
            padding: 15px; text-align: center; border-top: 1px solid #333; 
            background: #151515; flex-shrink: 0; display: flex; justify-content: center;
        }
        #signature-img { 
            max-width: 160px; height: auto; 
            filter: brightness(0) invert(1); opacity: 0.9; /* Garante visibilidade no fundo escuro */
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            #viewer-area { height: 55%; width: 100%; order: 1; }
            
            #sidebar { 
                height: 45%; width: 100%; order: 2; border-left: none; border-top: 2px solid var(--accent);
                display: flex; flex-direction: column;
            }

            #header, .instruction-box { display: block; padding: 8px; font-size: 12px; }
            
            #findings-list { 
                display: flex; flex-direction: row; overflow-x: auto; 
                padding: 10px; gap: 10px; align-items: center; 
            }
            .finding-item {
                flex: 0 0 85%; width: 85%; margin: 0; 
                border-left: none; border-bottom: 4px solid transparent;
                background: #252525; font-size: 13px;
            }

            #controls { display: none; } 
            
            #signature-area { padding: 8px; }
            #signature-img { max-width: 120px; }
        }
    </style>
</head>
<body>

<div id="viewer-area">
    <canvas id="canvas"></canvas>
</div>

<div id="sidebar">
    <div id="header"><h2>Achados Radiográficos</h2></div>
    <div class="instruction-box">Clique nos achados abaixo para destacar na imagem.</div>
    <div id="findings-list">Carregando...</div>
    <div id="controls">
        <button id="btn-toggle-all" class="btn">👁️ Ver Todos</button>
        <button id="btn-reset-zoom" class="btn secondary" onclick="location.reload()">⟲ Resetar</button>
    </div>
    <div id="signature-area">
        <!-- O src será preenchido via JS, ou fallback para assinatura.png -->
        <img id="signature-img" src="assinatura.png" alt="Assinatura" onerror="this.style.display='none'">
    </div>
</div>

<script>
    let DATA = null;
    try {
        const hash = window.location.hash.substring(1);
        if (hash) {
            const json = decodeURIComponent(escape(atob(hash)));
            DATA = JSON.parse(json);
        }
    } catch(e) { console.error(e); }

    if (!DATA) {
        document.getElementById('findings-list').innerHTML = "<p style='text-align:center; color:red; padding:20px;'>Erro ao carregar dados.</p>";
    } else {
        const listEl = document.getElementById('findings-list');
        listEl.innerHTML = DATA.findingsHtml || "<p style='padding:10px;'>Nenhum achado interativo.</p>";

        // LÓGICA DA ASSINATURA CORRIGIDA
        // Se vier no JSON, usa. Se não, usa o padrão do HTML (assinatura.png)
        if (DATA.signature) {
            document.getElementById('signature-img').src = DATA.signature;
        }

        const items = listEl.querySelectorAll('p[data-highlight-color]');
        items.forEach(p => {
            p.classList.add('finding-item');
            const color = p.dataset.highlightColor;
            if(window.innerWidth > 768) p.style.borderLeftColor = color; 
            else p.style.borderBottomColor = color;
        });

        const viewer = document.getElementById('viewer-area');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let img = new Image();
        let scale = 1, panX = 0, panY = 0;
        let isDragging = false, startX, startY;
        let activeAnnotationId = null; 
        let showAll = false;
        let drawingScale = 1; 

        img.onload = () => {
            resize();
            drawingScale = img.naturalWidth / 1200; 
            fitImage();
            render();
        };
        img.src = DATA.image;

        window.addEventListener('resize', () => { resize(); fitImage(); render(); });

        function resize() { canvas.width = viewer.clientWidth; canvas.height = viewer.clientHeight; }
        function fitImage() {
            const rW = canvas.width / img.naturalWidth;
            const rH = canvas.height / img.naturalHeight;
            scale = Math.min(rW, rH); 
            panX = (canvas.width - img.naturalWidth * scale) / 2;
            panY = (canvas.height - img.naturalHeight * scale) / 2;
        }

        function render() {
            ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.setTransform(scale, 0, 0, scale, panX, panY); ctx.drawImage(img, 0, 0);
            if (showAll) { DATA.annotations.forEach(anno => drawAnnotation(anno, false)); } 
            else if (activeAnnotationId) { const anno = DATA.annotations.find(a => a.id === activeAnnotationId); if (anno) drawAnnotation(anno, true); }
        }

        function drawAnnotation(anno, isActive) {
            const el = document.querySelector(`p[data-annotation-id="${anno.id}"]`);
            const color = el ? el.dataset.highlightColor : (anno.color || '#00FFFF');
            const labelText = el ? el.innerText.replace(/\n/g, ' ').substring(0, 40) : 'Achado';

            ctx.save();
            ctx.strokeStyle = color; ctx.fillStyle = color;
            ctx.lineJoin = 'round'; ctx.lineCap = 'round';
            ctx.shadowColor = 'black'; ctx.shadowBlur = 5 * drawingScale;
            const baseWidth = (anno.thickness || 4) * drawingScale;
            ctx.lineWidth = isActive ? baseWidth * 1.5 : baseWidth;

            let labelPos = { x: 0, y: 0 };

            if (anno.points && anno.fillColor) { 
                ctx.beginPath();
                anno.points.forEach((p, i) => { const x=p.x*img.naturalWidth, y=p.y*img.naturalHeight; i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); if(i===0) labelPos={x,y}; });
                ctx.closePath(); ctx.stroke(); ctx.globalAlpha = 0.25; ctx.fill(); ctx.globalAlpha = 1;
            } else if (anno.start && anno.end) { 
                const p1={x:anno.start.x*img.naturalWidth, y:anno.start.y*img.naturalHeight};
                const p2={x:anno.end.x*img.naturalWidth, y:anno.end.y*img.naturalHeight};
                ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke(); labelPos=p1;
                const fs = 20*drawingScale; ctx.font = `bold ${fs}px Arial`; ctx.textAlign='center'; 
                ctx.shadowBlur=0; ctx.lineWidth=3; ctx.strokeStyle='black';
                const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2; ctx.strokeText(anno.text,mx,my-10); ctx.fillText(anno.text,mx,my-10);
            } else if (anno.type && anno.size) { 
                const x=anno.x*img.naturalWidth, y=anno.y*img.naturalHeight; labelPos={x,y};
                const s=anno.size*img.naturalWidth; ctx.translate(x,y); ctx.rotate(anno.rotation); ctx.scale(anno.scale, anno.scale);
                ctx.beginPath(); ctx.moveTo(-s/2,0); ctx.lineTo(s/2,0); ctx.lineTo(s/2-s*0.3, -s*0.2); ctx.moveTo(s/2,0); ctx.lineTo(s/2-s*0.3, s*0.2); ctx.stroke();
            } else if (anno.text) { 
                const x=anno.x*img.naturalWidth, y=anno.y*img.naturalHeight; labelPos={x,y};
                const fs=(parseInt(anno.font)||24)*drawingScale; ctx.font=`bold ${fs}px Arial`;
                ctx.shadowBlur=0; ctx.lineWidth=4*drawingScale; ctx.strokeStyle='black';
                ctx.strokeText(anno.text,x,y); ctx.fillText(anno.text,x,y);
            } else if (anno.points) { 
                ctx.beginPath(); anno.points.forEach((p,i)=>{ const x=p.x*img.naturalWidth, y=p.y*img.naturalHeight; i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); if(i===0) labelPos={x,y}; }); ctx.stroke();
            }
            ctx.restore();

            if (isActive && labelText) drawLabel(ctx, labelText, labelPos.x, labelPos.y - (30 * drawingScale), color);
        }

        function drawLabel(ctx, text, x, y, color) {
            ctx.save();
            const fontSize = 24 * drawingScale; ctx.font = `600 ${fontSize}px "Segoe UI", Arial`;
            const padding = 10 * drawingScale; const textWidth = ctx.measureText(text).width;
            const boxW = textWidth + padding*2; const boxH = fontSize + padding*2;
            ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.beginPath(); ctx.roundRect(x, y-boxH, boxW, boxH, 8); ctx.fill();
            ctx.lineWidth = 2 * drawingScale; ctx.strokeStyle = color; ctx.stroke();
            ctx.fillStyle = "#fff"; ctx.textBaseline = "middle"; ctx.fillText(text, x+padding, y-boxH+(boxH/2)+2);
            ctx.restore();
        }

        listEl.addEventListener('click', (e) => {
            const item = e.target.closest('.finding-item');
            if (!item) return;
            document.querySelectorAll('.finding-item').forEach(el => el.classList.remove('active'));
            const id = item.dataset.annotationId;
            if (activeAnnotationId === id) { activeAnnotationId = null; fitImage(); } 
            else { activeAnnotationId = id; showAll = false; item.classList.add('active'); const anno = DATA.annotations.find(a => a.id === id); if (anno) zoomNatural(anno); }
            render();
        });

        function zoomNatural(anno) {
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            const pts = anno.points || [anno.start, anno.end].filter(Boolean) || [{x:anno.x, y:anno.y}];
            if(pts.length === 1 && !pts[0].x) pts[0] = {x: anno.x, y: anno.y};
            pts.forEach(p => { if(p) { minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x); minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y); } });
            if (maxX - minX < 0.05) { minX -= 0.1; maxX += 0.1; } if (maxY - minY < 0.05) { minY -= 0.1; maxY += 0.1; }
            const regW = (maxX - minX) * img.naturalWidth; const regH = (maxY - minY) * img.naturalHeight;
            const padX = canvas.width * 0.3; const padY = canvas.height * 0.3;
            let tScale = Math.min((canvas.width-padX)/regW, (canvas.height-padY)/regH);
            tScale = Math.min(tScale, 3.0); tScale = Math.max(tScale, Math.min(canvas.width/img.naturalWidth, canvas.height/img.naturalHeight));
            const cX = (minX*img.naturalWidth + regW/2); const cY = (minY*img.naturalHeight + regH/2);
            scale = tScale; panX = (canvas.width/2) - (cX * scale); panY = (canvas.height/2) - (cY * scale);
        }

        document.getElementById('btn-toggle-all').addEventListener('click', () => {
            showAll = !showAll; activeAnnotationId = null;
            document.querySelectorAll('.finding-item').forEach(el => el.classList.remove('active'));
            fitImage(); render();
        });

        viewer.addEventListener('mousedown', e => { isDragging = true; startX = e.clientX - panX; startY = e.clientY - panY; });
        window.addEventListener('mousemove', e => { if(isDragging) { panX = e.clientX - startX; panY = e.clientY - startY; render(); } });
        window.addEventListener('mouseup', () => isDragging = false);
        viewer.addEventListener('wheel', e => { e.preventDefault(); const d = e.deltaY > 0 ? 0.9 : 1.1; const mx = e.clientX - canvas.getBoundingClientRect().left; const my = e.clientY - canvas.getBoundingClientRect().top; const ns = scale * d; panX = mx - (mx - panX) * d; panY = my - (my - panY) * d; scale = ns; render(); });
        let idist = 0, iscale = 1;
        viewer.addEventListener('touchstart', e => { if(e.touches.length===2){ idist = Math.hypot(e.touches[0].pageX-e.touches[1].pageX, e.touches[0].pageY-e.touches[1].pageY); iscale = scale; } else if(e.touches.length===1) { isDragging = true; startX = e.touches[0].clientX - panX; startY = e.touches[0].clientY - panY; } }, {passive:false});
        viewer.addEventListener('touchmove', e => { e.preventDefault(); if(e.touches.length===2){ const dist = Math.hypot(e.touches[0].pageX-e.touches[1].pageX, e.touches[0].pageY-e.touches[1].pageY); const delta = dist/idist; const cx=viewer.offsetWidth/2, cy=viewer.offsetHeight/2; const ns=iscale*delta; panX=cx-(cx-panX)*(ns/scale); panY=cy-(cy-panY)*(ns/scale); scale=ns; render(); } else if(isDragging && e.touches.length===1) { panX=e.touches[0].clientX-startX; panY=e.touches[0].clientY-startY; render(); } }, {passive:false});
        viewer.addEventListener('touchend', () => isDragging = false);
    }
</script>
</body>
</html>
