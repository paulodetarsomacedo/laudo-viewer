<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laudo Interativo</title>
    <style>
        * { box-sizing: border-box; }
        :root {
            --bg-color: #000;
            --panel-bg: #111;
            --text-color: #eee;
            --accent: #007bff;
            --c-critical: #e53e3e;
            --c-semicritical: #dd6b20;
            --c-attention: #d69e2e;
            --c-complementar: #38a169;
        }

        body {
            margin: 0; padding: 0; background: var(--bg-color); color: var(--text-color);
            font-family: 'Segoe UI', sans-serif; height: 100vh; height: 100dvh;
            display: flex; overflow: hidden;
        }

        /* --- HEADER --- */
        #app-header {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background-color: rgba(0,0,0,0.75); color: rgba(255,255,255,0.95);
            padding: 8px 20px; border-radius: 30px; font-size: 14px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1.5px; z-index: 50;
            border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex; align-items: center; gap: 15px;
        }
        #btn-toggle-all-header { display: none; }

        /* --- VIEWER --- */
        #viewer-area {
            flex: 1; position: relative; overflow: hidden; cursor: grab;
            background: #000; display: flex; align-items: center; justify-content: center;
        }
        #viewer-area:active { cursor: grabbing; }
        canvas { display: block; }

        /* --- CARD FLUTUANTE --- */
        #finding-card {
            position: absolute; display: none; z-index: 60;
            background: rgba(15,15,18,0.97); color: #fff;
            backdrop-filter: blur(12px);
            padding: 14px 38px 14px 18px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            border-left: 5px solid var(--accent);
            font-size: 14px; line-height: 1.5;
            max-width: 420px; min-width: 260px;
            max-height: 45vh; overflow-y: auto;
            transition: opacity 0.3s ease;
        }
        @media (min-width: 769px) {
            #finding-card { bottom: 30px; left: 30px; }
        }
        .close-card {
            position: absolute; top: 8px; right: 10px;
            background: none; border: none; color: #666;
            font-size: 22px; cursor: pointer; padding: 0; line-height: 1;
            transition: color 0.2s;
        }
        .close-card:hover { color: #fff; }

        /* Severidade badge no card */
        .severity-badge {
            display: inline-block; font-size: 10px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
            padding: 2px 7px; border-radius: 20px; margin-bottom: 7px;
            opacity: 0.9;
        }
        .sev-critical   { background: rgba(229,62,62,0.2);  color: #fc8181; border: 1px solid rgba(229,62,62,0.4); }
        .sev-semi       { background: rgba(221,107,32,0.2); color: #f6ad55; border: 1px solid rgba(221,107,32,0.4); }
        .sev-attention  { background: rgba(214,158,46,0.2); color: #f6e05e; border: 1px solid rgba(214,158,46,0.4); }
        .sev-complement { background: rgba(56,161,105,0.2); color: #68d391; border: 1px solid rgba(56,161,105,0.4); }

        /* Texto resumo + expandir */
        #card-summary { cursor: pointer; }
        #card-full { display: none; margin-top: 6px; color: #ccc; font-size: 13px; line-height: 1.55; }
        #card-full.open { display: block; }
        #btn-expand {
            display: inline-block; margin-top: 5px;
            font-size: 11px; color: #888; cursor: pointer;
            border: none; background: none; padding: 0;
            text-decoration: underline; text-underline-offset: 2px;
            transition: color 0.2s;
        }
        #btn-expand:hover { color: #ccc; }

        /* Conduta + Recomendação */
        #card-clinical-row {
            display: none; margin-top: 10px; padding-top: 9px;
            border-top: 1px solid rgba(255,255,255,0.08);
            gap: 10px;
        }
        #card-clinical-row.visible { display: flex; }
        #card-impact, #card-recommend {
            flex: 1; min-width: 0;
            font-size: 11px; line-height: 1.5;
        }
        #card-impact strong {
            display: block; margin-bottom: 4px;
            font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: #64748b;
        }
        #card-recommend strong {
            display: block; margin-bottom: 4px;
            font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: #4a6741;
        }
        .impact-tag {
            display: inline-block; background: rgba(100,116,139,0.15);
            border: 1px solid rgba(100,116,139,0.3); border-radius: 4px;
            padding: 2px 6px; margin: 2px 2px 2px 0; font-size: 10px; color: #94a3b8;
            white-space: normal; word-break: break-word;
        }
        .recommend-tag {
            display: inline-block; background: rgba(56,161,105,0.1);
            border: 1px solid rgba(56,161,105,0.25); border-radius: 4px;
            padding: 2px 6px; margin: 2px 2px 2px 0; font-size: 10px; color: #68d391;
            white-space: normal; word-break: break-word;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 360px; background: var(--panel-bg); display: flex; flex-direction: column;
            border-left: 1px solid #222; z-index: 20; box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }
        #sidebar-header {
            padding: 12px 15px; background: #161616; border-bottom: 1px solid #222; flex-shrink: 0;
        }
        #sidebar-header h2 { margin: 0 0 6px 0; color: var(--accent); font-size: 17px; }

        /* Contador de severidade */
        #severity-summary {
            display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px;
        }
        .sev-count {
            font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
            display: flex; align-items: center; gap: 4px;
            cursor: pointer; transition: all 0.18s; user-select: none;
        }
        .sev-count:hover { filter: brightness(1.3); transform: translateY(-1px); }
        .sev-count.active-filter { box-shadow: 0 0 0 2px currentColor; filter: brightness(1.3); }
        .sev-count.critical   { background: rgba(229,62,62,0.15);  color: #fc8181; }
        .sev-count.semi       { background: rgba(221,107,32,0.15); color: #f6ad55; }
        .sev-count.attention  { background: rgba(214,158,46,0.15); color: #f6e05e; }
        .sev-count.complement { background: rgba(56,161,105,0.15); color: #68d391; }
        .sev-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
        .sev-dot.critical   { background: var(--c-critical); }
        .sev-dot.semi       { background: var(--c-semicritical); }
        .sev-dot.attention  { background: var(--c-attention); }
        .sev-dot.complement { background: var(--c-complementar); }

        .instruction-box {
            background: #191919; color: #666; font-size: 11px; padding: 7px 15px;
            border-bottom: 1px solid #222; flex-shrink: 0;
        }
        #findings-list { flex: 1; overflow-y: auto; padding: 12px; }

        .finding-item {
            background: #1a1a1a; margin-bottom: 8px; padding: 11px 12px; border-radius: 8px;
            cursor: pointer; border-left: 4px solid transparent; transition: all 0.18s;
            font-size: 13px; line-height: 1.4; color: #bbb;
        }
        .finding-item:hover { background: #222; color: #fff; transform: translateX(2px); }
        .finding-item.active { background: #252525; color: #fff; box-shadow: 0 0 14px rgba(255,255,255,0.07); }

        /* Mini badge de severidade no item */
        .item-sev-dot {
            display: inline-block; width: 7px; height: 7px; border-radius: 50%;
            margin-right: 6px; vertical-align: middle; flex-shrink: 0;
        }

        #controls {
            padding: 12px 15px; border-top: 1px solid #222;
            background: #161616; display: flex; gap: 8px; flex-direction: column; flex-shrink: 0;
        }
        .btn {
            background: var(--accent); color: white; border: none;
            padding: 11px; border-radius: 6px; font-weight: bold; cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn.secondary { background: #2a2a2a; }
        #signature-area {
            padding: 16px; text-align: center; border-top: 1px solid #222;
            background: #111; flex-shrink: 0; display: flex; justify-content: center;
        }
        #signature-img { max-width: 150px; height: auto; filter: brightness(0) invert(1); opacity: 0.8; }

        /* =====================================================================
           PULSE ANIMATION
        ===================================================================== */
        @keyframes pulse-ring {
            0%   { transform: scale(1);   opacity: 0.9; }
            50%  { transform: scale(1.55); opacity: 0.3; }
            100% { transform: scale(1);   opacity: 0.9; }
        }

        /* =====================================================================
           MOBILE PORTRAIT
        ===================================================================== */
        @media (max-width: 768px) and (orientation: portrait) {
            body { flex-direction: column; }
            #app-header {
                position: relative; top: 0; left: 0; transform: none;
                width: 100%; border-radius: 0; border: none; border-bottom: 1px solid #222;
                background: #111; justify-content: space-between; padding: 10px 15px;
            }
            #app-title { font-size: 12px; letter-spacing: 1px; }
            #btn-toggle-all-header {
                display: block; padding: 7px 11px; font-size: 11px;
                background: var(--accent); color: white; border: none; border-radius: 5px; font-weight: bold;
            }
            #viewer-area { height: 45%; width: 100%; order: 1; border-bottom: 2px solid var(--accent); }
            #sidebar { height: 50%; width: 100%; order: 2; border-left: none; display: flex; flex-direction: column; }
            #sidebar-header { display: block; padding: 8px 12px; }
            #sidebar-header h2 { font-size: 14px; margin-bottom: 4px; }
            #controls { display: none; }
            .instruction-box { padding: 6px 12px; font-size: 11px; }
            #findings-list { display: block; overflow-y: auto; overflow-x: hidden; padding: 8px; flex: 1; }
            .finding-item { width: 100%; margin-bottom: 6px; font-size: 12px; }
            #signature-area { padding: 8px; background: #111; flex-shrink: 0; min-height: 50px; }
            #signature-img { max-width: 110px; max-height: 45px; }
            #finding-card {
                bottom: 6px; top: auto;
                left: 50%; transform: translateX(-50%);
                width: 94%; max-width: 94%;
                max-height: 30vh; overflow-y: auto;
                padding: 8px 28px 8px 11px; font-size: 11.5px;
            }
            /* Esconde seções menos críticas no mobile para economizar espaço */
            #card-full { font-size: 11px; }
            #card-clinical-row { gap: 6px; }
            .impact-tag, .recommend-tag { font-size: 10px; padding: 2px 5px; }
        }

        /* =====================================================================
           MOBILE LANDSCAPE
        ===================================================================== */
        @media (max-width: 900px) and (orientation: landscape) {
            body { flex-direction: row; height: 100vh; height: 100dvh; }
            #app-header { display: none; }
            #viewer-area {
                flex: 0 0 63%; height: 100%;
                border-bottom: none; border-right: 2px solid var(--accent);
            }
            #sidebar {
                flex: 0 0 37%; width: auto; height: 100%;
                border-left: none; display: flex; flex-direction: column; overflow: hidden;
            }
            #sidebar-header { display: block; padding: 6px 10px; flex-shrink: 0; }
            #sidebar-header h2 { font-size: 12px; margin: 0 0 3px 0; }
            .instruction-box { display: none; }
            #findings-list { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 5px 7px; }
            .finding-item { font-size: 11px; padding: 6px 8px; margin-bottom: 4px; border-radius: 5px; line-height: 1.3; }
            #controls { display: flex; flex-direction: row; gap: 5px; padding: 5px 7px; flex-shrink: 0; }
            .btn { padding: 6px 4px; font-size: 10px; flex: 1; border-radius: 5px; }
            #signature-area { padding: 4px 7px; min-height: 36px; flex-shrink: 0; }
            #signature-img { max-width: 75px; max-height: 28px; }
            #finding-card {
                top: 8px; bottom: auto; left: 8px; right: auto; transform: none;
                max-width: 58%; font-size: 11px;
                max-height: 42vh; overflow-y: auto;
                padding: 8px 26px 8px 10px; border-radius: 8px;
            }
        }
    </style>
</head>
<body>

<div id="app-header">
    <div id="app-title">LAUDO INTERATIVO</div>
    <button id="btn-toggle-all-header">🔍 Visão Geral</button>
</div>

<div id="viewer-area">
    <div id="finding-card">
        <button class="close-card" onclick="closeCard()">×</button>
        <div id="card-severity-badge"></div>
        <div id="card-summary"></div>
        <button id="btn-expand" onclick="toggleExpand()">Ver detalhes ↓</button>
        <div id="card-full"></div>
        <div id="card-clinical-row">
            <div id="card-impact">
                <strong>💡 Conduta provável</strong>
                <div id="card-impact-tags"></div>
            </div>
            <div id="card-recommend">
                <strong>🔬 Exame sugerido</strong>
                <div id="card-recommend-tags"></div>
            </div>
        </div>
    </div>
    <canvas id="canvas"></canvas>
</div>

<div id="sidebar">
    <div id="sidebar-header">
        <h2>Achados Radiográficos</h2>
        <div id="severity-summary"></div>
    </div>
    <div class="instruction-box">Toque no achado ou na imagem para destacar</div>
    <div id="findings-list">Carregando...</div>
    <div id="controls">
        <button id="btn-toggle-all" class="btn">🔍 Visão Geral</button>
        <button id="btn-reset-zoom" class="btn secondary">⟲ Reset</button>
    </div>
    <div id="signature-area">
        <img id="signature-img" src="assinatura.png" alt="Assinatura" onerror="this.style.display='none'">
    </div>
</div>

<script>
// ============================================================
// SISTEMA DE SEVERIDADE
// ============================================================
const SEV_RULES = [
    {
        level: 'critical',
        label: '🔴 Crítico',
        color: '#e53e3e',
        words: [
            'incluso','impactado','reabsorção','envolvimento pulpar','comprometimento pulpar',
            'lesão extensa','rarefação','radiolúcida','radiolucida','periápice','periapice',
            'canal mandibular','íntima proximidade','intima proximidade','cisto','tumor',
            'necrose','fístula','fistula','abscesso','osteíte','osteite','fratura','dilaceração severa',
            'reabsorção radicular','reabsorcao radicular','reabsorção interna','reabsorção externa'
        ]
    },
    {
        level: 'semi',
        label: '🟠 Semi-crítico',
        color: '#dd6b20',
        words: [
            'semi-incluso','semi incluso','cárie','cariosa','carie','obturação inadequada',
            'restauração com falha','sobrecontorno','subcontorno','remanescente radicular',
            'alvéolo','alveolo','espessamento','seio maxilar','sinusite','mucosite',
            'lesão cariosa','lesão radiolúcida','lesão radiolucida','carr','care',
            'peri-implantite','mobilidade','lesão periapical','pericoronite'
        ]
    },
    {
        level: 'attention',
        label: '🟡 Atenção',
        color: '#d69e2e',
        words: [
            'aumento do espaço','calcificação','atrição','giroversão','dilaceração',
            'arredondamento apical','pino intrarradicular','implante','contenção',
            'cálculo','calculo','perda óssea','perda ossea','reabsorção leve',
            'obturação','restauração radiopaca','tratado endodonticamente','endodonticamente',
            'condensação','selamento','semi-irrompido','irrompido'
        ]
    }
];

function classifyText(text) {
    const lower = text.toLowerCase();
    for (const rule of SEV_RULES) {
        if (rule.words.some(w => lower.includes(w))) {
            return rule;
        }
    }
    return { level: 'complement', label: '🟢 Complementar', color: '#38a169' };
}

// ============================================================
// DENTES ANTERIORES (numeração FDI / ISO-3950)
// Superiores: 11, 12, 13, 21, 22, 23
// Inferiores: 31, 32, 33, 41, 42, 43
// ============================================================
const DENTES_ANTERIORES = [
    '11','12','13','21','22','23',
    '31','32','33','41','42','43'
];

/**
 * Verifica se o texto menciona sobrecontorno e se o dente
 * referenciado é anterior ou posterior.
 * Retorna: 'anterior' | 'posterior' | null (se não for sobrecontorno)
 */
function detectSobrecontornoTipo(text) {
    const lower = text.toLowerCase();
    if (!lower.includes('sobrecontorno')) return null;

    // Procura números de dentes no texto (formato FDI de 2 dígitos)
    const matches = text.match(/\b([1-4][1-8])\b/g);
    if (matches) {
        // Se qualquer dente mencionado for anterior, prioriza anterior
        for (const num of matches) {
            if (DENTES_ANTERIORES.includes(num)) return 'anterior';
        }
        return 'posterior';
    }

    // Sem número de dente encontrado — tenta inferir por palavras-chave
    const anterioresKeywords = [
        'incisivo','incisivos','canino','caninos','central','lateral',
        'anterior','anteriores','frontal','frontais'
    ];
    if (anterioresKeywords.some(w => lower.includes(w))) return 'anterior';

    const posterioresKeywords = [
        'pré-molar','pre-molar','premolar','molar','molares','posterior','posteriores'
    ];
    if (posterioresKeywords.some(w => lower.includes(w))) return 'posterior';

    // Padrão sem informação: trata como posterior (mais comum para sobrecontorno)
    return 'posterior';
}

// ============================================================
// IMPACTO CLÍNICO
// ============================================================
// Conduta clínica provável
const IMPACT_RULES = [
    { words: ['envolvimento pulpar','comprometimento pulpar','câmara pulpar','exposição pulpar','necrose pulpar','cárie profunda','carie profunda'], tag: 'Tratamento endodôntico' },
    { words: ['periápice','periapice','rarefação periapical','lesão periapical','abscesso periapical','fístula','fistula','periodontite apical'], tag: 'Tratamento endodôntico' },
    { words: ['lesão cariosa','cariosa','cárie','carie','radiolucência coronária','lesão interproximal'], tag: 'Restauração' },
    { words: ['incluso','impactado','semi-incluso','semi incluso','pericoronite','não irrompido'], tag: 'Avaliação cirúrgica' },
    { words: ['raízes residuais','raizes residuais','raiz residual','remanescente radicular','raiz retida'], tag: 'Exodontia / cirurgia' },
    { words: ['destruição coronária','destruicao coronaria','coroa destruída','sem remanescente coronário','extensa destruição'], tag: 'Avaliar exodontia' },
    { words: ['perda óssea','perda ossea','reabsorção alveolar','reabsorção óssea','defeito ósseo','defeito angular','nível ósseo reduzido'], tag: 'Avaliação e trat. periodontal' },
    { words: ['cálculo','calculo','cálculo subgengival','cálculo supragengival','tártaro'], tag: 'Raspagem e alisamento radicular' },
    { words: ['reabsorção radicular','reabsorcao radicular','reabsorção interna','reabsorção externa','reabsorção cervical invasiva'], tag: 'Correlação clínica urgente' },
    { words: ['seio maxilar','espessamento mucoso','sinusite','mucosite sinusal','pseudocisto sinusal','cisto de retenção sinusal','velamento sinusal'], tag: 'Investigar causa (odontogênica x rinogênica) — otorrino' },
    { words: ['canal mandibular','íntima proximidade','intima proximidade','sobrepostos ao canal','contato com o canal'], tag: 'Avaliação pré-cirúrgica criteriosa' },
    { words: ['peri-implantite','perda óssea peri-implantar','reabsorção peri-implantar'], tag: 'Trat. peri-implantite' },
    { words: ['alvéolo','alveolo','pós-cirúrgico','pós-exodontia','alveolite'], tag: 'Acompanhar reparação alveolar' },
    { words: ['dilaceração','giroversão','transalveolar','anquilose dental'], tag: 'Planejamento cirúrgico criterioso' },
    { words: ['fratura radicular','linha de fratura','fragmento radicular','fratura coronorradicular'], tag: 'Correlação clínica — trauma' },
    { words: ['implante osseointegrado','implante em função'], tag: 'Acompanhar osseointegração' },
    { words: ['sobrecarga oclusal','atrição','faceta de desgaste','desgaste oclusal'], tag: 'Avaliação oclusal / bruxismo' },
    { words: ['contenção','aparelho ortodôntico','braquete'], tag: 'Acompanhamento ortodôntico' },
    { words: ['cisto','lesão cística','lesão radiolúcida bem delimitada','folicular','dentígero'], tag: 'Avaliação e possível enucleação' },
    { words: ['tumor','lesão mista','lesão radiopaca irregular','calcificação distrófica'], tag: 'Biópsia e correlação histopatológica' },
    { words: ['atresia','desvio de septo','hipertrofia de corneto'], tag: 'Avaliação otorrinolaringológica' },
    { words: ['sobrecontorno'], tag: 'Substituição / ajuste da restauração' },
];

// Exame complementar sugerido
const RECOMMEND_RULES = [
    { words: ['lesão interproximal','cárie interproximal','carie interproximal','face mesial','face distal','lesão proximal'], tag: 'Radiografia interproximal da região' },
    // Cárie profunda com envolvimento pulpar → periapical (não interproximal)
    { words: ['cárie profunda','carie profunda','lesão cariosa profunda','exposição pulpar','provável exposição pulpar','provavel exposicao pulpar','envolvimento pulpar','comprometimento pulpar'], tag: 'Radiografia periapical' },
    { words: ['cárie','cariosa','lesão cariosa','carie','radiolucência coronária','lesão de cárie','lesao de carie'], tag: 'Radiografia interproximal ou periapical da região' },
    // Destruição coronária → periapical para avaliar raiz e periápice
    { words: ['destruição coronária','destruicao coronaria','coroa destruída','extensa destruição','sem remanescente coronário'], tag: 'Radiografia periapical' },
    { words: ['envolvimento pulpar','comprometimento pulpar','câmara pulpar','necrose','abscesso','fístula','fistula','periodontite apical'], tag: 'Radiografia periapical' },
    { words: ['lesão periapical','periápice','periapice','rarefação periapical','rarefação óssea periapical'], tag: 'Radiografia periapical' },
    { words: ['reabsorção radicular','reabsorcao radicular','reabsorção interna','reabsorção externa'], tag: 'Periapical + TC Cone Beam' },
    { words: ['reabsorção cervical invasiva'], tag: 'TC Cone Beam (extensão da reabsorção)' },
    { words: ['perda óssea','perda ossea','reabsorção alveolar','suporte periodontal reduzido','defeito ósseo angular'], tag: 'Série periapical completa' },
    { words: ['cálculo','calculo','tártaro','doença periodontal generalizada'], tag: 'Série periapical ou interproximal bilateral' },
    { words: ['dente tratado endodonticamente','endodonticamente','tratamento endodôntico concluído','obturação endodôntica'], tag: 'Periapical de controle pós-trat.' },
    { words: ['canal mandibular','íntima proximidade','intima proximidade','sobrepostos ao canal','contato com o canal mandibular'], tag: 'TC Cone Beam mandibular — mandatória' },
    { words: ['incluso','impactado','semi-incluso','semi incluso'], tag: 'TC Cone Beam' },
    { words: ['seio maxilar','espessamento mucoso','sinusite','mucosite sinusal','pseudocisto sinusal','velamento sinusal'], tag: 'TC de seios paranasais' },
    { words: ['cisto','lesão cística','folicular','dentígero','lesão radiolúcida bem delimitada'], tag: 'TC Cone Beam + biópsia' },
    { words: ['tumor','lesão mista','lesão radiopaca irregular','lesão multilocular'], tag: 'TC Cone Beam + biópsia histopatológica' },
    { words: ['fratura radicular','linha de fratura','fragmento radicular','fratura coronorradicular'], tag: 'TC Cone Beam (diagnóstico de fratura)' },
    { words: ['implante osseointegrado','planejamento implante','área edêntula','rebordo residual'], tag: 'TC Cone Beam (planejamento de implante)' },
    { words: ['peri-implantite','perda óssea peri-implantar'], tag: 'Periapical do implante + sondagem' },
    { words: ['atm','côndilo','articulação temporomandibular','côndilo mandibular','remodelação condilar'], tag: 'RM de ATM (partes moles) ou TC Cone Beam ATM (osso)' },
    { words: ['raízes residuais','raizes residuais','raiz residual','remanescente radicular','raiz retida'], tag: 'Radiografia periapical' },
    { words: ['desvio de septo','hipertrofia de corneto','atresia de coana'], tag: 'TC de seios paranasais + avaliação otorrino' },
    { words: ['sobrecarga oclusal','atrição intensa','desgaste severo'], tag: 'Avaliação clínica + modelos de estudo' },
];

// Palavras que indicam envolvimento pulpar — excluem "Restauração" e "interproximal ou periapical"
const PULPAR_WORDS = [
    'envolvimento pulpar','comprometimento pulpar','câmara pulpar','exposição pulpar',
    'necrose pulpar','cárie profunda','carie profunda','provável exposição','provavel exposicao',
    'abscesso','fístula','fistula','periodontite apical','lesão periapical','periápice','periapice',
    'rarefação periapical','rarefacao periapical','rarefação óssea','rarefacao ossea'
];
// Palavras que indicam dente já tratado — excluem "Restauração" e "Tratamento endodôntico"
const TRATADO_WORDS = [
    'tratado endodonticamente','endodonticamente','obturação endodôntica','obturacao endodontica',
    'tratamento endodôntico concluído'
];
const RESIDUAL_WORDS = [
    'raízes residuais','raizes residuais','raiz residual','remanescente radicular','raiz retida'
];

function getImpacts(text) {
    const lower = text.toLowerCase();
    const temPulpar   = PULPAR_WORDS.some(w => lower.includes(w));
    const temTratado  = TRATADO_WORDS.some(w => lower.includes(w));
    const temResidual = RESIDUAL_WORDS.some(w => lower.includes(w));
    const found = [];
    const seen = new Set();
    for (const rule of IMPACT_RULES) {
        if (!rule.words.some(w => lower.includes(w))) continue;
        if (seen.has(rule.tag)) continue;
        // Raízes residuais: exodontia prevalece, bloqueia endodontia
        if (rule.tag === 'Tratamento endodôntico' && temResidual) continue;
        // Exclui "Restauração" se há envolvimento pulpar, dente tratado ou residual
        if (rule.tag === 'Restauração' && (temPulpar || temTratado || temResidual)) continue;
        // Exclui "Tratamento endodôntico" se dente já foi tratado
        if (rule.tag === 'Tratamento endodôntico' && temTratado) continue;
        found.push(rule.tag);
        seen.add(rule.tag);
    }
    return found;
}

function getRecommends(text) {
    const lower = text.toLowerCase();
    const temPulpar   = PULPAR_WORDS.some(w => lower.includes(w));
    const temTratado  = TRATADO_WORDS.some(w => lower.includes(w));
    const temResidual = RESIDUAL_WORDS.some(w => lower.includes(w));
    const found = [];
    const seen = new Set();

    // ── Lógica especial para sobrecontorno ──────────────────────────────────
    const tipoSobre = detectSobrecontornoTipo(text);
    if (tipoSobre !== null) {
        if (tipoSobre === 'anterior') {
            found.push('Radiografia periapical da região');
            found.push('Avaliação clínica');
        } else {
            found.push('Radiografia interproximal da região');
        }
        seen.add('Radiografia periapical da região');
        seen.add('Avaliação clínica');
        seen.add('Radiografia interproximal da região');
    }
    // ────────────────────────────────────────────────────────────────────────

    for (const rule of RECOMMEND_RULES) {
        if (!rule.words.some(w => lower.includes(w))) continue;
        if (seen.has(rule.tag)) continue;
        // Se há envolvimento pulpar → bloqueia interproximal genérico (já tem periapical específico)
        if (rule.tag === 'Radiografia interproximal ou periapical da região' && (temPulpar || temResidual)) continue;
        // Não duplica periapical se sobrecontorno anterior já adicionou
        if (rule.tag === 'Radiografia periapical' && seen.has('Radiografia periapical da região')) continue;
        found.push(rule.tag);
        seen.add(rule.tag);
    }
    return found;
}

function makeSummary(text, maxLen = 90) {
    const clean = text.replace(/\n/g, ' ').trim();
    if (clean.length <= maxLen) return { summary: clean, full: null };
    const cut = clean.lastIndexOf(' ', maxLen);
    return {
        summary: clean.slice(0, cut > 0 ? cut : maxLen) + '…',
        full: clean
    };
}

    btn.textContent = cardExpanded ? 'Recolher ↑' : 'Ver detalhes ↓';
};

// ============================================================
// PULSE CANVAS
// ============================================================
let pulseAnim = null;
let pulsePhase = 0;

function startPulse() {
    stopPulse();
    pulsePhase = 0;
    function step() {
        pulsePhase += 0.04;
        render();
        pulseAnim = requestAnimationFrame(step);
    }
    pulseAnim = requestAnimationFrame(step);
}

function stopPulse() {
    if (pulseAnim) { cancelAnimationFrame(pulseAnim); pulseAnim = null; }
}

function drawPulse(cx, cy, color) {
    ctx.save();
    ctx.globalCompositeOperation = 'source-over';

    const t  = (Math.sin(pulsePhase)       + 1) / 2;
    const t2 = (Math.sin(pulsePhase - 1.8) + 1) / 2;
    const t3 = (Math.sin(pulsePhase - 3.2) + 1) / 2;

    // Anel 1 — externo e lento
    const r1 = (18 + t * 34) * drawingScale;
    ctx.beginPath(); ctx.arc(cx, cy, r1, 0, Math.PI * 2);
    ctx.strokeStyle = color; ctx.lineWidth = 1.5 * drawingScale;
    ctx.globalAlpha = 0.55 - t * 0.52; ctx.stroke();

    // Anel 2 — médio, defasado
    const r2 = (13 + t2 * 22) * drawingScale;
    ctx.beginPath(); ctx.arc(cx, cy, r2, 0, Math.PI * 2);
    ctx.strokeStyle = color; ctx.lineWidth = 1.8 * drawingScale;
    ctx.globalAlpha = 0.45 - t2 * 0.42; ctx.stroke();

    // Anel 3 — pequeno, defasado
    const r3 = (8 + t3 * 12) * drawingScale;
    ctx.beginPath(); ctx.arc(cx, cy, r3, 0, Math.PI * 2);
    ctx.strokeStyle = color; ctx.lineWidth = 2 * drawingScale;
    ctx.globalAlpha = 0.35 - t3 * 0.30; ctx.stroke();

    // Ponto central branco + cor
    ctx.beginPath(); ctx.arc(cx, cy, 4.5 * drawingScale, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff'; ctx.globalAlpha = 0.95; ctx.fill();
    ctx.beginPath(); ctx.arc(cx, cy, 4.5 * drawingScale, 0, Math.PI * 2);
    ctx.fillStyle = color; ctx.globalAlpha = 0.85; ctx.fill();

    // Micro halo
    ctx.beginPath(); ctx.arc(cx, cy, 8 * drawingScale, 0, Math.PI * 2);
    ctx.strokeStyle = color; ctx.lineWidth = 1.2 * drawingScale;
    ctx.globalAlpha = 0.30; ctx.stroke();

    ctx.restore();
}

// ============================================================
// HELPERS PARA CENTRO DA ANOTAÇÃO
// ============================================================
function getAnnoCenterNorm(anno) {
    if (anno.points && anno.points.length) {
        const xs = anno.points.map(p => p.x);
        const ys = anno.points.map(p => p.y);
        return {
            x: (Math.min(...xs) + Math.max(...xs)) / 2,
            y: (Math.min(...ys) + Math.max(...ys)) / 2
        };
    }
    if (anno.start && anno.end) {
        return { x: (anno.start.x + anno.end.x) / 2, y: (anno.start.y + anno.end.y) / 2 };
    }
    if (anno.x !== undefined) return { x: anno.x, y: anno.y };
    return null;
}

if (!DATA) {

} else {

    items.forEach(p => {

    });

    // Contador de severidade no header
    buildSeveritySummary(sevCounts, items.length);

    const viewer = document.getElementById('viewer-area');
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    let img = new Image();
    let scale = 1, panX = 0, panY = 0;
    let isDragging = false, startX, startY;
    let startClickX = 0, startClickY = 0;
    let activeAnnotationId = null;
    let showAll = false;
    let drawingScale = 1;

    img.onload = () => {
        resize(); drawingScale = img.naturalWidth / 1200; fitImage(); render();
    };
    img.src = DATA.image;

    window.addEventListener('resize', () => { resize(); fitImage(); render(); });
    if (screen.orientation) {
        screen.orientation.addEventListener('change', () => {
            setTimeout(() => { resize(); fitImage(); render(); }, 200);
        });
    }

    function resize() {
        canvas.width  = viewer.clientWidth;
        canvas.height = viewer.clientHeight;
    }
    function fitImage() {
        const rW = canvas.width  / img.naturalWidth;
        const rH = canvas.height / img.naturalHeight;
        scale = Math.min(rW, rH);
        panX = (canvas.width  - img.naturalWidth  * scale) / 2;
        panY = (canvas.height - img.naturalHeight * scale) / 2;
    }
    function isLandscapeMobile() {
        return window.innerWidth <= 900 && window.innerWidth > window.innerHeight;
    }

    function render() {
        ctx.setTransform(1,0,0,1,0,0);
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.setTransform(scale,0,0,scale,panX,panY);
        ctx.drawImage(img,0,0);

        if (activeFilter) {
            // ── MODO SPOTLIGHT ──────────────────────────────────────────────────
            // Abordagem correta com canvas offscreen:
            // 1. Canvas A = imagem escurecida (toda a cena)
            // 2. Canvas B = imagem em zoom 2× na área do achado (lupa)
            // 3. Compõe B sobre A com clipping circular suave

            ctx.setTransform(1,0,0,1,0,0);

            // ── Canvas A: imagem escurecida ──
            const offA = document.createElement('canvas');
            offA.width = canvas.width; offA.height = canvas.height;
            const ctxA = offA.getContext('2d');
            ctxA.setTransform(scale,0,0,scale,panX,panY);
            ctxA.drawImage(img,0,0);
            ctxA.setTransform(1,0,0,1,0,0);
            ctxA.fillStyle = 'rgba(0,0,0,0.52)';
            ctxA.fillRect(0,0,offA.width,offA.height);

            // Desenha canvas A no canvas principal
            ctx.drawImage(offA,0,0);

            // ── Para cada achado filtrado: lupa 2× ──
            const filteredAnnos = DATA.annotations.filter(anno => {
                const li = document.querySelector(`.finding-item[data-annotation-id="${anno.id}"]`);
                return li && li.dataset.severity === activeFilter;
            });

            filteredAnnos.forEach(anno => drawSpotlightLupa(anno));

            // ── Anotações por cima ──
            ctx.setTransform(scale,0,0,scale,panX,panY);
            filteredAnnos.forEach(anno => {
                drawAnnotation(anno, 'spotlight');
                const cn = getAnnoCenterNorm(anno);
                if (cn) {
                    const li  = document.querySelector(`.finding-item[data-annotation-id="${anno.id}"]`);
                    const col = li ? li.dataset.severityColor : '#ffffff';
                    drawPulse(cn.x * img.naturalWidth, cn.y * img.naturalHeight, col);
                }
            });

        } else if (showAll) {
            // ── VISÃO GERAL: todos os achados normais ─────────────────────────
            DATA.annotations.forEach(anno => drawAnnotation(anno, false));

        } else if (activeAnnotationId) {
            // ── ACHADO INDIVIDUAL ─────────────────────────────────────────────
            const anno = DATA.annotations.find(a => a.id === activeAnnotationId);
            if (anno) {
                drawAnnotation(anno, true);
                const cn = getAnnoCenterNorm(anno);
                if (cn) {
                    const el  = document.querySelector(`p[data-annotation-id="${anno.id}"]`);
                    const col = el ? el.dataset.severityColor : '#00ffff';
                    drawPulse(cn.x * img.naturalWidth, cn.y * img.naturalHeight, col);
                }
            }
        }
    }

    // Lupa real: recorta círculo com imagem em 2× sobre a cena escurecida.
    // Funciona 100% com canvas 2D: não usa destination-out no canvas principal.
    function drawSpotlightLupa(anno) {
        const cn = getAnnoCenterNorm(anno);
        if (!cn) return;

        // Centro da annotation em coords de tela
        const cxImg    = cn.x * img.naturalWidth;
        const cyImg    = cn.y * img.naturalHeight;
        const cxScreen = cxImg * scale + panX;
        const cyScreen = cyImg * scale + panY;

        // Raio da lupa em pixels de tela
        let annoR = 60;
        if (anno.points && anno.points.length > 1) {
            const xs = anno.points.map(p => p.x * img.naturalWidth * scale);
            const ys = anno.points.map(p => p.y * img.naturalHeight * scale);
            const w  = Math.max(...xs) - Math.min(...xs);
            const h  = Math.max(...ys) - Math.min(...ys);
            annoR = Math.hypot(w, h) * 0.5;
        }
        const radius = Math.max(annoR * 2.6, 85);

        // ── Canvas B: imagem em zoom 2× centrada no achado ──
        const diam = radius * 2;
        const offB = document.createElement('canvas');
        offB.width = diam; offB.height = diam;
        const ctxB = offB.getContext('2d');

        // Zoom 2× = scale * 2, mas centralizado no ponto do achado
        const zoomFactor = 2.0;
        const zScale  = scale * zoomFactor;
        const zPanX   = radius - cxImg * zScale;
        const zPanY   = radius - cyImg * zScale;
        ctxB.setTransform(zScale, 0, 0, zScale, zPanX, zPanY);
        ctxB.drawImage(img, 0, 0);

        // Clipping circular suave no canvas B usando gradiente de máscara
        ctxB.setTransform(1,0,0,1,0,0);
        ctxB.globalCompositeOperation = 'destination-in';
        const mask = ctxB.createRadialGradient(radius, radius, radius * 0.68, radius, radius, radius);
        mask.addColorStop(0,    'rgba(0,0,0,1)');
        mask.addColorStop(0.78, 'rgba(0,0,0,1)');
        mask.addColorStop(0.92, 'rgba(0,0,0,0.5)');
        mask.addColorStop(1,    'rgba(0,0,0,0)');
        ctxB.fillStyle = mask;
        ctxB.beginPath();
        ctxB.arc(radius, radius, radius, 0, Math.PI * 2);
        ctxB.fill();

        // Compõe B sobre o canvas principal (já tem a imagem escurecida)
        ctx.save();
        ctx.setTransform(1,0,0,1,0,0);
        ctx.drawImage(offB, cxScreen - radius, cyScreen - radius);

        // Anel sutil na borda da lupa
        const pulseT = (Math.sin(pulsePhase * 0.7) + 1) / 2;
        ctx.beginPath();
        ctx.arc(cxScreen, cyScreen, radius * 0.91, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,255,255,${0.12 + pulseT * 0.08})`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();
    }

    // ── Utilitário: desenha path suavizado com curvas de Bézier ────────────
    function buildSmoothPath(ctx, pts, closed) {
        if (pts.length < 2) return;
        ctx.beginPath();
        if (pts.length === 2) {
            ctx.moveTo(pts[0].x, pts[0].y);
            ctx.lineTo(pts[1].x, pts[1].y);
            return;
        }
        // Catmull-Rom → Bézier cúbica
        const n = pts.length;
        const tension = 0.35;
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 0; i < (closed ? n : n - 1); i++) {
            const p0 = pts[(i - 1 + n) % n];
            const p1 = pts[i];
            const p2 = pts[(i + 1) % n];
            const p3 = pts[(i + 2) % n];
            const cp1x = p1.x + (p2.x - p0.x) * tension;
            const cp1y = p1.y + (p2.y - p0.y) * tension;
            const cp2x = p2.x - (p3.x - p1.x) * tension;
            const cp2y = p2.y - (p3.y - p1.y) * tension;
            ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2.x, p2.y);
        }
        if (closed) ctx.closePath();
    }

    // ── Hex color → rgba string ─────────────────────────────────────────────
    function hexAlpha(hex, alpha) {
        const r = parseInt(hex.slice(1,3),16);
        const g = parseInt(hex.slice(3,5),16);
        const b = parseInt(hex.slice(5,7),16);
        return `rgba(${r},${g},${b},${alpha})`;
    }

    // ---- DRAW ANNOTATION ----
    // isActive: false = visão geral | true = zoom individual | 'spotlight' = filtro categoria
    function drawAnnotation(anno, isActive) {
        const el    = document.querySelector(`p[data-annotation-id="${anno.id}"]`);
        const color = (el && el.dataset.severityColor) ? el.dataset.severityColor : (anno.color || '#00FFFF');
        const baseWidth = (anno.thickness || 4) * drawingScale;

        // Parâmetros por modo
        // isActive===false  → visão geral: contorno normal, sem efeitos
        // isActive===true   → zoom individual: linha fina, brilhante, transparente
        // isActive==='spotlight' → filtro: contorno normal colorido

        const isZoom      = isActive === true;
        const isSpotlight = isActive === 'spotlight';
        const isNormal    = isActive === false;

        // Espessura: no zoom fica fina para não tapar o achado
        const strokeW = isZoom
            ? baseWidth * 0.8           // fina no zoom
            : baseWidth * 1.4;          // normal nos outros modos

        // Opacidade do contorno
        const strokeAlpha = isZoom
            ? 1.0                       // brilhante no zoom
            : isSpotlight ? 1.0         // vivo no spotlight
            : 0.90;                     // ligeiramente suave no geral

        ctx.save();
        ctx.globalAlpha = 1.0;
        ctx.lineJoin = 'round';
        ctx.lineCap  = 'round';

        // ── POLÍGONO FECHADO ──────────────────────────────────────────────────
        if (anno.points && anno.fillColor) {
            const pts = anno.points.map(p => ({
                x: p.x * img.naturalWidth,
                y: p.y * img.naturalHeight
            }));
            const cx = pts.reduce((s,p) => s + p.x, 0) / pts.length;
            const cy = pts.reduce((s,p) => s + p.y, 0) / pts.length;
            const maxR = Math.max(...pts.map(p => Math.hypot(p.x-cx, p.y-cy))) * 1.1;

            // Glow animado só no zoom individual
            if (isZoom) {
                const gp = (Math.sin(pulsePhase * 1.2) + 1) / 2;
                ctx.save();
                ctx.filter = `blur(${5 * drawingScale}px)`;
                buildSmoothPath(ctx, pts, true);
                ctx.strokeStyle = hexAlpha(color, 0.25 + gp * 0.15);
                ctx.lineWidth   = strokeW * 4;
                ctx.stroke();
                ctx.filter = 'none';
                ctx.restore();
            }

            // Preenchimento: muito leve no zoom (para ver o dente), normal nos outros
            buildSmoothPath(ctx, pts, true);
            const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxR);
            const fillOpacity = isZoom ? 0.06 : 0.11;
            grad.addColorStop(0,   hexAlpha(color, fillOpacity * 1.5));
            grad.addColorStop(0.6, hexAlpha(color, fillOpacity));
            grad.addColorStop(1,   hexAlpha(color, 0));
            ctx.fillStyle = grad;
            ctx.fill();

            // Sombra de âncora (só em modos não-zoom)
            if (!isZoom) {
                buildSmoothPath(ctx, pts, true);
                ctx.strokeStyle = 'rgba(0,0,0,0.45)';
                ctx.lineWidth   = strokeW + 2.5 * drawingScale;
                ctx.stroke();
            }

            // Contorno principal
            buildSmoothPath(ctx, pts, true);
            ctx.strokeStyle = hexAlpha(color, strokeAlpha);
            ctx.lineWidth   = strokeW;
            ctx.stroke();

            // No zoom: dash animado branco fino por cima
            if (isZoom) {
                const dashLen    = 8 * drawingScale;
                const dashGap    = 12 * drawingScale;
                const dashOffset = (pulsePhase * 12) % (dashLen + dashGap);
                buildSmoothPath(ctx, pts, true);
                ctx.setLineDash([dashLen, dashGap]);
                ctx.lineDashOffset = -dashOffset;
                ctx.strokeStyle = 'rgba(255,255,255,0.45)';
                ctx.lineWidth   = strokeW * 0.7;
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.lineDashOffset = 0;
            }

        // ── DESENHO LIVRE (linha aberta) ──────────────────────────────────────
        } else if (anno.points) {
            const pts = anno.points.map(p => ({
                x: p.x * img.naturalWidth,
                y: p.y * img.naturalHeight
            }));

            if (isZoom) {
                const gp = (Math.sin(pulsePhase * 1.2) + 1) / 2;
                ctx.save();
                ctx.filter = `blur(${4 * drawingScale}px)`;
                buildSmoothPath(ctx, pts, false);
                ctx.strokeStyle = hexAlpha(color, 0.28 + gp * 0.14);
                ctx.lineWidth   = strokeW * 3.5;
                ctx.stroke();
                ctx.filter = 'none';
                ctx.restore();
            }

            if (!isZoom) {
                buildSmoothPath(ctx, pts, false);
                ctx.strokeStyle = 'rgba(0,0,0,0.45)';
                ctx.lineWidth   = strokeW + 2 * drawingScale;
                ctx.stroke();
            }

            buildSmoothPath(ctx, pts, false);
            ctx.strokeStyle = hexAlpha(color, strokeAlpha);
            ctx.lineWidth   = strokeW;
            ctx.stroke();

        // ── SETAS ─────────────────────────────────────────────────────────────
        } else if (anno.type && anno.size) {
            const x = anno.x * img.naturalWidth;
            const y = anno.y * img.naturalHeight;
            const s = anno.size * img.naturalWidth;
            let headLength = s*0.3, shaftWidth = s*0.1;
            ctx.translate(x, y);
            ctx.rotate(anno.rotation);
            ctx.scale(anno.scale, anno.scale);
            ctx.beginPath();
            if (anno.type==='normal') {
                ctx.moveTo(-s/2+headLength,0); ctx.lineTo(s/2,0);
                ctx.lineTo(s/2-headLength,-headLength/2); ctx.moveTo(s/2,0);
                ctx.lineTo(s/2-headLength,headLength/2);
                ctx.fillStyle=color; ctx.fill();
                ctx.strokeStyle=color; ctx.lineWidth=shaftWidth; ctx.lineCap='round'; ctx.stroke();
            } else if (anno.type==='outline') {
                headLength=s*0.4; shaftWidth=s*0.15;
                ctx.moveTo(-s/2,-shaftWidth/2); ctx.lineTo(-s/2,shaftWidth/2);
                ctx.lineTo(s/2-headLength,shaftWidth/2); ctx.lineTo(s/2-headLength,headLength/2);
                ctx.lineTo(s/2,0); ctx.lineTo(s/2-headLength,-headLength/2);
                ctx.lineTo(s/2-headLength,-shaftWidth/2); ctx.closePath();
                ctx.strokeStyle=color; ctx.lineWidth=isActive?4*drawingScale:2*drawingScale; ctx.lineJoin='miter'; ctx.stroke();
            } else if (anno.type==='complex') {
                headLength=s*0.4; shaftWidth=s*0.2;
                ctx.moveTo(-s/2,-shaftWidth/2); ctx.lineTo(-s/2,shaftWidth/2);
                ctx.lineTo(s/2-headLength,shaftWidth/2); ctx.lineTo(s/2-headLength,headLength/1.5);
                ctx.lineTo(s/2,0); ctx.lineTo(s/2-headLength,-headLength/1.5);
                ctx.lineTo(s/2-headLength,-shaftWidth/2); ctx.closePath();
                ctx.fillStyle=color; ctx.fill();
                ctx.strokeStyle=color; ctx.lineWidth=1*drawingScale; ctx.lineJoin='miter'; ctx.stroke();
            }

        // ── TEXTO ────────────────────────────────────────────────────────────
        } else if (anno.text && anno.x !== undefined) {
            const x = anno.x * img.naturalWidth;
            const y = anno.y * img.naturalHeight;
            const fs = (parseInt(anno.font) || 24) * drawingScale;
            ctx.font = `bold ${fs}px Arial`;
            ctx.textAlign = 'center';
            // Sombra escura
            ctx.lineWidth   = 5 * drawingScale;
            ctx.strokeStyle = 'rgba(0,0,0,0.7)';
            ctx.strokeText(anno.text, x, y);
            ctx.fillStyle = color;
            ctx.fillText(anno.text, x, y);

        // ── MEDIÇÃO (start/end com texto) ────────────────────────────────────
        } else if (anno.start && anno.end) {
            const p1 = {x: anno.start.x*img.naturalWidth, y: anno.start.y*img.naturalHeight};
            const p2 = {x: anno.end.x*img.naturalWidth,   y: anno.end.y*img.naturalHeight};
            ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y);
            ctx.strokeStyle = color;
            ctx.lineWidth   = baseWidth;
            ctx.stroke();
            if (anno.text) {
                const fs = 20*drawingScale;
                ctx.font = `bold ${fs}px Arial`;
                ctx.textAlign = 'center';
                const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2;
                ctx.lineWidth=4*drawingScale; ctx.strokeStyle='rgba(0,0,0,0.7)';
                ctx.strokeText(anno.text, mx, my-10);
                ctx.fillStyle=color;
                ctx.fillText(anno.text, mx, my-10);
            }
        }

        ctx.restore();
    }

    // ---- CLICK NA LISTA ----
    listEl.addEventListener('click', e => {
        const item = e.target.closest('.finding-item');
        if (!item) return;
        document.querySelectorAll('.finding-item').forEach(el => el.classList.remove('active'));
        const id = item.dataset.annotationId;
        if (activeAnnotationId === id) {
            resetView();
        } else {
            activeAnnotationId = id; showAll = false;
            item.classList.add('active');
            const anno = DATA.annotations.find(a => a.id === id);
            if (anno) {
                const sevColor = item.dataset.severityColor || '#00ffff';
                const sevLevel = item.dataset.severity || 'complement';
                const cardText = item.innerText.replace(/\n/g,' ').trim();
                updateFindingCard(cardText, sevColor, sevLevel);
                zoomNatural(anno);
                startPulse();
            }
        }
        render();
    });

    // ---- ZOOM NATURAL ----
    function zoomNatural(anno) {
        let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
        if (anno.points) {
            anno.points.forEach(p=>{minX=Math.min(minX,p.x);maxX=Math.max(maxX,p.x);minY=Math.min(minY,p.y);maxY=Math.max(maxY,p.y);});
        } else if (anno.start&&anno.end) {
            minX=Math.min(anno.start.x,anno.end.x);maxX=Math.max(anno.start.x,anno.end.x);
            minY=Math.min(anno.start.y,anno.end.y);maxY=Math.max(anno.start.y,anno.end.y);
        } else if (anno.x!==undefined) {
            let size=anno.size?(anno.size*(anno.scale||1)):0.08;
            minX=anno.x-(size/2);maxX=anno.x+(size/2);minY=anno.y-(size/2);maxY=anno.y+(size/2);
        }
        if (maxX-minX<0.1){minX-=0.1;maxX+=0.1;}
        if (maxY-minY<0.1){minY-=0.1;maxY+=0.1;}
        const regW=(maxX-minX)*img.naturalWidth;
        const regH=(maxY-minY)*img.naturalHeight;
        const landscape=isLandscapeMobile();
        const padX=canvas.width*(landscape?0.18:0.3);
        const padY=canvas.height*(landscape?0.18:0.3);
        let tScale=Math.min((canvas.width-padX)/regW,(canvas.height-padY)/regH);
        tScale=Math.min(tScale,3.5);
        tScale=Math.max(tScale,Math.min(canvas.width/img.naturalWidth,canvas.height/img.naturalHeight));
        const cX=((minX+maxX)/2)*img.naturalWidth;
        const cY=((minY+maxY)/2)*img.naturalHeight;
        scale=tScale; panX=(canvas.width/2)-(cX*scale);
        const ratioY=landscape?0.47:(window.innerWidth<=768?0.35:0.5);
        panY=(canvas.height*ratioY)-(cY*scale);
    }

    // ---- MOUSE / TOUCH ----
    viewer.addEventListener('mousedown', e=>{isDragging=true;startX=e.clientX-panX;startY=e.clientY-panY;startClickX=e.clientX;startClickY=e.clientY;});
    viewer.addEventListener('mousemove', e=>{if(isDragging){panX=e.clientX-startX;panY=e.clientY-startY;render();}});
    viewer.addEventListener('mouseup', ()=>isDragging=false);

    viewer.addEventListener('click', e=>{
        if(Math.abs(e.clientX-startClickX)>5||Math.abs(e.clientY-startClickY)>5)return;
        if(e.target.closest('#finding-card')||e.target.closest('#app-header'))return;
        const rect=canvas.getBoundingClientRect();
        const relX=((e.clientX-rect.left-panX)/scale)/img.naturalWidth;
        const relY=((e.clientY-rect.top-panY)/scale)/img.naturalHeight;
        let clickedAnno=null,minDist=Infinity;
        const threshold=0.05;
        DATA.annotations.forEach(anno=>{
            let dist=Infinity;
            if(anno.points){anno.points.forEach(p=>{const d=Math.hypot(p.x-relX,p.y-relY);if(d<dist)dist=d;});}
            else if(anno.start&&anno.end){const mx=(anno.start.x+anno.end.x)/2,my=(anno.start.y+anno.end.y)/2;dist=Math.hypot(mx-relX,my-relY);}
            else if(anno.x!==undefined){dist=Math.hypot(anno.x-relX,anno.y-relY);}
            if(dist<threshold&&dist<minDist){minDist=dist;clickedAnno=anno;}
        });
        if(clickedAnno){
            const li=document.querySelector(`.finding-item[data-annotation-id="${clickedAnno.id}"]`);
            if(li){li.click();li.scrollIntoView({behavior:'smooth',block:'nearest'});}
        } else { resetView(); }
    });

    viewer.addEventListener('wheel',e=>{
        e.preventDefault();const d=e.deltaY>0?0.9:1.1;
        const mx=e.clientX-canvas.getBoundingClientRect().left;
        const my=e.clientY-canvas.getBoundingClientRect().top;
        panX=mx-(mx-panX)*d;panY=my-(my-panY)*d;scale*=d;render();
    });

    let idist=0,iscale=1;
    viewer.addEventListener('touchstart',e=>{
        if(e.touches.length===2){idist=Math.hypot(e.touches[0].pageX-e.touches[1].pageX,e.touches[0].pageY-e.touches[1].pageY);iscale=scale;}
        else if(e.touches.length===1){isDragging=true;startX=e.touches[0].clientX-panX;startY=e.touches[0].clientY-panY;startClickX=e.touches[0].clientX;startClickY=e.touches[0].clientY;}
    },{passive:false});
    viewer.addEventListener('touchmove',e=>{
        e.preventDefault();
        if(e.touches.length===2){
            const dist=Math.hypot(e.touches[0].pageX-e.touches[1].pageX,e.touches[0].pageY-e.touches[1].pageY);
            const delta=dist/idist;const cx=viewer.offsetWidth/2,cy=viewer.offsetHeight/2;
            const ns=iscale*delta;panX=cx-(cx-panX)*(ns/scale);panY=cy-(cy-panY)*(ns/scale);scale=ns;render();
        } else if(isDragging&&e.touches.length===1){panX=e.touches[0].clientX-startX;panY=e.touches[0].clientY-startY;render();}
    },{passive:false});
    viewer.addEventListener('touchend',()=>isDragging=false);

    // ---- MODO VISÃO GERAL E FILTRO DE CATEGORIA ----
    // activeFilter: null | 'critical' | 'semi' | 'attention' | 'complement'
    let activeFilter = null;

    // Smooth animated zoom
    let animFrame = null;
    function smoothZoomTo(targetScale, targetPanX, targetPanY, duration) {
        if (animFrame) cancelAnimationFrame(animFrame);
        const startScale = scale, startPanX = panX, startPanY = panY;
        const startTime = performance.now();
        function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
        function step(now) {
            const t = Math.min((now - startTime) / duration, 1);
            const e = ease(t);
            scale = startScale + (targetScale - startScale) * e;
            panX  = startPanX  + (targetPanX  - startPanX)  * e;
            panY  = startPanY  + (targetPanY  - startPanY)  * e;
            render();
            if (t < 1) animFrame = requestAnimationFrame(step);
            else animFrame = null;
        }
        animFrame = requestAnimationFrame(step);
    }

    // Calcula zoom que engloba um conjunto de annotations
    function calcZoomForAnnos(annos) {
        let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
        annos.forEach(anno => {
            if (anno.points) {
                anno.points.forEach(p=>{minX=Math.min(minX,p.x);maxX=Math.max(maxX,p.x);minY=Math.min(minY,p.y);maxY=Math.max(maxY,p.y);});
            } else if (anno.start&&anno.end) {
                minX=Math.min(minX,anno.start.x,anno.end.x);maxX=Math.max(maxX,anno.start.x,anno.end.x);
                minY=Math.min(minY,anno.start.y,anno.end.y);maxY=Math.max(maxY,anno.start.y,anno.end.y);
            } else if (anno.x!==undefined) {
                const s=anno.size?(anno.size*(anno.scale||1)):0.08;
                minX=Math.min(minX,anno.x-s/2);maxX=Math.max(maxX,anno.x+s/2);
                minY=Math.min(minY,anno.y-s/2);maxY=Math.max(maxY,anno.y+s/2);
            }
        });
        if (!isFinite(minX)) return null;
        const pad = 0.08;
        minX-=pad; maxX+=pad; minY-=pad; maxY+=pad;
        minX=Math.max(0,minX); maxX=Math.min(1,maxX);
        minY=Math.max(0,minY); maxY=Math.min(1,maxY);
        const regW=(maxX-minX)*img.naturalWidth;
        const regH=(maxY-minY)*img.naturalHeight;
        const padPx = 60;
        let ts = Math.min((canvas.width-padPx*2)/regW, (canvas.height-padPx*2)/regH);
        const fitMin = Math.min(canvas.width/img.naturalWidth, canvas.height/img.naturalHeight);
        ts = Math.max(ts, fitMin);
        const cX=((minX+maxX)/2)*img.naturalWidth;
        const cY=((minY+maxY)/2)*img.naturalHeight;
        return {
            scale: ts,
            panX: canvas.width/2 - cX*ts,
            panY: canvas.height/2 - cY*ts
        };
    }

    function toggleAllAction(){
        activeFilter = null;
        showAll=!showAll;activeAnnotationId=null;closeCard();
        document.querySelectorAll('.finding-item').forEach(el=>el.classList.remove('active'));
        document.querySelectorAll('.sev-count').forEach(el=>el.classList.remove('active-filter'));
        stopPulse();
        const ts = calcZoomForAnnos(DATA.annotations);
        if (ts && showAll) {
            smoothZoomTo(ts.scale, ts.panX, ts.panY, 420);
        } else {
            smoothZoomTo(
                Math.min(canvas.width/img.naturalWidth, canvas.height/img.naturalHeight),
                (canvas.width - img.naturalWidth * Math.min(canvas.width/img.naturalWidth, canvas.height/img.naturalHeight)) / 2,
                (canvas.height - img.naturalHeight * Math.min(canvas.width/img.naturalWidth, canvas.height/img.naturalHeight)) / 2,
                380
            );
        }
        render();
    }

    function activateSeverityFilter(sevLevel) {
        // Toggle: clicar no mesmo desativa
        if (activeFilter === sevLevel) {
            activeFilter = null;
            showAll = false;
            document.querySelectorAll('.sev-count').forEach(el=>el.classList.remove('active-filter'));
            document.querySelectorAll('.finding-item').forEach(el=>el.classList.remove('active'));
            activeAnnotationId = null;
            closeCard();
            stopPulse();
            smoothZoomTo(
                Math.min(canvas.width/img.naturalWidth, canvas.height/img.naturalHeight),
                (canvas.width - img.naturalWidth * Math.min(canvas.width/img.naturalWidth, canvas.height/img.naturalHeight)) / 2,
                (canvas.height - img.naturalHeight * Math.min(canvas.width/img.naturalWidth, canvas.height/img.naturalHeight)) / 2,
                380
            );
            render();
            return;
        }

        activeFilter = sevLevel;
        showAll = false;
        activeAnnotationId = null;
        closeCard();
        stopPulse();
        document.querySelectorAll('.finding-item').forEach(el=>el.classList.remove('active'));
        document.querySelectorAll('.sev-count').forEach(el=>el.classList.remove('active-filter'));
        const badge = document.querySelector(`.sev-count.${sevLevel}`);
        if (badge) badge.classList.add('active-filter');

        // Coleta annotations da categoria
        const filteredAnnos = DATA.annotations.filter(anno => {
            const li = document.querySelector(`.finding-item[data-annotation-id="${anno.id}"]`);
            return li && li.dataset.severity === sevLevel;
        });

        // Zoom suave para cobrir a área
        if (filteredAnnos.length > 0) {
            if (filteredAnnos.length === 1) {
                // Um único achado: usa zoom natural mas animado
                const savedScale = scale, savedPanX = panX, savedPanY = panY;
                fitImage(); // parte do fit
                const fromScale = scale, fromPanX = panX, fromPanY = panY;
                zoomNatural(filteredAnnos[0]);
                const toScale = scale, toPanX = panX, toPanY = panY;
                // restaura ponto de partida e anima
                scale = fromScale; panX = fromPanX; panY = fromPanY;
                smoothZoomTo(toScale, toPanX, toPanY, 480);
            } else {
                const ts = calcZoomForAnnos(filteredAnnos);
                if (ts) smoothZoomTo(ts.scale, ts.panX, ts.panY, 450);
            }
        }

        // Inicia pulso contínuo para os achados filtrados
        startPulse();
        render();
    }

    document.getElementById('btn-toggle-all').addEventListener('click',toggleAllAction);
    document.getElementById('btn-toggle-all-header').addEventListener('click',toggleAllAction);
    document.getElementById('btn-reset-zoom').addEventListener('click',resetView);

    // ---- CONTADOR DE SEVERIDADE ----
    function buildSeveritySummary(counts, total) {
        const el = document.getElementById('severity-summary');
        const parts = [];
        const defs = [
            { key: 'critical',   cls: 'critical',   label: (n) => `${n} crítico${n>1?'s':''}` },
            { key: 'semi',       cls: 'semi',        label: (n) => `${n} semi-crítico${n>1?'s':''}` },
            { key: 'attention',  cls: 'attention',   label: (n) => `${n} atenção` },
            { key: 'complement', cls: 'complement',  label: (n) => `${n} complementar${n>1?'es':''}` },
        ];
        defs.forEach(d => {
            if (!counts[d.key]) return;
            parts.push(`<span class="sev-count ${d.cls}" data-filter="${d.key}" title="Destacar achados ${d.label(counts[d.key])}"><span class="sev-dot ${d.cls}"></span>${d.label(counts[d.key])}</span>`);
        });
        el.innerHTML = `<span style="font-size:11px;color:#555;margin-right:4px;">${total} achados</span>` + parts.join('');

        // Eventos de clique nos badges
        el.querySelectorAll('.sev-count[data-filter]').forEach(badge => {
            badge.addEventListener('click', () => {
                activateSeverityFilter(badge.dataset.filter);
            });
        });
    }
} // fim do bloco else DATA
</script>
</body>
</html>
