<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Laudo Interativo</title>
<style>
* { box-sizing: border-box; }
:root { 
    --bg-color: #000; 
    --text-color: #eee; 
    --accent: #007bff; 
    --c-critical: #e53e3e; 
    --c-semicritical: #dd6b20; 
    --c-attention: #d69e2e; 
    --c-complementar: #38a169; 
}

body { 
    margin: 0; 
    padding: 0; 
    background: var(--bg-color); 
    color: var(--text-color); 
    font-family: 'Segoe UI', sans-serif; 
}

/* LAYOUT PRINCIPAL (Mobile Portrait Padrão) */
#app-layout {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    width: 100vw;
    overflow: hidden;
    background: #000;
}

/* TOP AREA: HEADER & CAROUSEL */
#top-area {
    flex-shrink: 0;
    background: #111;
    border-bottom: 1px solid #222;
    display: flex;
    flex-direction: column;
    z-index: 20;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}

#app-header-row {
    display: flex; 
    align-items: center; 
    justify-content: space-between;
    padding: 4px 15px 0px 15px; /* Compensação milimétrica de espaço para o novo texto */
}

.laudo-title { 
    font-size: 13px; 
    font-weight: 800; 
    text-transform: uppercase; 
    letter-spacing: 1.5px; 
    color: #bbb; 
}

.premium-subtitle {
    font-size: 13px;
    font-weight: 900;
    color: #3b82f6; /* Azul Médico Premium */
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

#btn-visao-geral {
    background: rgba(0, 123, 255, 0.15); 
    color: #5a9fd4; 
    border: 1px solid rgba(0, 123, 255, 0.28);
    border-radius: 12px; 
    padding: 4px 12px; 
    font-size: 11px; 
    font-weight: 700; 
    cursor: pointer;
    transition: all 0.2s;
}
#btn-visao-geral:active { background: rgba(0, 123, 255, 0.3); }

/* CAROUSEL / LISTA DE ACHADOS */
#findings-list {
    display: flex; 
    flex-direction: row; 
    overflow-x: auto; 
    overflow-y: hidden; 
    scroll-snap-type: x mandatory;
    padding: 2px 15px 4px 15px; /* Ajuste para não empurrar o viewer */
    gap: 12px; 
    scrollbar-width: none; /* Firefox */
    -webkit-overflow-scrolling: touch;
}
#findings-list::-webkit-scrollbar { display: none; /* Chrome/Safari */ }

.finding-item {
    flex: 0 0 260px; 
    width: 260px; 
    scroll-snap-align: center;
    background: #181818; 
    border-radius: 10px; 
    cursor: pointer;
    display: flex; 
    flex-direction: column; 
    transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
    border-top: 1px solid #2a2a2a;
    border-bottom: 1px solid #2a2a2a;
    border-left: 4px solid transparent; 
    border-right: 4px solid transparent; 
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
.finding-item:hover {
    background: #1e1e1e;
}
.finding-item.active {
    background: #222; 
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.8);
}

.item-header {
    display: flex; 
    justify-content: space-between; 
    align-items: center;
    padding: 8px 12px; 
    border-radius: 10px 10px 0 0;
}
.item-entity-label { 
    font-size: 11px; 
    font-weight: 900; 
    letter-spacing: 0.5px; 
}
.item-category-label {
    font-size: 9px; 
    font-weight: 800; 
    padding: 3px 6px; 
    border-radius: 5px;
    text-transform: uppercase; 
    letter-spacing: 1px;
}
.item-body { 
    padding: 10px 12px; 
    font-size: 12px; 
    color: #ccc; 
    line-height: 1.5; 
    display: flex;
    flex-direction: column;
}
.item-text {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    text-overflow: ellipsis;
}
.item-text.expanded {
    -webkit-line-clamp: unset;
}
.btn-ver-mais {
    align-self: flex-end;
    font-size: 10px;
    font-weight: 700;
    color: #6daaf0;
    margin-top: 6px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
}

/* NAV MENU */
#carousel-nav {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    padding-bottom: 5px;
}
.nav-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #bbb;
    border-radius: 12px;
    width: 32px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 10px;
    transition: all 0.2s;
}
.nav-btn:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
}
#nav-counter {
    font-size: 11px;
    color: #888;
    font-weight: 700;
    width: 45px;
    text-align: center;
}

/* VIEWER AREA */
#viewer-area { 
    flex: 1; 
    position: relative; 
    overflow: hidden; 
    background: #000; 
    cursor: grab; 
    display: flex;
    align-items: center;
    justify-content: center;
}
#viewer-area:active { cursor: grabbing; }
canvas { display: block; }

/* ==========================================================
   BOTTOM ACTION AREA & GRID REFINADO (CORREÇÃO OVERFLOW)
========================================================== */
#bottom-area {
    flex-shrink: 0; 
    background: #111; 
    border-top: 1px solid #222;
    z-index: 20; 
    display: none; 
    flex-direction: column;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.6);
}
#bottom-area.visible { 
    display: flex; 
}

#action-card {
    background: #181818; 
    padding: 12px 15px; 
    border-left: 5px solid transparent; 
    cursor: pointer; 
    transition: background 0.2s;
    width: 100%;
}
#action-card:hover { background: #1c1c1c; }

.ac-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: 12px;
    margin-bottom: 10px; 
    width: 100%;
}
.ac-item {
    font-size: 11px;
    line-height: 1.3;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
}
.ac-item.full-width {
    grid-column: 1 / -1;
    align-items: center;
    margin-bottom: 4px;
}
.ac-item strong { 
    display: flex; 
    align-items: center;
    gap: 5px;
    font-size: 8.5px; 
    text-transform: uppercase; 
    color: #777; 
    margin-bottom: 5px; 
    letter-spacing: 0.5px; 
    white-space: nowrap; 
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
}

.ac-content {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    width: 100%;
}
.ac-item.full-width .ac-content {
    justify-content: center;
}

.diag-tag { 
    display: block; 
    font-size: 12px; 
    color: #fff; 
    font-weight: 700; 
    letter-spacing: 0.2px;
    line-height: 1.4;
    white-space: normal; 
    word-wrap: break-word;
    width: 100%;
}

.impact-tag, .recommend-tag { 
    display: inline-block; 
    border-radius: 5px; 
    padding: 5px 8px; 
    font-size: 10.5px; 
    line-height: 1.3;
    margin: 0; 
    white-space: normal; 
    word-wrap: break-word;
    text-align: left;
}
.ac-item.full-width .impact-tag {
    text-align: center; 
}
.impact-tag { 
    background: rgba(100,116,139,0.15); 
    border: 1px solid rgba(100,116,139,0.3); 
    color: #94a3b8; 
}
.recommend-tag { 
    background: rgba(56,161,105,0.1); 
    border: 1px solid rgba(56,161,105,0.25); 
    color: #68d391; 
}

#zoom-instruction {
    font-size: 8.5px; 
    color: #444; 
    text-align: center; 
    margin-top: 6px; 
    text-transform: uppercase; 
    letter-spacing: 1px;
    font-weight: 700;
}

#signature-area { 
    text-align: center; 
    padding: 6px; 
    background: #0a0a0a; 
    border-top: 1px solid #1a1a1a; 
}
#signature-img { 
    max-height: 25px; 
    filter: brightness(0) invert(1); 
    opacity: 0.7; 
}

/* ==========================================================
   LAYOUT RESPONSIVO (DESKTOP E MOBILE LANDSCAPE)
========================================================== */
@media (min-width: 900px), (orientation: landscape) {
    #app-layout {
        display: grid;
        grid-template-columns: 320px 1fr;
        grid-template-rows: 1fr auto;
    }
    
    #top-area {
        grid-column: 1 / 2;
        grid-row: 1 / 3; 
        border-right: 1px solid #222;
        border-bottom: none;
    }
    
    #findings-list {
        flex-direction: column; 
        overflow-y: auto;
        overflow-x: hidden;
        scroll-snap-type: none; 
        padding: 15px;
        flex: 1; 
    }
    
    .finding-item {
        width: 100%;
        flex: 0 0 auto;
    }
    
    #carousel-nav {
        display: none !important; 
    }
    
    #viewer-area {
        grid-column: 2 / 3;
        grid-row: 1 / 2;
    }
    
    #bottom-area {
        grid-column: 2 / 3;
        grid-row: 2 / 3;
    }
}
</style>
</head>
<body>

<div id="app-layout">
    <div id="top-area">
        <div id="app-header-row">
            <div style="display:flex; flex-direction:column; gap:1px;">
                <div style="display:flex; align-items:center; gap:8px;">
                    <span class="laudo-title">&#128269; Laudo Interativo</span>
                    <span id="achados-count" style="font-size:10px; color:#666; font-weight:700;"></span>
                </div>
                <span class="premium-subtitle">Achados Radiográficos</span>
                <!-- TEXTO DE INSTRUÇÃO -->
                <span style="font-size: 8.5px; color: #888; font-weight: 600; letter-spacing: 0.3px;">Toque nos cards para explorar detalhes e condutas clínicas</span>
            </div>
            <button id="btn-visao-geral">Visão Geral</button>
        </div>
        
        <div id="findings-list">Carregando...</div>
        
        <div id="carousel-nav">
            <button id="nav-prev" class="nav-btn">◀</button>
            <span id="nav-counter">0 / 0</span>
            <button id="nav-next" class="nav-btn">▶</button>
        </div>
    </div>
    
    <div id="viewer-area">
        <canvas id="canvas"></canvas>
    </div>
    
    <div id="bottom-area">
        <div id="action-card">
            <div class="ac-grid">
                <div id="ac-diagnostic" class="ac-item">
                    <strong>🔬 Hipótese Diagnóstica</strong> 
                    <div class="ac-content"></div>
                </div>
                <div id="ac-recommend" class="ac-item">
                    <strong>📸 Exame Sugerido</strong> 
                    <div class="ac-content"></div>
                </div>
            </div>
            <div id="ac-impact" class="ac-item full-width center">
                <strong>💡 Conduta Provável</strong> 
                <div class="ac-content"></div>
            </div>
            
            <div id="zoom-instruction">Toque neste card para super zoom no achado</div>
        </div>
        <div id="signature-area">
            <img id="signature-img" src="assinatura.png" alt="Assinatura" onerror="this.style.display='none'">
        </div>
    </div>
</div>

<script>
// ============================================================
// SEV LABELS & RULES
// ============================================================
const SEV_LABELS = {
    critical:   { short:'Crítico', bandColor:'#e53e3e', bandBg:'rgba(229,62,62,0.18)' },
    semi:       { short:'Importante', bandColor:'#f6ad55', bandBg:'rgba(221,107,32,0.18)' },
    attention:  { short:'Acompanhar', bandColor:'#f6e05e', bandBg:'rgba(214,158,46,0.18)' },
    complement: { short:'Secundário', bandColor:'#68d391', bandBg:'rgba(56,161,105,0.18)' },
};

const SEV_RULES =[
    { level:'critical', color:'#e53e3e', words:['incluso','impactado','reabsorção','envolvimento pulpar','comprometimento pulpar','lesão extensa','rarefação','radiolúcida','radiolucida','periápice','periapice','canal mandibular','íntima proximidade','intima proximidade','cisto','tumor','necrose','fístula','fistula','abscesso','osteíte','osteite','fratura','dilaceração severa','reabsorção radicular','reabsorcao radicular','reabsorção interna','reabsorção externa','rarefação na região de furca','rarefação interradicular','lesão de furca','furca comprometida','reabsorção patológica','rizólise patológica','rizólise acelerada','rarefação óssea na região de furca','rarefação óssea interradicular','lesão de furca em dente permanente'] },
    { level:'semi',     color:'#dd6b20', words:['semi-incluso','semi incluso','cárie','cariosa','carie','obturação inadequada','restauração com falha','sobrecontorno','subcontorno','remanescente radicular','alvéolo','alveolo','espessamento','seio maxilar','sinusite','mucosite','lesão cariosa','lesão radiolúcida','lesão radiolucida','peri-implantite','mobilidade','lesão periapical','pericoronite','cárie em decíduo','carie em deciduo','cárie em dente decíduo','lesão cariosa em decíduo','rizólise','reabsorção fisiológica','reabsorção radicular fisiológica'] },
    { level:'attention',color:'#d69e2e', words:['aumento do espaço','calcificação','atrição','giroversão','dilaceração','arredondamento apical','pino intrarradicular','implante','contenção','cálculo','calculo','perda óssea','perda ossea','reabsorção leve','obturação','restauração radiopaca','tratado endodonticamente','endodonticamente','condensação','selamento','semi-irrompido','irrompido','decíduo','deciduo','dente de leite','erupção do sucessor','rizólise em estágio','estágio de rizólise','reabsorção radicular em estágio'] },
];

function classifyText(t) {
    const l=t.toLowerCase();
    for(const r of SEV_RULES) if(r.words.some(w=>l.includes(w))) return {level:r.level,color:r.color};
    return {level:'complement',color:'#38a169'};
}

// ============================================================
// BANCO DIAGNÓSTICO
// ============================================================
const DIAGNOSTIC_BANK =[
    { words: ['reabsorção interna', 'reabsorcao interna'], diag: 'Reabsorção Radicular Interna' },
    { words:['reabsorção externa', 'reabsorcao externa', 'reabsorção cervical'], diag: 'Reabsorção Radicular Externa' },
    { words:['reabsorção radicular', 'reabsorcao radicular'], diag: 'Reabsorção Radicular' },
    { words:['furca comprometida', 'lesão de furca', 'rarefação na região de furca', 'rarefação interradicular'], diag: 'Envolvimento de Furca' },
    { words:['cárie', 'cariosa', 'carie', 'lesão cariosa'], diag: 'Cárie Dentária' },
    { words:['perda óssea', 'reabsorção alveolar', 'defeito ósseo', 'defeito angular'], diag: 'Doença Periodontal (Perda Óssea)' },
    { words:['abscesso', 'fístula', 'fistula', 'lesão periapical', 'periápice', 'periapice', 'rarefação periapical'], diag: 'Periodontite Apical (Lesão Periapical)' },
    { words:['cálculo', 'calculo', 'tártaro'], diag: 'Cálculo Dental' },
    { words:['incluso', 'impactado', 'semi-incluso', 'pericoronite'], diag: 'Dente Incluso / Impactado' },
    { words:['seio maxilar', 'espessamento', 'sinusite', 'mucosite', 'velamento'], diag: 'Alteração Sinusal (Espessamento / Mucosite)' },
    { words:['canal mandibular', 'íntima proximidade', 'nervo alveolar'], diag: 'Proximidade com Nervo Alveolar Inferior' },
    { words:['peri-implantite', 'perda óssea peri-implantar'], diag: 'Peri-implantite' },
    { words:['implante', 'osseointegrado'], diag: 'Implante Osseointegrado' },
    { words:['cisto', 'lesão cística', 'dentígero', 'folicular'], diag: 'Lesão de Aspecto Cístico' },
    { words:['tumor', 'lesão mista', 'lesão multilocular'], diag: 'Lesão Óssea / Aspecto Tumoral' },
    { words: ['fratura', 'linha de fratura'], diag: 'Fratura Radicular / Dental' },
    { words: ['sobrecontorno', 'subcontorno'], diag: 'Falha em Restauração (Sobre/Subcontorno)' },
    { words:['dilaceração', 'dilaceracao'], diag: 'Dilaceração Radicular' },
    { words:['desgaste', 'atrição', 'sobrecarga oclusal'], diag: 'Desgaste Dental / Atrição' },
    { words:['obturação inadequada', 'falha', 'subobtur', 'sobreobtur'], diag: 'Tratamento Endodôntico Deficiente' },
    { words:['tratado endodonticamente', 'endodonticamente'], diag: 'Dente Tratado Endodonticamente' },
    { words:['raiz residual', 'remanescente radicular', 'raízes residuais', 'raiz retida'], diag: 'Raiz Residual' },
    { words:['calcificação pulpar', 'esclerose pulpar'], diag: 'Calcificação Pulpar' },
    { words:['atm', 'côndilo', 'articulação'], diag: 'Alteração em ATM' },
    { words:['alvéolo', 'alveolo', 'pós-exodontia', 'alveolite'], diag: 'Alvéolo em Reparação' },
    { words:['contenção', 'aparelho', 'braquete'], diag: 'Dispositivo Ortodôntico' }
];

function getDiagnosticHypothesis(text) {
    const lower = text.toLowerCase();
    for (const item of DIAGNOSTIC_BANK) {
        if (item.words.some(w => lower.includes(w))) return item.diag;
    }
    return 'Achado Radiográfico (Avaliação Clínica)';
}

// ============================================================
// DENTES E CARD TITLE
// ============================================================
const DENTES_ANTERIORES=['11','12','13','21','22','23','31','32','33','41','42','43'];
const DENTES_DECIDUOS=['51','52','53','54','55','61','62','63','64','65','71','72','73','74','75','81','82','83','84','85'];

function isDentDeciduo(t) {
    const m=t.match(/\b([5-8][1-5])\b/g);
    if(m) return m.some(n=>DENTES_DECIDUOS.includes(n));
    const l=t.toLowerCase();
    return l.includes('decíduo')||l.includes('deciduo')||l.includes('dente de leite')||l.includes('leite');
}

function temFurca(t) { const l=t.toLowerCase(); return l.includes('furca')||l.includes('interradicular')||l.includes('bifurcação')||l.includes('trifurcação'); }
function detectSobrecontornoTipo(t) {
    const l=t.toLowerCase();
    if(!l.includes('sobrecontorno')) return null;
    const m=t.match(/\b([1-4][1-8])\b/g);
    if(m) { for(const n of m) { if(DENTES_ANTERIORES.includes(n)) return 'anterior'; } return 'posterior'; }
    if(['incisivo','canino','central','lateral','anterior'].some(w=>l.includes(w))) return 'anterior';
    return 'posterior';
}

function extractCardTitle(text) {
    const lower = text.toLowerCase();
    const matches = text.match(/\b([1-4][1-8]|[5-8][1-5])\b/g);
    if (matches) {
        const uniqueTeeth =[...new Set(matches)];
        return { label: 'DENTE', number: uniqueTeeth.join(', ') };
    }
    const ctxMap=[
        {keys:['sinusite','seio maxilar','espessamento mucoso','mucosite sinusal','velamento','pseudocisto sinusal'],label:'SEIO MAXILAR'},
        {keys:['perda óssea','perda ossea','reabsorção alveolar','suporte periodontal','defeito ósseo','nível ósseo'],label:'PERDA ÓSSEA'},
        {keys:['lesão cística','cisto','dentígero','folicular'],label:'LESÃO CÍSTICA'},
        {keys:['tumor','lesão mista','lesão radiopaca irregular','lesão multilocular'],label:'LESÃO ÓSSEA'},
        {keys:['fratura','linha de fratura'],label:'FRATURA'},
        {keys:['canal mandibular','íntima proximidade','nervo alveolar inferior'],label:'CANAL MAND.'},
        {keys:['implante','osseointegrado','peri-implantite'],label:'IMPLANTE'},
        {keys:['atm','côndilo','articulação temporomandibular'],label:'ATM'},
        {keys:['alvéolo','alveolo','alveolite','pós-exodontia'],label:'ALVÉOLO'},
        {keys:['raízes residuais','raiz residual','remanescente radicular','raiz retida'],label:'RAIZ RES.'},
        {keys:['cálculo','calculo','tártaro'],label:'CÁLCULO'},
        {keys:['atrição','desgaste','sobrecarga oclusal'],label:'DESGASTE'},
        {keys:['contenção','aparelho ortodôntico'],label:'ORTODONTIA'},
        {keys:['incisivo','canino','central','lateral','anterior'],label:'REG. ANTERIOR'},
        {keys:['molar','pré-molar','premolar','posterior'],label:'REG. POSTERIOR'},
    ];
    for(const c of ctxMap) if(c.keys.some(k=>lower.includes(k))) return {label:c.label,number:null};
    return {label:'ACHADO',number:null};
}

// ============================================================
// CONDUTAS E EXAMES 
// ============================================================
function pickVar(annoId, variants) {
    if(!annoId||variants.length===1) return variants[0];
    const hash=(annoId+'').split('').reduce((a,c)=>a+c.charCodeAt(0),0);
    return variants[hash%variants.length];
}

const IMPACT_BANK = {
    endo_urgente:['Tratamento endodôntico de urgência','Pulpectomia indicada','Endodontia clínica com urgência'],
    endo_eletivo:['Tratamento endodôntico eletivo','Pulpectomia eletiva indicada','Canal radicular — avaliação e planejamento'],
    endo_retratamento:['Retratamento endodôntico indicado','Revisão do tratamento endodôntico','Avaliação para retratamento'],
    obturacao_inadequada:['Avaliação do selamento apical','Retratamento por obturação inadequada','Revisão endodôntica'],
    tratado_controle:['Controle radiográfico periódico','Acompanhamento anual','Radiografia de controle pós-tratamento'],
    restauracao:['Restauração direta indicada','Controle e restauração da lesão cariosa'],
    restauracao_profunda:['Restauração com proteção pulpar','Capeamento pulpar indireto','Restauração profunda com monitoramento'],
    perio_basico:['Tratamento periodontal básico','Raspagem supra e subgengival'],
    perio_avancado:['Tratamento periodontal avançado','Avaliação periodontal cirúrgica'],
    furca_perm:['Avaliação periodontal — grau de furca','Possível exodontia ou tratamento periodontal'],
    calculo:['Raspagem e alisamento radicular','Profilaxia e raspagem subgengival'],
    cirurgia_incluso:['Avaliação cirúrgica para exodontia','Cirurgia de exodontia com CBCT'],
    cirurgia_residual:['Exodontia das raízes residuais','Cirurgia de remoção de raiz retida'],
    cirurgia_avaliar_exo:['Avaliar exodontia — destruição extensa','Avaliação de exodontia vs. reconstrução'],

function getImpactsAndRecommends(text, annoId) {
    const lower=text.toLowerCase();
    const temPulpar   =['envolvimento pulpar','comprometimento pulpar','câmara pulpar','exposição pulpar','necrose pulpar','cárie profunda','carie profunda','abscesso','fístula','lesão periapical','periápice','rarefação periapical'].some(w=>lower.includes(w));
    const temTratado  =['tratado endodonticamente','obturação endodôntica'].some(w=>lower.includes(w));
    const temResidual =['raízes residuais','remanescente radicular','raiz retida'].some(w=>lower.includes(w));
    const temDeciduo  =['decíduo','deciduo','dente de leite','rizólise'].some(w=>lower.includes(w))||isDentDeciduo(text);
    const temFurcaPerm=['rarefação na região de furca','lesão de furca','furca comprometida'].some(w=>lower.includes(w))&&!temDeciduo;
    const temFurcaDec =temFurca(text)&&temDeciduo;
    const hasAbscesso =lower.includes('abscesso')||lower.includes('fístula');
    
    const impacts=[]; const recommends=[]; const seenI=new Set(); const seenR=new Set();
    function addI(k){const v=pickVar(annoId,IMPACT_BANK[k]);if(!seenI.has(v)){impacts.push(v);seenI.add(v);}}
    function addR(k){const v=pickVar(annoId,RECOMMEND_BANK[k]);if(!seenR.has(v)){recommends.push(v);seenR.add(v);}}
    
    if(temFurcaPerm){addI('furca_perm');addR('periapical_paralelismo');}
    if(temFurcaDec){addI('deciduo_exo_urgente');addR('oclusal_deciduo');}
    if(temTratado){
        const temFalha=lower.includes('subobtur')||lower.includes('sobreobtur')||lower.includes('falha')||lower.includes('rarefação')||lower.includes('periápice');
        if(temFalha){addI('endo_retratamento');}else if(lower.includes('obturação inadequada')){addI('obturacao_inadequada');}else{addI('tratado_controle');}
        addR('periapical_controle');
    }
    if(!temTratado&&!temResidual){
        if(temDeciduo&&temPulpar){addI('deciduo_pulpotomia');addR('periapical');}
        else if(!temDeciduo&&temPulpar){
            if(hasAbscesso){addI('endo_urgente');}else{addI('endo_eletivo');}
            addR('periapical');
        }
    }
    if(temResidual){addI('cirurgia_residual');addR('periapical');}
    if(!temPulpar&&!temTratado&&!temResidual){
        const ehProfunda=lower.includes('cárie profunda')||lower.includes('lesão cariosa profunda');
        const ehDestruicao=lower.includes('destruição coronária');
        if(ehDestruicao){addI('cirurgia_avaliar_exo');addR('periapical');}
        else if(ehProfunda){addI('restauracao_profunda');addR('periapical');}
        else if(lower.includes('cárie')||lower.includes('carie')||lower.includes('cariosa')){
            if(temDeciduo){addI('deciduo_restauracao');addR('interproximal_deciduo');}
            else{
                addI('restauracao');
                if(lower.includes('interproximal')||lower.includes('proximal')){addR('interproximal');}else{addR('interproximal_ou_periapical');}
            }
        }
    }
    if(lower.includes('reabsorção radicular')||lower.includes('reabsorção interna')||lower.includes('reabsorção externa')){addI('reabsorcao');addR('cbct_reabsorcao');}
    if(lower.includes('perda óssea')||lower.includes('defeito ósseo')){
        if(lower.includes('defeito angular')||lower.includes('generalizada')){addI('perio_avancado');}else{addI('perio_basico');}
        addR('serie_periapical');
    }
    if(lower.includes('cálculo')||lower.includes('tártaro')){addI('calculo');addR('interproximal');}
    if(lower.includes('incluso')||lower.includes('impactado')||lower.includes('semi-incluso')){addI('cirurgia_incluso');addR('cbct');}
    if(lower.includes('seio maxilar')||lower.includes('sinusite')||lower.includes('mucosite')){addI('seio_investigar');addR('seios_paranasais');}
    if(lower.includes('canal mandibular')||lower.includes('íntima proximidade')){addI('canal_mand');addR('cbct_mandibula');}
    if(lower.includes('peri-implantite')){addI('implante_peri');addR('periapical_implante');}
    else if(lower.includes('implante osseointegrado')){addI('implante_acompanhar');addR('cbct_implante');}
    if(lower.includes('cisto')||lower.includes('dentígero')){addI('cisto');addR('cbct_cisto');}
    if(lower.includes('tumor')||lower.includes('lesão mista')){addI('tumor');addR('cbct');}
    if(lower.includes('fratura')){addI('fratura');addR('cbct_fratura');}
    if(lower.includes('sobrecontorno')){addI('sobrecontorno');if(detectSobrecontornoTipo(text)==='anterior'){addR('periapical');addR('avaliacao_clinica');}else{addR('interproximal');}}
    if(lower.includes('dilaceração')){addI('dilaceracao');addR('cbct');}
    if(lower.includes('atrição')||lower.includes('desgaste')){addI('desgaste');addR('modelos_estudo');}
    if(lower.includes('atm')||lower.includes('côndilo')){addI('atm');addR('rm_atm');}
    if(lower.includes('alvéolo')||lower.includes('alveolite')){addI('alveolo');addR('periapical');}
    if(lower.includes('calcificação pulpar')){addI('calcificacao_pulpar');addR('periapical');}
    if(lower.includes('contenção')||lower.includes('braquete')){addI('ortodontia');addR('periapical');}
    if(temDeciduo&&lower.includes('rizólise')&&!temFurcaDec&&impacts.length===0){addI('deciduo_acompanhar');addR('oclusal_deciduo');}
    
    return {impacts, recommends};
}

let pulseAnim=null, pulsePhase=0;
function startPulse(){ stopPulse(); pulsePhase=0; function step(){ pulsePhase+=0.05; render(); pulseAnim=requestAnimationFrame(step); } pulseAnim=requestAnimationFrame(step); }
function stopPulse(){ if(pulseAnim){ cancelAnimationFrame(pulseAnim); pulseAnim=null; } }

function getAnnoCenterNorm(anno){
    if(anno.points&&anno.points.length){const xs=anno.points.map(p=>p.x),ys=anno.points.map(p=>p.y);return{x:(Math.min(...xs)+Math.max(...xs))/2,y:(Math.min(...ys)+Math.max(...ys))/2};}
    if(anno.start&&anno.end)return{x:(anno.start.x+anno.end.x)/2,y:(anno.start.y+anno.end.y)/2};
    if(anno.type&&anno.size!==undefined){const hl=(anno.size*(anno.scale||1))/2,rot=anno.rotation||0;return{x:anno.x+hl*Math.cos(rot),y:anno.y+hl*Math.sin(rot)};}
    if(anno.x!==undefined)return{x:anno.x,y:anno.y};
    return null;
}

// Proteção Robusta de Cores (Garante renderização de desenhos livres exportados com RGB ou Nome)
function parseColor(c) {
    if (!c) return { r: 0, g: 255, b: 255 };
    if (c.startsWith('#')) {
        let hex = c.length === 4 ? '#' + c[1]+c[1]+c[2]+c[2]+c[3]+c[3] : c;
        return { 
            r: parseInt(hex.slice(1,3), 16) || 0, 
            g: parseInt(hex.slice(3,5), 16) || 255, 
            b: parseInt(hex.slice(5,7), 16) || 255 
        };
    }
    if (c.startsWith('rgb')) {
        const m = c.match(/\d+/g);
        if(m && m.length >= 3) return { r: parseInt(m[0]), g: parseInt(m[1]), b: parseInt(m[2]) };
    }
    return { r: 255, g: 215, b: 0 }; 
}

function hexAlpha(colorStr, alpha) {
    const {r, g, b} = parseColor(colorStr);
    return `rgba(${r},${g},${b},${alpha})`;
}

function boostColor(colorStr) {
    const {r, g, b} = parseColor(colorStr);
    const boost = c => Math.min(255, Math.round(c * 1.25 + 20));
    return `rgb(${boost(r)},${boost(g)},${boost(b)})`;
}

    // CANVAS INIT
    const viewer = document.getElementById('viewer-area');

    let img = new Image();
    let scale = 1, panX = 0, panY = 0;
    let isDragging = false, startX, startY, startClickX = 0, startClickY = 0;
    let activeAnnotationId = null, showAll = true, drawingScale = 1;
    let superZoomMode = false;
    let animFrame = null;

    img.onload = () => {
        resize(); 
        drawingScale = img.naturalWidth / 1200;
        fitImage(); 
        render();
    };
    img.src = DATA.image;
    
    window.addEventListener('resize', () => { resize(); fitImage(); render(); });
    if(screen.orientation) screen.orientation.addEventListener('change', () => setTimeout(() => { resize(); fitImage(); render(); }, 200));

    function resize() { canvas.width = viewer.clientWidth; canvas.height = viewer.clientHeight; }
    function fitImage() {
        const rW = canvas.width / img.naturalWidth, rH = canvas.height / img.naturalHeight;
        scale = Math.min(rW, rH);
        panX = (canvas.width - img.naturalWidth * scale) / 2;
        panY = (canvas.height - img.naturalHeight * scale) / 2;
    }

    // RENDER LOGIC
    function render() {
        ctx.setTransform(1,0,0,1,0,0); 
        ctx.clearRect(0,0,canvas.width,canvas.height);
        
        if (activeAnnotationId && !superZoomMode) {
            ctx.setTransform(scale,0,0,scale,panX,panY);
            ctx.drawImage(img,0,0);
            
            ctx.setTransform(1,0,0,1,0,0);
            const offA = document.createElement('canvas'); offA.width = canvas.width; offA.height = canvas.height;
            const ctxA = offA.getContext('2d'); ctxA.setTransform(scale,0,0,scale,panX,panY); ctxA.drawImage(img,0,0);
            ctxA.setTransform(1,0,0,1,0,0); ctxA.fillStyle = 'rgba(0,0,0,0.75)'; ctxA.fillRect(0,0,offA.width,offA.height);
            ctx.drawImage(offA,0,0);
            
            const anno = DATA.annotations.find(a => a.id === activeAnnotationId);
            if (anno) drawSpotlightLupa(anno);
        } 
        else if (activeAnnotationId && superZoomMode) {
            ctx.setTransform(scale,0,0,scale,panX,panY);
            ctx.drawImage(img,0,0);
            
            const anno = DATA.annotations.find(a => a.id === activeAnnotationId);
            if (anno) drawAnnotation(anno, true, true);
        }
        else if (showAll) {
            ctx.setTransform(scale,0,0,scale,panX,panY);
            ctx.drawImage(img,0,0);
            DATA.annotations.forEach(anno => drawAnnotation(anno, false, false));
        }
    }

    function drawSpotlightLupa(anno) {
        const cn = getAnnoCenterNorm(anno); if(!cn) return;
        const cxImg = cn.x * img.naturalWidth, cyImg = cn.y * img.naturalHeight;
        const cxS = cxImg * scale + panX, cyS = cyImg * scale + panY;
        
        let annoR = 45;
        if (anno.points && anno.points.length > 1) {
            const xs = anno.points.map(p => p.x * img.naturalWidth * scale), ys = anno.points.map(p => p.y * img.naturalHeight * scale);
            annoR = Math.hypot(Math.max(...xs) - Math.min(...xs), Math.max(...ys) - Math.min(...ys)) * 0.45;
        }
        const radius = Math.max(annoR * 1.9, 65);
        
        ctx.save(); ctx.setTransform(1,0,0,1,0,0);
        ctx.beginPath(); ctx.arc(cxS, cyS, radius, 0, Math.PI * 2); ctx.clip();
        
        const zS = scale * 1.4; 
        ctx.setTransform(zS,0,0,zS, cxS - cxImg * zS, cyS - cyImg * zS); 
        ctx.drawImage(img, 0, 0); 
        ctx.restore();
        
        ctx.save(); ctx.setTransform(1,0,0,1,0,0);
        const pt = (Math.sin(pulsePhase * 0.7) + 1) / 2;
        ctx.beginPath(); ctx.arc(cxS, cyS, radius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,255,255,${0.28 + pt * 0.14})`; 
        ctx.lineWidth = 2; 
        ctx.shadowColor = 'rgba(0,0,0,0.8)';
        ctx.shadowBlur = 10;
        ctx.stroke();
        ctx.restore();
    }

    function chaikin(pts, closed, passes) {
        let p = pts.slice();
        for(let k=0; k<passes; k++) {
            const q =[]; const n = p.length; const lim = closed ? n : n-1;
            for(let i=0; i<lim; i++) {
                const a = p[i], b = p[(i+1)%n];
                q.push({x: a.x*0.75 + b.x*0.25, y: a.y*0.75 + b.y*0.25});
                q.push({x: a.x*0.25 + b.x*0.75, y: a.y*0.25 + b.y*0.75});
            }
            if(closed) p = q; else p = [p[0], ...q, p[n-1]];
        }
        return p;
    }
    function buildSmoothPath(c, pts, closed) {
        if(pts.length < 2) return;
        const refined = pts.length >= 3 ? chaikin(pts, closed, 3) : pts;
        c.beginPath(); c.moveTo(refined[0].x, refined[0].y);
        for(let i=1; i<refined.length; i++) c.lineTo(refined[i].x, refined[i].y);
        if(closed) c.closePath();
    }

    function drawAnnotation(anno, isActive, isSuperZoom) {
        const el = document.querySelector(`.finding-item[data-annotation-id="${anno.id}"]`);
        const color = (el && el.dataset.severityColor) ? el.dataset.severityColor : (anno.color || '#00FFFF');
        const bright = boostColor(color);
        const baseWidth = (anno.thickness || 4) * drawingScale;
        
        let strokeW = isActive ? baseWidth * 0.6 : baseWidth * 1.6;
        let fillOp = isActive ? 0.10 : 0.22;
        let lineCol = color;

        if (isSuperZoom) {
            strokeW = baseWidth * 0.25; 
            fillOp = 0.05; 
            lineCol = bright; 
        }

        ctx.save(); ctx.lineJoin = 'round'; ctx.lineCap = 'round';

        if (anno.points && anno.fillColor) {
            const pts = anno.points.map(p => ({ x: p.x * img.naturalWidth, y: p.y * img.naturalHeight }));
            const cx = pts.reduce((s,p) => s+p.x, 0)/pts.length, cy = pts.reduce((s,p) => s+p.y, 0)/pts.length;
            const maxR = Math.max(...pts.map(p => Math.hypot(p.x-cx, p.y-cy))) * 1.3;

            buildSmoothPath(ctx, pts, true);
            const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxR);
            grad.addColorStop(0, hexAlpha(color, fillOp * 2.0));
            grad.addColorStop(0.5, hexAlpha(color, fillOp));
            grad.addColorStop(1, hexAlpha(color, 0));
            ctx.fillStyle = grad; ctx.fill();

            buildSmoothPath(ctx, pts, true);
            ctx.strokeStyle = 'rgba(0,0,0,0.8)';
            ctx.lineWidth = strokeW + (isSuperZoom ? 1 : (isActive ? 3 : 7)) * drawingScale;
            ctx.stroke();

            buildSmoothPath(ctx, pts, true);
            ctx.strokeStyle = hexAlpha(color, 0.35);
            ctx.lineWidth = strokeW + (isSuperZoom ? 0.5 : (isActive ? 1.5 : 4)) * drawingScale;
            ctx.stroke();

            buildSmoothPath(ctx, pts, true);
            ctx.strokeStyle = lineCol;
            ctx.lineWidth = strokeW;
            ctx.stroke();

            buildSmoothPath(ctx, pts, true);
            ctx.strokeStyle = isActive ? 'rgba(255,255,255,0.18)' : 'rgba(255,255,255,0.28)';
            ctx.lineWidth = strokeW * (isSuperZoom ? 0.4 : 0.22);
            ctx.stroke();

        } else if (anno.points) {
            const pts = anno.points.map(p => ({ x: p.x * img.naturalWidth, y: p.y * img.naturalHeight }));
            buildSmoothPath(ctx, pts, false); ctx.strokeStyle = 'rgba(0,0,0,0.8)'; ctx.lineWidth = strokeW + (isSuperZoom?2:6)*drawingScale; ctx.stroke();
            buildSmoothPath(ctx, pts, false); ctx.strokeStyle = hexAlpha(color, 0.4); ctx.lineWidth = strokeW + (isSuperZoom?1:3)*drawingScale; ctx.stroke();
            buildSmoothPath(ctx, pts, false); ctx.strokeStyle = lineCol; ctx.lineWidth = strokeW; ctx.stroke();
            buildSmoothPath(ctx, pts, false); ctx.strokeStyle = 'rgba(255,255,255,0.22)'; ctx.lineWidth = strokeW*0.2; ctx.stroke();

        } else if (anno.type && anno.size) {
            const x = anno.x * img.naturalWidth, y = anno.y * img.naturalHeight, s = anno.size * img.naturalWidth;
            let hL = s * 0.3, sW = s * 0.1;
            ctx.translate(x, y); ctx.rotate(anno.rotation); ctx.scale(anno.scale || 1, anno.scale || 1);
            if(anno.type === 'normal'){
                ctx.beginPath(); ctx.moveTo(-s/2+hL,0); ctx.lineTo(s/2,0); ctx.lineTo(s/2-hL,-hL/2); ctx.moveTo(s/2,0); ctx.lineTo(s/2-hL,hL/2);
                ctx.strokeStyle='rgba(0,0,0,0.8)'; ctx.lineWidth=sW*(isSuperZoom?1:2.8); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-s/2+hL,0); ctx.lineTo(s/2,0); ctx.lineTo(s/2-hL,-hL/2); ctx.moveTo(s/2,0); ctx.lineTo(s/2-hL,hL/2);
                ctx.strokeStyle=hexAlpha(color,0.4); ctx.lineWidth=sW*(isSuperZoom?0.8:2.2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-s/2+hL,0); ctx.lineTo(s/2,0); ctx.lineTo(s/2-hL,-hL/2); ctx.moveTo(s/2,0); ctx.lineTo(s/2-hL,hL/2);
                ctx.fillStyle=lineCol; ctx.fill(); ctx.strokeStyle=lineCol; ctx.lineWidth=sW*(isSuperZoom?0.5:1.6); ctx.stroke();
            } else if(anno.type === 'outline'){
                hL=s*0.4; sW=s*0.15;
                const arrowPath=()=>{ctx.beginPath();ctx.moveTo(-s/2,-sW/2);ctx.lineTo(-s/2,sW/2);ctx.lineTo(s/2-hL,sW/2);ctx.lineTo(s/2-hL,hL/2);ctx.lineTo(s/2,0);ctx.lineTo(s/2-hL,-hL/2);ctx.lineTo(s/2-hL,-sW/2);ctx.closePath();};
                arrowPath(); ctx.strokeStyle='rgba(0,0,0,0.8)'; ctx.lineWidth=isSuperZoom?2*drawingScale:(isActive?4:6)*drawingScale; ctx.lineJoin='miter'; ctx.stroke();
                arrowPath(); ctx.strokeStyle=hexAlpha(color,0.4); ctx.lineWidth=isSuperZoom?1.5*drawingScale:(isActive?3:5)*drawingScale; ctx.stroke();
                arrowPath(); ctx.strokeStyle=lineCol; ctx.lineWidth=isSuperZoom?1*drawingScale:(isActive?2:3.5)*drawingScale; ctx.stroke();
            } else if(anno.type === 'complex'){
                hL=s*0.4; sW=s*0.2;
                ctx.beginPath();ctx.moveTo(-s/2,-sW/2);ctx.lineTo(-s/2,sW/2);ctx.lineTo(s/2-hL,sW/2);ctx.lineTo(s/2-hL,hL/1.5);ctx.lineTo(s/2,0);ctx.lineTo(s/2-hL,-hL/1.5);ctx.lineTo(s/2-hL,-sW/2);ctx.closePath();
                ctx.fillStyle=lineCol; ctx.fill(); ctx.strokeStyle=lineCol; ctx.lineWidth=(isSuperZoom?0.5:(isActive?1:2))*drawingScale; ctx.lineJoin='miter'; ctx.stroke();
            }
        } else if (anno.text && anno.x !== undefined) {
            const x=anno.x*img.naturalWidth, y=anno.y*img.naturalHeight;
            const fs=(parseInt(anno.font)||24)*drawingScale*(isActive?1:1.15)*(isSuperZoom?0.8:1);
            ctx.font=`bold ${fs}px Arial`; ctx.textAlign='center';
            ctx.lineWidth=(isSuperZoom?2:(isActive?5:7))*drawingScale; ctx.strokeStyle='rgba(0,0,0,0.9)'; ctx.strokeText(anno.text,x,y);
            ctx.lineWidth=(isSuperZoom?1:(isActive?3:4.5))*drawingScale; ctx.strokeStyle=hexAlpha(color,0.4); ctx.strokeText(anno.text,x,y);
            ctx.fillStyle=lineCol; ctx.fillText(anno.text,x,y);
        } else if (anno.start && anno.end) {
            const p1={x:anno.start.x*img.naturalWidth, y:anno.start.y*img.naturalHeight};
            const p2={x:anno.end.x*img.naturalWidth, y:anno.end.y*img.naturalHeight};
            const lw=baseWidth*(isSuperZoom?0.3:(isActive?0.7:1.3));
            ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);
            ctx.strokeStyle='rgba(0,0,0,0.8)'; ctx.lineWidth=lw+(isSuperZoom?1:(isActive?2:5))*drawingScale; ctx.stroke();
            ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);
            ctx.strokeStyle=hexAlpha(color,0.4); ctx.lineWidth=lw+(isSuperZoom?0.5:(isActive?1:2.5))*drawingScale; ctx.stroke();
            ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);
            ctx.strokeStyle=lineCol; ctx.lineWidth=lw; ctx.stroke();
            if(anno.text){
                const fs=20*drawingScale*(isActive?1:1.15)*(isSuperZoom?0.8:1); ctx.font=`bold ${fs}px Arial`; ctx.textAlign='center';
                const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2;
                ctx.lineWidth=(isSuperZoom?2:(isActive?5:7))*drawingScale; ctx.strokeStyle='rgba(0,0,0,0.9)'; ctx.strokeText(anno.text,mx,my-10);
                ctx.fillStyle=lineCol; ctx.fillText(anno.text,mx,my-10);
            }
        }
        ctx.restore();
    }

    function smoothZoomTo(ts, tpx, tpy, dur) {
        if(animFrame) cancelAnimationFrame(animFrame);
        const ss = scale, spx = panX, spy = panY, st = performance.now();
        function ease(t){ return t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t; }
        function step(now){
            const t = Math.min((now - st)/dur, 1), ev = ease(t);
            scale = ss + (ts - ss) * ev;
            panX = spx + (tpx - spx) * ev;
            panY = spy + (tpy - spy) * ev;
            render();
            if(t < 1) animFrame = requestAnimationFrame(step); else animFrame = null;
        }
        animFrame = requestAnimationFrame(step);
    }

    function zoomNatural(anno, mult = 1.0) {
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        if(anno.points){ anno.points.forEach(p=>{ minX=Math.min(minX,p.x); maxX=Math.max(maxX,p.x); minY=Math.min(minY,p.y); maxY=Math.max(maxY,p.y); }); }
        else if(anno.start&&anno.end){ minX=Math.min(anno.start.x,anno.end.x); maxX=Math.max(anno.start.x,anno.end.x); minY=Math.min(anno.start.y,anno.end.y); maxY=Math.max(anno.start.y,anno.end.y); }
        else if(anno.x!==undefined){ let sz=anno.size?(anno.size*(anno.scale||1)):0.08; minX=anno.x-sz/2; maxX=anno.x+sz/2; minY=anno.y-sz/2; maxY=anno.y+sz/2; }
        
        if(maxX-minX < 0.1){ minX-=0.1; maxX+=0.1; } if(maxY-minY < 0.1){ minY-=0.1; maxY+=0.1; }
        const regW = (maxX-minX) * img.naturalWidth, regH = (maxY-minY) * img.naturalHeight;
        
        const padX = canvas.width * 0.20, padY = canvas.height * 0.20;
        let tScale = Math.min((canvas.width - padX)/regW, (canvas.height - padY)/regH);
        
        tScale = tScale * mult; 
        tScale = Math.min(tScale, 7.0); 
        tScale = Math.max(tScale, Math.min(canvas.width/img.naturalWidth, canvas.height/img.naturalHeight));
        
        const cX = ((minX+maxX)/2) * img.naturalWidth, cY = ((minY+maxY)/2) * img.naturalHeight;
        const tPX = canvas.width/2 - cX*tScale;
        const tPY = canvas.height/2 - cY*tScale;
        
        smoothZoomTo(tScale, tPX, tPY, 450);
    }

    // INTERAÇÕES
    function toggleAllAction() {
        activeAnnotationId = null;
        showAll = true;
        superZoomMode = false;
        document.getElementById('bottom-area').classList.remove('visible');
        
        document.querySelectorAll('.finding-item').forEach(el => {
            el.classList.remove('active');
            const text = el.querySelector('.item-text');
            if(text) text.classList.remove('expanded');
            const btn = el.querySelector('.btn-ver-mais');
            if(btn) btn.textContent = 'Ver mais...';
        });
        
        stopPulse();
        const fitS = Math.min(canvas.width/img.naturalWidth, canvas.height/img.naturalHeight);
        const fitPX = (canvas.width - img.naturalWidth*fitS)/2, fitPY = (canvas.height - img.naturalHeight*fitS)/2;
        smoothZoomTo(fitS, fitPX, fitPY, 420);
    }

    document.getElementById('btn-visao-geral').addEventListener('click', toggleAllAction);

    listEl.addEventListener('click', e => {
        const item = e.target.closest('.finding-item');
        if (!item || e.target.classList.contains('btn-ver-mais')) return;

        document.querySelectorAll('.finding-item').forEach(el => el.classList.remove('active'));

        const id = item.dataset.annotationId;
        if (activeAnnotationId === id && !superZoomMode) {
            toggleAllAction(); 
        } else {
            activeAnnotationId = id;
            showAll = false;
            superZoomMode = false; 
            item.classList.add('active');

            const anno = DATA.annotations.find(a => a.id === id);
            if (anno) {
                const sevColor = item.dataset.severityColor || '#00ffff';
                const bodyEl = item.querySelector('.item-text');
                const cardText = (bodyEl ? bodyEl.innerText : item.innerText).replace(/\n/g, ' ').trim();
                
                updateFindingActionCard(cardText, sevColor, anno.id);
                zoomNatural(anno, 1.0); 
                item.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                startPulse();
            }
        }
    });

    document.getElementById('action-card').addEventListener('click', () => {
        if (!activeAnnotationId || superZoomMode) return;
        superZoomMode = true; 
        stopPulse(); 
        const anno = DATA.annotations.find(a => a.id === activeAnnotationId);
        if (anno) {
            zoomNatural(anno, 2.2); 
            render();
        }
    });

    // MOUSE & TOUCH CANVAS EVENTS
    viewer.addEventListener('mousedown', e => { isDragging=true; startX=e.clientX-panX; startY=e.clientY-panY; startClickX=e.clientX; startClickY=e.clientY; });
    viewer.addEventListener('mousemove', e => { if(isDragging){ panX=e.clientX-startX; panY=e.clientY-startY; render(); } });
    viewer.addEventListener('mouseup', () => isDragging=false);
    
    viewer.addEventListener('click', e => {
        if(Math.abs(e.clientX-startClickX)>5 || Math.abs(e.clientY-startClickY)>5) return;
        
        const rect = canvas.getBoundingClientRect();
        const relX = ((e.clientX - rect.left - panX)/scale)/img.naturalWidth;
        const relY = ((e.clientY - rect.top - panY)/scale)/img.naturalHeight;
        
        let clickedAnno = null, minDist = Infinity;
        DATA.annotations.forEach(anno => {
            let dist = Infinity;
            if(anno.points){ anno.points.forEach(p=>{ const d=Math.hypot(p.x-relX, p.y-relY); if(d<dist) dist=d; }); }
            else if(anno.start&&anno.end){ const mx=(anno.start.x+anno.end.x)/2, my=(anno.start.y+anno.end.y)/2; dist=Math.hypot(mx-relX, my-relY); }
            else if(anno.x!==undefined){ dist=Math.hypot(anno.x-relX, anno.y-relY); }
            if(dist<0.05 && dist<minDist){ minDist=dist; clickedAnno=anno; }
        });
        
        if (clickedAnno) {
            const li = document.querySelector(`.finding-item[data-annotation-id="${clickedAnno.id}"]`);
            if (li) li.click();
        } else {
            toggleAllAction();
        }
    });

    viewer.addEventListener('wheel', e => {
        e.preventDefault();
        const d = e.deltaY>0 ? 0.9 : 1.1;
        const mx = e.clientX - canvas.getBoundingClientRect().left, my = e.clientY - canvas.getBoundingClientRect().top;
        panX = mx - (mx - panX) * d; panY = my - (my - panY) * d;
        scale *= d;
        render();
    });

    let idist = 0, iscale = 1;
    viewer.addEventListener('touchstart', e => {
        if(e.touches.length === 2){
            idist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            iscale = scale;
        } else if(e.touches.length === 1){
            isDragging = true;
            startX = e.touches[0].clientX - panX; startY = e.touches[0].clientY - panY;
            startClickX = e.touches[0].clientX; startClickY = e.touches[0].clientY;
        }
    }, {passive:false});
    
    viewer.addEventListener('touchmove', e => {
        e.preventDefault();
        if(e.touches.length === 2){
            const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            const delta = dist / idist;
            const cx = viewer.offsetWidth/2, cy = viewer.offsetHeight/2;
            const ns = iscale * delta;
            panX = cx - (cx - panX) * (ns / scale);
            panY = cy - (cy - panY) * (ns / scale);
            scale = ns;
            render();
        } else if(isDragging && e.touches.length === 1){
            panX = e.touches[0].clientX - startX; panY = e.touches[0].clientY - startY;
            render();
        }
    }, {passive:false});
    
    viewer.addEventListener('touchend', () => isDragging=false);
}
</script>
</body>
</html>
