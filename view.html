<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laudo Interativo</title>
    <style>
        * { box-sizing: border-box; }
        :root {
            --bg-color: #000;
            --panel-bg: #111;
            --text-color: #eee;
            --accent: #007bff;
            --c-critical: #e53e3e;
            --c-semicritical: #dd6b20;
            --c-attention: #d69e2e;
            --c-complementar: #38a169;
        }

        body {
            margin: 0; padding: 0; background: var(--bg-color); color: var(--text-color);
            font-family: 'Segoe UI', sans-serif; height: 100vh; height: 100dvh;
            display: flex; overflow: hidden;
        }

        /* --- HEADER --- */
        #app-header {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background-color: rgba(0,0,0,0.75); color: rgba(255,255,255,0.95);
            padding: 8px 20px; border-radius: 30px; font-size: 14px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1.5px; z-index: 50;
            border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex; align-items: center; gap: 15px;
        }
        #btn-toggle-all-header { display: none; }

        /* --- VIEWER --- */
        #viewer-area {
            flex: 1; position: relative; overflow: hidden; cursor: grab;
            background: #000; display: flex; align-items: center; justify-content: center;
        }
        #viewer-area:active { cursor: grabbing; }
        canvas { display: block; }

        /* --- CARD FLUTUANTE --- */
        #finding-card {
            position: absolute; display: none; z-index: 60;
            background: rgba(12,12,16,0.97); color: #fff;
            backdrop-filter: blur(16px);
            padding: 0;
            border-radius: 12px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.95), 0 0 0 1px rgba(255,255,255,0.05);
            border-left: 4px solid var(--accent);
            border-bottom: 3px solid var(--accent);
            font-size: 13px; line-height: 1.5;
            width: 300px;
            max-height: 38vh; overflow-y: auto;
            bottom: 24px; left: 24px;
            transition: border-color 0.25s;
        }
        #card-body {
            padding: 12px 34px 12px 14px;
        }
        .close-card {
            position: absolute; top: 7px; right: 8px;
            background: none; border: none; color: #555;
            font-size: 20px; cursor: pointer; padding: 0; line-height: 1;
            transition: color 0.2s;
        }
        .close-card:hover { color: #fff; }

        /* Severidade badge no card */
        .severity-badge {
            display: inline-block; font-size: 9px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
            padding: 2px 7px; border-radius: 20px;
            opacity: 0.9; flex-shrink: 0;
        }
        .sev-critical   { background: rgba(229,62,62,0.2);  color: #fc8181; border: 1px solid rgba(229,62,62,0.4); }
        .sev-semi       { background: rgba(221,107,32,0.2); color: #f6ad55; border: 1px solid rgba(221,107,32,0.4); }
        .sev-attention  { background: rgba(214,158,46,0.2); color: #f6e05e; border: 1px solid rgba(214,158,46,0.4); }
        .sev-complement { background: rgba(56,161,105,0.2); color: #68d391; border: 1px solid rgba(56,161,105,0.4); }

        /* Texto resumo + expandir */
        #card-summary { cursor: pointer; color: #ddd; font-size: 12.5px; }
        #card-full { display: none; margin-top: 6px; color: #bbb; font-size: 12px; line-height: 1.55; }
        #card-full.open { display: block; }
        #btn-expand {
            display: inline-block; margin-top: 5px;
            font-size: 10.5px; color: #666; cursor: pointer;
            border: none; background: none; padding: 0;
            text-decoration: underline; text-underline-offset: 2px;
            transition: color 0.2s;
        }
        #btn-expand:hover { color: #ccc; }

        /* Conduta + Recomendação */
        #card-clinical-row {
            display: none; margin-top: 9px; padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.07);
            gap: 10px;
        }
        #card-clinical-row.visible { display: flex; }
        #card-impact, #card-recommend {
            flex: 1; min-width: 0;
            font-size: 11px; line-height: 1.5;
        }
        #card-impact strong {
            display: block; margin-bottom: 4px;
            font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: #64748b;
        }
        #card-recommend strong {
            display: block; margin-bottom: 4px;
            font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: #4a6741;
        }
        .impact-tag {
            display: inline-block; background: rgba(100,116,139,0.15);
            border: 1px solid rgba(100,116,139,0.3); border-radius: 4px;
            padding: 2px 6px; margin: 2px 2px 2px 0; font-size: 10px; color: #94a3b8;
            white-space: normal; word-break: break-word;
        }
        .recommend-tag {
            display: inline-block; background: rgba(56,161,105,0.1);
            border: 1px solid rgba(56,161,105,0.25); border-radius: 4px;
            padding: 2px 6px; margin: 2px 2px 2px 0; font-size: 10px; color: #68d391;
            white-space: normal; word-break: break-word;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 360px; background: var(--panel-bg); display: flex; flex-direction: column;
            border-left: 1px solid #222; z-index: 20; box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }
        #sidebar-header {
            padding: 12px 15px; background: #161616; border-bottom: 1px solid #222; flex-shrink: 0;
        }
        #sidebar-header h2 { margin: 0 0 6px 0; color: var(--accent); font-size: 17px; }

        /* Contador de severidade */
        #severity-summary {
            display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px;
        }
        .sev-count {
            font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
            display: flex; align-items: center; gap: 4px;
            cursor: pointer; transition: all 0.18s; user-select: none;
        }
        .sev-count:hover { filter: brightness(1.3); transform: translateY(-1px); }
        .sev-count.active-filter { box-shadow: 0 0 0 2px currentColor; filter: brightness(1.3); }
        .sev-count.critical   { background: rgba(229,62,62,0.15);  color: #fc8181; }
        .sev-count.semi       { background: rgba(221,107,32,0.15); color: #f6ad55; }
        .sev-count.attention  { background: rgba(214,158,46,0.15); color: #f6e05e; }
        .sev-count.complement { background: rgba(56,161,105,0.15); color: #68d391; }
        .sev-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
        .sev-dot.critical   { background: var(--c-critical); }
        .sev-dot.semi       { background: var(--c-semicritical); }
        .sev-dot.attention  { background: var(--c-attention); }
        .sev-dot.complement { background: var(--c-complementar); }

        .instruction-box {
            background: #191919; color: #666; font-size: 11px; padding: 7px 15px;
            border-bottom: 1px solid #222; flex-shrink: 0;
        }
        #findings-list { flex: 1; overflow-y: auto; padding: 12px; }

        .finding-item {
            background: #1a1a1a; margin-bottom: 8px;
            padding: 0;
            border-radius: 8px; cursor: pointer;
            border-left: 4px solid transparent;
            border-bottom: 2px solid transparent;
            transition: all 0.18s; font-size: 13px; line-height: 1.4; color: #bbb;
            overflow: hidden;
        }
        .finding-item:hover { background: #222; color: #fff; transform: translateX(2px); }
        .finding-item.active { background: #252525; color: #fff; box-shadow: 0 0 14px rgba(255,255,255,0.07); }

        /* Header do item na lista */
        .item-header {
            display: flex; align-items: center; gap: 7px;
            padding: 5px 10px 4px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            flex-shrink: 0;
        }
        .item-entity-label {
            font-size: 9px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 1.4px; line-height: 1;
            opacity: 0.95; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .item-entity-label strong {
            font-size: 12px; letter-spacing: 0.2px; margin-right: 2px; font-weight: 900;
        }
        /* Corpo do texto do item */
        .item-body {
            padding: 7px 10px 8px 10px;
            font-size: 13px; line-height: 1.4; color: #bbb;
            flex: 1; min-height: 0;
        }

        #controls {
            padding: 12px 15px; border-top: 1px solid #222;
            background: #161616; display: flex; gap: 8px; flex-direction: column; flex-shrink: 0;
        }
        .btn {
            background: var(--accent); color: white; border: none;
            padding: 11px; border-radius: 6px; font-weight: bold; cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn.secondary { background: #2a2a2a; }
        #signature-area {
            padding: 16px; text-align: center; border-top: 1px solid #222;
            background: #111; flex-shrink: 0; display: flex; justify-content: center;
        }
        #signature-img { max-width: 150px; height: auto; filter: brightness(0) invert(1); opacity: 0.8; }

        /* =====================================================================
           PULSE ANIMATION
        ===================================================================== */
        @keyframes pulse-ring {
            0%   { transform: scale(1);   opacity: 0.9; }
            50%  { transform: scale(1.55); opacity: 0.3; }
            100% { transform: scale(1);   opacity: 0.9; }
        }

        /* =====================================================================
           MOBILE PORTRAIT
        ===================================================================== */
        @media (max-width: 768px) and (orientation: portrait) {
            body { flex-direction: column; }
            #app-header {
                position: relative; top: 0; left: 0; transform: none;
                width: 100%; border-radius: 0; border: none; border-bottom: 1px solid #222;
                background: #111; justify-content: space-between; padding: 10px 15px;
            }
            #app-title { font-size: 12px; letter-spacing: 1px; }
            #btn-toggle-all-header {
                display: block; padding: 7px 11px; font-size: 11px;
                background: var(--accent); color: white; border: none; border-radius: 5px; font-weight: bold;
            }
            #viewer-area { height: 55%; width: 100%; order: 1; border-bottom: 2px solid var(--accent); }
            #sidebar { height: 45%; width: 100%; order: 2; border-left: none; display: flex; flex-direction: column; }
            #sidebar-header { display: block; padding: 8px 12px; }
            #sidebar-header h2 { font-size: 17px; margin-bottom: 4px; }
            #controls { display: none; }
            .instruction-box { padding: 6px 12px; font-size: 11px; }

            /* ── CARROSSEL portrait ── */
            #findings-list {
                display: flex !important;
                flex-direction: row;
                overflow-x: auto;
                overflow-y: hidden;
                scroll-snap-type: x mandatory;
                -webkit-overflow-scrolling: touch;
                padding: 6px 10px 6px 10px;
                gap: 8px;
                flex: 1;
                align-items: stretch;
                scrollbar-width: none;
            }
            #findings-list::-webkit-scrollbar { display: none; }
            .finding-item {
                flex: 0 0 72vw !important;
                width: 72vw !important;
                margin-bottom: 0 !important;
                scroll-snap-align: center;
                font-size: 12px;
                display: flex !important;
                flex-direction: column !important;
                align-items: stretch !important;
                padding: 0 !important;
                min-height: 0;
            }
            .item-header { padding: 5px 10px 4px 10px; }
            .item-body { font-size: 12px; padding: 6px 10px 7px 10px; }
            /* Navegação carrossel */
            #carousel-nav {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 4px 10px 6px;
                flex-shrink: 0;
                gap: 8px;
            }
            .carousel-btn {
                background: #1e1e1e;
                border: 1px solid #333;
                color: #aaa;
                border-radius: 20px;
                padding: 5px 12px;
                font-size: 11px;
                font-weight: 600;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 5px;
                transition: all 0.18s;
                white-space: nowrap;
                flex-shrink: 0;
            }
            .carousel-btn:active { background: #2a2a2a; color: #fff; }
            .carousel-btn:disabled { opacity: 0.25; pointer-events: none; }
            #carousel-counter {
                font-size: 11px;
                color: #555;
                text-align: center;
                flex: 1;
                white-space: nowrap;
            }
            #signature-area { padding: 8px; background: #111; flex-shrink: 0; min-height: 50px; }
            #signature-img { max-width: 110px; max-height: 45px; }

            /* Card mobile: compacto, posicionado via JS */
            #finding-card {
                width: 66vw;
                max-height: 24vh;
                font-size: 10px;
                line-height: 1.3;
                border-radius: 9px;
            }
            #card-body { padding: 6px 24px 7px 9px; }
            #card-severity-badge { margin-bottom: 4px; }
            .severity-badge { font-size: 8px; padding: 1px 5px; }
            #card-summary { font-size: 10px; }
            #card-full { font-size: 9.5px; }
            #card-clinical-row { gap: 3px; margin-top: 5px; padding-top: 5px; }
            .impact-tag, .recommend-tag { font-size: 8.5px; padding: 1px 3px; }
            #card-impact strong, #card-recommend strong { font-size: 7.5px; }
        }

        /* =====================================================================
           MOBILE LANDSCAPE
        ===================================================================== */
        @media (max-width: 900px) and (orientation: landscape) {
            body { flex-direction: row; height: 100vh; height: 100dvh; }
            #app-header { display: none; }
            #viewer-area {
                flex: 0 0 63%; height: 100%;
                border-bottom: none; border-right: 2px solid var(--accent);
            }
            #sidebar {
                flex: 0 0 37%; width: auto; height: 100%;
                border-left: none; display: flex; flex-direction: column; overflow: hidden;
            }
            #sidebar-header { display: block; padding: 6px 10px; flex-shrink: 0; }
            #sidebar-header h2 { font-size: 12px; margin: 0 0 3px 0; }
            .instruction-box { display: none; }
            #findings-list { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 5px 7px; }
            .finding-item { font-size: 11px; margin-bottom: 4px; border-radius: 5px; line-height: 1.3; }
            .item-header { padding: 4px 8px 3px 8px; font-size: 10px; }
            .item-body { font-size: 11px; padding: 5px 8px 6px 8px; }
            #controls { display: flex; flex-direction: row; gap: 5px; padding: 5px 7px; flex-shrink: 0; }
            .btn { padding: 6px 4px; font-size: 10px; flex: 1; border-radius: 5px; }
            #signature-area { padding: 4px 7px; min-height: 36px; flex-shrink: 0; }
            #signature-img { max-width: 75px; max-height: 28px; }
            #finding-card {
                top: 8px; bottom: auto; left: 8px; right: auto; transform: none;
                width: 230px; font-size: 11px;
                max-height: 40vh; overflow-y: auto;
                border-radius: 8px;
            }
            #card-body { padding: 8px 24px 8px 9px; }
            .severity-badge { font-size: 8.5px; }
            #card-summary { font-size: 11px; }
            #card-clinical-row { gap: 5px; margin-top: 7px; padding-top: 7px; }
            .impact-tag, .recommend-tag { font-size: 9.5px; }
        }
    </style>
</head>
<body>

<div id="app-header">
    <div id="app-title">LAUDO INTERATIVO</div>
    <button id="btn-toggle-all-header">🔍 Visão Geral</button>
</div>

<div id="viewer-area">
    <div id="finding-card">
        <button class="close-card" onclick="closeCard()">×</button>
        <div id="card-body">
            <div id="card-severity-badge"></div>
            <div id="card-summary"></div>
            <button id="btn-expand" onclick="toggleExpand()">Ver detalhes ↓</button>
            <div id="card-full"></div>
            <div id="card-clinical-row">
                <div id="card-impact">
                    <strong>💡 Conduta provável</strong>
                    <div id="card-impact-tags"></div>
                </div>
                <div id="card-recommend">
                    <strong>🔬 Exame sugerido</strong>
                    <div id="card-recommend-tags"></div>
                </div>
            </div>
        </div>
    </div>
    <canvas id="canvas"></canvas>
</div>

<div id="sidebar">
    <div id="sidebar-header">
        <h2>Achados Radiográficos</h2>
        <div id="severity-summary"></div>
    </div>
    <div class="instruction-box">Toque no achado ou na imagem para destacar</div>
    <div id="findings-list">Carregando...</div>
    <div id="carousel-nav" style="display:none;">
        <button class="carousel-btn" id="carousel-prev">◀ Anterior</button>
        <span id="carousel-counter">1 / 1</span>
        <button class="carousel-btn" id="carousel-next">Próximo ▶</button>
    </div>
    <div id="controls">
        <button id="btn-toggle-all" class="btn">🔍 Visão Geral</button>
        <button id="btn-reset-zoom" class="btn secondary">⟲ Reset</button>
    </div>
    <div id="signature-area">
        <img id="signature-img" src="assinatura.png" alt="Assinatura" onerror="this.style.display='none'">
    </div>
</div>

<script>
// ============================================================
// LABELS DE SEVERIDADE — fonte única para todo o app
// ============================================================
const SEV_LABELS = {
    critical:   { badge: '🔴 Críticos',           short: 'Críticos',           summary: (n) => `${n} crítico${n>1?'s':''}`           },
    semi:       { badge: '🟠 Importantes',         short: 'Importantes',        summary: (n) => `${n} importante${n>1?'s':''}`         },
    attention:  { badge: '🟡 Observação',          short: 'Observação',         summary: (n) => `${n} observação`                      },
    complement: { badge: '🟢 Achados secundários', short: 'Achados secundários', summary: (n) => `${n} secundário${n>1?'s':''}`        },
};

// ============================================================
// SISTEMA DE SEVERIDADE
// ============================================================
const SEV_RULES = [
    {
        level: 'critical',
        label: '● Urgência',
        color: '#e53e3e',
        words: [
            'incluso','impactado','reabsorção','envolvimento pulpar','comprometimento pulpar',
            'lesão extensa','rarefação','radiolúcida','radiolucida','periápice','periapice',
            'canal mandibular','íntima proximidade','intima proximidade','cisto','tumor',
            'necrose','fístula','fistula','abscesso','osteíte','osteite','fratura','dilaceração severa',
            'reabsorção radicular','reabsorcao radicular','reabsorção interna','reabsorção externa',
            // Decíduos — críticos
            'rarefação na região de furca','rarefação interradicular','lesão de furca','furca comprometida',
            'reabsorção patológica','rizólise patológica','rizólise acelerada','necrose pulpar deciduo',
            // Furca permanentes
            'rarefação óssea na região de furca','rarefação óssea interradicular','lesão de furca em dente permanente'
        ]
    },
    {
        level: 'semi',
        label: '● Monitoramento',
        color: '#dd6b20',
        words: [
            'semi-incluso','semi incluso','cárie','cariosa','carie','obturação inadequada',
            'restauração com falha','sobrecontorno','subcontorno','remanescente radicular',
            'alvéolo','alveolo','espessamento','seio maxilar','sinusite','mucosite',
            'lesão cariosa','lesão radiolúcida','lesão radiolucida','carr','care',
            'peri-implantite','mobilidade','lesão periapical','pericoronite',
            // Decíduos — semi-críticos
            'cárie em decíduo','carie em deciduo','cárie em dente decíduo','lesão cariosa em decíduo',
            'rizólise','rizolyse','reabsorção fisiológica','reabsorção radicular fisiológica'
        ]
    },
    {
        level: 'attention',
        label: '● Acompanhamento',
        color: '#d69e2e',
        words: [
            'aumento do espaço','calcificação','atrição','giroversão','dilaceração',
            'arredondamento apical','pino intrarradicular','implante','contenção',
            'cálculo','calculo','perda óssea','perda ossea','reabsorção leve',
            'obturação','restauração radiopaca','tratado endodonticamente','endodonticamente',
            'condensação','selamento','semi-irrompido','irrompido',
            // Decíduos — atenção
            'decíduo','deciduo','dente de leite','dentes de leite','erupção do sucessor',
            'rizólise em estágio','estágio de rizólise','reabsorção radicular em estágio'
        ]
    }
];

function classifyText(text) {
    const lower = text.toLowerCase();
    for (const rule of SEV_RULES) {
        const sl = SEV_LABELS[rule.level];
        if (rule.words.some(w => lower.includes(w)))
            return { level: rule.level, label: sl ? sl.badge : rule.label, color: rule.color };
    }
    const sl = SEV_LABELS.complement;
    return { level: 'complement', label: sl ? sl.badge : '● Informativo', color: '#38a169' };
}

// ============================================================
// NUMERAÇÃO DE DENTES
// ============================================================
const DENTES_ANTERIORES = ['11','12','13','21','22','23','31','32','33','41','42','43'];

// Dentes decíduos (notação FDI): 51–55, 61–65, 71–75, 81–85
const DENTES_DECIDUOS = [
    '51','52','53','54','55',
    '61','62','63','64','65',
    '71','72','73','74','75',
    '81','82','83','84','85'
];
// Decíduos com furca (molares): 54,55,64,65,74,75,84,85
const DECIDUOS_COM_FURCA = ['54','55','64','65','74','75','84','85'];
// Permanentes com furca (molares e pré-molares com 2 raízes): 14,15,16,17,18,24,25,26,27,28,34,35,36,37,38,44,45,46,47,48
const PERMANENTES_COM_FURCA = [
    '16','17','18','26','27','28','36','37','38','46','47','48',
    '14','15','24','25','34','35','44','45'
];

function isDentDeciduo(text) {
    const matches = text.match(/\b([5-8][1-5])\b/g);
    if (matches) return matches.some(n => DENTES_DECIDUOS.includes(n));
    const lower = text.toLowerCase();
    return lower.includes('decíduo') || lower.includes('deciduo') ||
           lower.includes('dente de leite') || lower.includes('primário') ||
           lower.includes('leite');
}

function isDentPermanenteComFurca(text) {
    const matches = text.match(/\b([1-4][4-8])\b/g);
    if (matches) return matches.some(n => PERMANENTES_COM_FURCA.includes(n));
    return false;
}

function isDentDeciduoComFurca(text) {
    const matches = text.match(/\b([5-8][4-5])\b/g);
    if (matches) return matches.some(n => DECIDUOS_COM_FURCA.includes(n));
    return false;
}

function temFurca(text) {
    const lower = text.toLowerCase();
    return lower.includes('furca') || lower.includes('interradicular') ||
           lower.includes('bifurcação') || lower.includes('trifurcação');
}

function detectSobrecontornoTipo(text) {
    const lower = text.toLowerCase();
    if (!lower.includes('sobrecontorno')) return null;
    const matches = text.match(/\b([1-4][1-8])\b/g);
    if (matches) {
        for (const num of matches) {
            if (DENTES_ANTERIORES.includes(num)) return 'anterior';
        }
        return 'posterior';
    }
    const anterioresKeywords = ['incisivo','incisivos','canino','caninos','central','lateral','anterior','anteriores','frontal','frontais'];
    if (anterioresKeywords.some(w => lower.includes(w))) return 'anterior';
    const posterioresKeywords = ['pré-molar','pre-molar','premolar','molar','molares','posterior','posteriores'];
    if (posterioresKeywords.some(w => lower.includes(w))) return 'posterior';
    return 'posterior';
}

const PULPAR_WORDS = [
    'envolvimento pulpar','comprometimento pulpar','câmara pulpar','exposição pulpar',
    'necrose pulpar','cárie profunda','carie profunda','provável exposição','provavel exposicao',
    'abscesso','fístula','fistula','periodontite apical','lesão periapical','periápice','periapice',
    'rarefação periapical','rarefacao periapical','rarefação óssea','rarefacao ossea'
];
const TRATADO_WORDS = [
    'tratado endodonticamente','endodonticamente','obturação endodôntica','obturacao endodontica',
    'tratamento endodôntico concluído'
];
const RESIDUAL_WORDS = [
    'raízes residuais','raizes residuais','raiz residual','remanescente radicular','raiz retida'
];
// Palavras que identificam furca de dente permanente
const FURCA_PERM_WORDS = [
    'rarefação na região de furca','rarefação óssea na região de furca','rarefação interradicular',
    'lesão de furca','furca comprometida','lesão de furca em dente permanente'
];
// Palavras que identificam decíduo
const DECIDUO_WORDS = [
    'decíduo','deciduo','dente de leite','dentes de leite','primário','leite',
    'rizólise','rizolyse','reabsorção fisiológica'
];

function getImpacts(text) {
    const lower = text.toLowerCase();
    const temPulpar   = PULPAR_WORDS.some(w => lower.includes(w));
    const temTratado  = TRATADO_WORDS.some(w => lower.includes(w));
    const temResidual = RESIDUAL_WORDS.some(w => lower.includes(w));
    const temDeciduo  = DECIDUO_WORDS.some(w => lower.includes(w)) || isDentDeciduo(text);
    const temFurcaPerm = FURCA_PERM_WORDS.some(w => lower.includes(w)) && !temDeciduo;
    const temFurcaDec  = temFurca(text) && temDeciduo;

    const found = []; const seen = new Set();

    // Furca de dente permanente — conduta específica (prioritária)
    if (temFurcaPerm) {
        found.push('Avaliação periodontal — possível exodontia');
        seen.add('Avaliação periodontal — possível exodontia');
        seen.add('Avaliação e trat. periodontal');
    }

    // Furca de decíduo — conduta específica (prioritária)
    if (temFurcaDec) {
        found.push('Exodontia do decíduo — indicação absoluta');
        seen.add('Exodontia do decíduo — indicação absoluta');
    }

    for (const rule of IMPACT_RULES) {
        if (!rule.words.some(w => lower.includes(w))) continue;
        if (seen.has(rule.tag)) continue;
        if (rule.tag === 'Tratamento endodôntico' && temResidual) continue;
        if (rule.tag === 'Tratamento endodôntico' && temDeciduo) continue; // decíduo não faz endo convencional
        if (rule.tag === 'Restauração' && (temPulpar || temTratado || temResidual)) continue;
        if (rule.tag === 'Tratamento endodôntico' && temTratado) continue;
        // Pulpotomia é a conduta endodôntica para decíduos com cárie profunda
        if (temDeciduo && temPulpar && rule.tag === 'Tratamento endodôntico') {
            found.push('Pulpotomia ou pulpectomia (decíduo)'); seen.add(rule.tag); seen.add('Pulpotomia ou pulpectomia (decíduo)'); continue;
        }
        found.push(rule.tag); seen.add(rule.tag);
    }
    return found;
}

function getRecommends(text) {
    const lower = text.toLowerCase();
    const temPulpar   = PULPAR_WORDS.some(w => lower.includes(w));
    const temResidual = RESIDUAL_WORDS.some(w => lower.includes(w));
    const temDeciduo  = DECIDUO_WORDS.some(w => lower.includes(w)) || isDentDeciduo(text);
    const temFurcaPerm = FURCA_PERM_WORDS.some(w => lower.includes(w)) && !temDeciduo;
    const temFurcaDec  = temFurca(text) && temDeciduo;

    const found = []; const seen = new Set();

    // Furca permanente → periapical pelo paralelismo (prioritário)
    if (temFurcaPerm) {
        found.push('Periapical pela técnica do paralelismo');
        seen.add('Periapical pela técnica do paralelismo');
    }

    // Furca decíduo → periapical do decíduo
    if (temFurcaDec) {
        found.push('Periapical do decíduo — confirmar extensão');
        seen.add('Periapical do decíduo — confirmar extensão');
    }

    const tipoSobre = detectSobrecontornoTipo(text);
    if (tipoSobre !== null) {
        if (tipoSobre === 'anterior') {
            found.push('Radiografia periapical da região'); found.push('Avaliação clínica');
        } else {
            found.push('Radiografia interproximal da região');
        }
        seen.add('Radiografia periapical da região');
        seen.add('Avaliação clínica');
        seen.add('Radiografia interproximal da região');
    }

    for (const rule of RECOMMEND_RULES) {
        if (!rule.words.some(w => lower.includes(w))) continue;
        if (seen.has(rule.tag)) continue;
        if (rule.tag === 'Radiografia interproximal ou periapical da região' && (temPulpar || temResidual)) continue;
        if (rule.tag === 'Radiografia periapical' && seen.has('Radiografia periapical da região')) continue;
        // Evita duplicar recomendações de furca já adicionadas
        if ((rule.tag === 'Periapical pela técnica do paralelismo' || rule.tag === 'Periapical do decíduo — confirmar extensão') && seen.has(rule.tag)) continue;
        found.push(rule.tag); seen.add(rule.tag);
    }
    return found;
}

function makeSummary(text, maxLen = 90) {
    const clean = text.replace(/\n/g, ' ').trim();
    if (clean.length <= maxLen) return { summary: clean, full: null };
    const cut = clean.lastIndexOf(' ', maxLen);
    return { summary: clean.slice(0, cut > 0 ? cut : maxLen) + '…', full: clean };
}

let pulseAnim = null;
let pulsePhase = 0;

function startPulse() {
    stopPulse(); pulsePhase = 0;
    function step() { pulsePhase += 0.04; render(); pulseAnim = requestAnimationFrame(step); }
    pulseAnim = requestAnimationFrame(step);
}
function stopPulse() {
    if (pulseAnim) { cancelAnimationFrame(pulseAnim); pulseAnim = null; }
}

function drawPulse(cx, cy, color) {
    ctx.save();
    ctx.globalCompositeOperation = 'source-over';
    const t  = (Math.sin(pulsePhase)       + 1) / 2;
    const t2 = (Math.sin(pulsePhase - 1.8) + 1) / 2;
    const t3 = (Math.sin(pulsePhase - 3.2) + 1) / 2;
    const r1 = (18 + t * 34) * drawingScale;
    ctx.beginPath(); ctx.arc(cx, cy, r1, 0, Math.PI * 2);
    ctx.strokeStyle = color; ctx.lineWidth = 1.5 * drawingScale;
    ctx.globalAlpha = 0.55 - t * 0.52; ctx.stroke();
    const r2 = (13 + t2 * 22) * drawingScale;
    ctx.beginPath(); ctx.arc(cx, cy, r2, 0, Math.PI * 2);
    ctx.strokeStyle = color; ctx.lineWidth = 1.8 * drawingScale;
    ctx.globalAlpha = 0.45 - t2 * 0.42; ctx.stroke();
    const r3 = (8 + t3 * 12) * drawingScale;
    ctx.beginPath(); ctx.arc(cx, cy, r3, 0, Math.PI * 2);
    ctx.strokeStyle = color; ctx.lineWidth = 2 * drawingScale;
    ctx.globalAlpha = 0.35 - t3 * 0.30; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, 4.5 * drawingScale, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff'; ctx.globalAlpha = 0.95; ctx.fill();
    ctx.beginPath(); ctx.arc(cx, cy, 4.5 * drawingScale, 0, Math.PI * 2);
    ctx.fillStyle = color; ctx.globalAlpha = 0.85; ctx.fill();
    ctx.beginPath(); ctx.arc(cx, cy, 8 * drawingScale, 0, Math.PI * 2);
    ctx.strokeStyle = color; ctx.lineWidth = 1.2 * drawingScale;
    ctx.globalAlpha = 0.30; ctx.stroke();
    ctx.restore();
}

function getAnnoCenterNorm(anno) {
    if (anno.points && anno.points.length) {
        const xs = anno.points.map(p => p.x);
        const ys = anno.points.map(p => p.y);
        return { x: (Math.min(...xs) + Math.max(...xs)) / 2, y: (Math.min(...ys) + Math.max(...ys)) / 2 };
    }
    if (anno.start && anno.end) return { x: (anno.start.x + anno.end.x) / 2, y: (anno.start.y + anno.end.y) / 2 };
    if (anno.type && anno.size !== undefined) {
        // Setas: spotlight centrado na PONTA (s/2, 0) no espaço local da seta.
        // anno.x/y são o pivot (centro); size é relativo a naturalWidth, já normalizado.
        // A ponta fica a (size * scale / 2) do pivot, na direção de rotation.
        const halfLen = (anno.size * (anno.scale || 1)) / 2;
        const rot     = anno.rotation || 0;
        return {
            x: anno.x + halfLen * Math.cos(rot),
            y: anno.y + halfLen * Math.sin(rot)
        };
    }
    if (anno.x !== undefined) return { x: anno.x, y: anno.y };
    return null;
}

let DATA = null;
try {
    const hash = window.location.hash.substring(1);
    if (hash) { const json = decodeURIComponent(escape(atob(hash))); DATA = JSON.parse(json); }

if (!DATA) {
    document.getElementById('findings-list').innerHTML =
        "<p style='text-align:center;color:red;padding:20px;'>Erro ao carregar dados.</p>";
} else {
    const listEl = document.getElementById('findings-list');
    listEl.innerHTML = DATA.findingsHtml || "<p style='padding:10px;'>Nenhum achado interativo.</p>";
    if (DATA.signature) document.getElementById('signature-img').src = DATA.signature;

    const items = listEl.querySelectorAll('p[data-highlight-color]');
    const sevCounts = { critical: 0, semi: 0, attention: 0, complement: 0 };
    items.forEach(p => {
        p.classList.add('finding-item');
        // Extrai texto puro do HTML original (antes de qualquer modificação)
        const originalHTML = p.innerHTML;
        const tmp = document.createElement('div');
        tmp.innerHTML = originalHTML;
        const text = tmp.textContent || tmp.innerText || '';
        const sev  = classifyText(text);
        p.dataset.severity      = sev.level;
        p.dataset.severityColor = sev.color;
        p.style.borderLeftColor   = sev.color;
        p.style.borderBottomColor = sev.color;
        sevCounts[sev.level] = (sevCounts[sev.level] || 0) + 1;

        // Header: extrai título a partir do texto puro
        const { label, number } = extractCardTitle(text);
        // Fallback: se não reconheceu entidade, usa o label clínico de severidade
        const resolvedLabel = (label === 'ACHADO')
            ? (SEV_LABELS[sev.level] ? SEV_LABELS[sev.level].short.toUpperCase() : 'ACHADO')
            : label;
        const headerLabel = number
            ? `<strong>DENTE ${number}</strong>`
            : `<strong>${resolvedLabel}</strong>`;

        p.innerHTML =
            `<div class="item-header" style="background:${sev.color}14">` +
                `<span class="sev-dot" style="background:${sev.color};width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0"></span>` +
                `<span class="item-entity-label" style="color:${sev.color}">${headerLabel}</span>` +
            `</div>` +
            `<div class="item-body">${originalHTML}</div>`;
    });
    buildSeveritySummary(sevCounts, items.length);

    // ============================================================
    // CARROSSEL — apenas mobile portrait
    // ============================================================
    const carouselNav     = document.getElementById('carousel-nav');
    const carouselPrev    = document.getElementById('carousel-prev');
    const carouselNext    = document.getElementById('carousel-next');
    const carouselCounter = document.getElementById('carousel-counter');
    const allItems        = Array.from(listEl.querySelectorAll('.finding-item'));
    let carouselIndex     = 0;  // índice do card visível no carrossel

    function isMobilePortraitNow() {
        return window.innerWidth <= 768 && window.innerHeight > window.innerWidth;
    }

    function setupCarousel() {
        if (!isMobilePortraitNow()) {
            carouselNav.style.display = 'none';
            return;
        }
        carouselNav.style.display = 'flex';
        updateCarouselCounter();
        updateCarouselButtons();
    }

    function updateCarouselCounter() {
        carouselCounter.textContent = `${carouselIndex + 1} / ${allItems.length}`;
    }

    function updateCarouselButtons() {
        carouselPrev.disabled = carouselIndex === 0;
        carouselNext.disabled = carouselIndex === allItems.length - 1;
    }

    function scrollCarouselTo(idx, triggerClick) {
        if (idx < 0 || idx >= allItems.length) return;
        carouselIndex = idx;
        // Scroll snap para o item
        const item = allItems[idx];
        item.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        updateCarouselCounter();
        updateCarouselButtons();
        if (triggerClick) item.click();
    }

    carouselPrev.addEventListener('click', () => {
        scrollCarouselTo(carouselIndex - 1, true);
    });
    carouselNext.addEventListener('click', () => {
        scrollCarouselTo(carouselIndex + 1, true);
    });

    // Quando um item da lista é clicado (qualquer origem), sincroniza o índice
    listEl.addEventListener('click', e => {
        const item = e.target.closest('.finding-item');
        if (!item || !isMobilePortraitNow()) return;
        const idx = allItems.indexOf(item);
        if (idx !== -1) {
            carouselIndex = idx;
            updateCarouselCounter();
            updateCarouselButtons();
        }
    });

    // Detectar swipe/scroll manual no carrossel e atualizar contador
    let scrollTimer = null;
    listEl.addEventListener('scroll', () => {
        if (!isMobilePortraitNow()) return;
        clearTimeout(scrollTimer);
        scrollTimer = setTimeout(() => {
            // Descobre qual item está mais centrado
            const listRect = listEl.getBoundingClientRect();
            const center   = listRect.left + listRect.width / 2;
            let closest = 0, minDist = Infinity;
            allItems.forEach((item, i) => {
                const r    = item.getBoundingClientRect();
                const dist = Math.abs((r.left + r.width / 2) - center);
                if (dist < minDist) { minDist = dist; closest = i; }
            });
            carouselIndex = closest;
            updateCarouselCounter();
            updateCarouselButtons();
        }, 80);
    });

    // Inicializa e reage a mudança de orientação
    setupCarousel();
    window.addEventListener('resize', setupCarousel);
    if (screen.orientation) {
        screen.orientation.addEventListener('change', () => setTimeout(setupCarousel, 250));
    }

    const viewer = document.getElementById('viewer-area');
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    let img = new Image();
    let scale = 1, panX = 0, panY = 0;
    let isDragging = false, startX, startY;
    let startClickX = 0, startClickY = 0;
    let activeAnnotationId = null;
    let showAll = true;
    let drawingScale = 1;
    let activeFilter    = null;
    let spotlightIndex  = 0;   // índice do achado em foco dentro da categoria ativa
    let animFrame = null;

    img.onload = () => {
        resize();
        drawingScale = img.naturalWidth / 1200;
        fitImage();
        const ts = calcZoomForAnnos(DATA.annotations);
        if (ts) { scale = ts.scale; panX = ts.panX; panY = ts.panY; }
        render();
    };
    img.src = DATA.image;

    window.addEventListener('resize', () => { resize(); fitImage(); render(); });
    if (screen.orientation) {
        screen.orientation.addEventListener('change', () => { setTimeout(() => { resize(); fitImage(); render(); }, 200); });
    }

    function resize() { canvas.width = viewer.clientWidth; canvas.height = viewer.clientHeight; }
    function fitImage() {
        const rW = canvas.width / img.naturalWidth;
        const rH = canvas.height / img.naturalHeight;
        scale = Math.min(rW, rH);
        panX = (canvas.width  - img.naturalWidth  * scale) / 2;
        panY = (canvas.height - img.naturalHeight * scale) / 2;
    }
    function isLandscapeMobile() { return window.innerWidth <= 900 && window.innerWidth > window.innerHeight; }
    function isMobilePortrait()  { return window.innerWidth <= 768 && window.innerHeight > window.innerWidth; }

    // ---- RENDER ----
    function render() {
        ctx.setTransform(1,0,0,1,0,0);
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.setTransform(scale,0,0,scale,panX,panY);
        ctx.drawImage(img,0,0);

        if (activeFilter) {
            ctx.setTransform(1,0,0,1,0,0);
            const offA = document.createElement('canvas');
            offA.width = canvas.width; offA.height = canvas.height;
            const ctxA = offA.getContext('2d');
            ctxA.setTransform(scale,0,0,scale,panX,panY);
            ctxA.drawImage(img,0,0);
            ctxA.setTransform(1,0,0,1,0,0);
            ctxA.fillStyle = 'rgba(0,0,0,0.62)';
            ctxA.fillRect(0,0,offA.width,offA.height);
            ctx.drawImage(offA,0,0);

            const filteredAnnos = DATA.annotations.filter(anno => {
                const li = document.querySelector(`.finding-item[data-annotation-id="${anno.id}"]`);
                return li && li.dataset.severity === activeFilter;
            });
            const focusIdx = ((spotlightIndex % filteredAnnos.length) + filteredAnnos.length) % filteredAnnos.length;
            filteredAnnos.forEach((anno, i) => {
                if (i === focusIdx) {
                    drawSpotlightLupa(anno, true);   // full spotlight
                } else {
                    drawSpotlightLupa(anno, false);  // anel dormindo
                }
            });

            // Hint: "toque para ver próximo" quando há múltiplos
            if (filteredAnnos.length > 1) {
                ctx.save();
                ctx.setTransform(1,0,0,1,0,0);
                const hint = `${focusIdx + 1} / ${filteredAnnos.length}  —  toque para avançar`;
                ctx.font = `bold ${12}px 'Segoe UI', sans-serif`;
                ctx.textAlign = 'center';
                const hw = ctx.measureText(hint).width + 22;
                const hx = canvas.width / 2, hy = canvas.height - 18;
                ctx.fillStyle = 'rgba(0,0,0,0.55)';
                ctx.beginPath();
                ctx.roundRect(hx - hw/2, hy - 14, hw, 22, 11);
                ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.70)';
                ctx.fillText(hint, hx, hy + 3);
                ctx.restore();
            }

        } else if (showAll) {
            DATA.annotations.forEach(anno => drawAnnotation(anno, false));

        } else if (activeAnnotationId) {
            const anno = DATA.annotations.find(a => a.id === activeAnnotationId);
            if (anno) {
                drawAnnotation(anno, true);
                const cn = getAnnoCenterNorm(anno);
                if (cn) {
                    const el  = document.querySelector(`p[data-annotation-id="${anno.id}"]`);
                    const col = el ? el.dataset.severityColor : '#00ffff';
                    drawPulse(cn.x * img.naturalWidth, cn.y * img.naturalHeight, col);
                }
            }
        }
    }

    // ---- SPOTLIGHT ----
    // isFocused=true  → lupa full (zoom + anel pulsante)
    // isFocused=false → anel dormindo (pequeno, sem zoom, indica "há mais aqui")
    function drawSpotlightLupa(anno, isFocused) {
        const cn = getAnnoCenterNorm(anno);
        if (!cn) return;
        const cxImg    = cn.x * img.naturalWidth;
        const cyImg    = cn.y * img.naturalHeight;
        const cxScreen = cxImg * scale + panX;
        const cyScreen = cyImg * scale + panY;
        let annoR = 45;
        if (anno.points && anno.points.length > 1) {
            const xs = anno.points.map(p => p.x * img.naturalWidth * scale);
            const ys = anno.points.map(p => p.y * img.naturalHeight * scale);
            const w  = Math.max(...xs) - Math.min(...xs);
            const h  = Math.max(...ys) - Math.min(...ys);
            annoR = Math.hypot(w, h) * 0.45;
        }
        const radius = Math.max(annoR * 1.9, 65);

        if (isFocused) {
            // Full spotlight: clip circular + zoom 1.4×
            ctx.save();
            ctx.setTransform(1,0,0,1,0,0);
            ctx.beginPath();
            ctx.arc(cxScreen, cyScreen, radius, 0, Math.PI * 2);
            ctx.clip();
            const zScale = scale * 1.4;
            ctx.setTransform(zScale, 0, 0, zScale, cxScreen - cxImg * zScale, cyScreen - cyImg * zScale);
            ctx.drawImage(img, 0, 0);
            ctx.restore();
            // Anel branco pulsante
            ctx.save();
            ctx.setTransform(1,0,0,1,0,0);
            const pulseT = (Math.sin(pulsePhase * 0.7) + 1) / 2;
            ctx.beginPath();
            ctx.arc(cxScreen, cyScreen, radius, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255,255,255,${0.28 + pulseT * 0.14})`;
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.restore();

            // Indicador "toque para ver próximo" se há mais de um na categoria
            const el = document.querySelector(`.finding-item[data-annotation-id="${anno.id}"]`);
            const col = el ? el.dataset.severityColor : '#fff';
            ctx.save();
            ctx.setTransform(1,0,0,1,0,0);
            ctx.beginPath();
            ctx.arc(cxScreen, cyScreen, radius + 8, 0, Math.PI * 2);
            ctx.strokeStyle = `${col}55`;
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 6]);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();

        } else {
            // Dormant: pequeno anel colorido sobre o escuro, sem zoom
            const el  = document.querySelector(`.finding-item[data-annotation-id="${anno.id}"]`);
            const col = el ? el.dataset.severityColor : '#ffffff';
            const dormR = Math.max(annoR * 0.9, 28);
            ctx.save();
            ctx.setTransform(1,0,0,1,0,0);
            // Ponto central iluminado mínimo
            ctx.beginPath();
            ctx.arc(cxScreen, cyScreen, dormR, 0, Math.PI * 2);
            ctx.strokeStyle = `${col}70`;
            ctx.lineWidth = 1.5;
            ctx.stroke();
            // Ponto central
            ctx.beginPath();
            ctx.arc(cxScreen, cyScreen, 4, 0, Math.PI * 2);
            ctx.fillStyle = `${col}99`;
            ctx.fill();
            ctx.restore();
        }
    }

    // ---- CARD ----
    // ---- EXTRAÇÃO DO TÍTULO DO CARD ----
    // Retorna objeto { label, number } onde:
    //   label  = 'DENTE' | 'REGIÃO' | 'SINUSITE' | 'PERDA ÓSSEA' | etc.
    //   number = '36' | null
    function extractCardTitle(text) {
        const lower = text.toLowerCase();

        // 1. Tenta extrair número de dente permanente (11–18, 21–28, 31–38, 41–48)
        const permMatch = text.match(/\b([1-4][1-8])\b/g);
        if (permMatch && permMatch.length > 0) {
            const num = permMatch[0];
            return { label: 'DENTE', number: num };
        }

        // 2. Tenta extrair número de dente decíduo (51–55, 61–65, 71–75, 81–85)
        const decMatch = text.match(/\b([5-8][1-5])\b/g);
        if (decMatch && decMatch.length > 0) {
            const num = decMatch[0];
            return { label: 'DENTE', number: num };
        }

        // 3. Sem número — classifica por contexto semântico
        const ctx = [
            { keys: ['sinusite','seio maxilar','espessamento mucoso','mucosite sinusal','velamento sinusal','pseudocisto sinusal'], label: 'SEIO MAXILAR' },
            { keys: ['perda óssea','perda ossea','reabsorção alveolar','suporte periodontal','defeito ósseo','defeito angular','nível ósseo'], label: 'PERDA ÓSSEA' },
            { keys: ['lesão cística','cisto','dentígero','folicular','lesão radiolúcida bem delimitada'], label: 'LESÃO CÍSTICA' },
            { keys: ['tumor','lesão mista','lesão radiopaca irregular','lesão multilocular'], label: 'LESÃO ÓSSEA' },
            { keys: ['fratura','linha de fratura','fratura mandibular','fratura maxilar'], label: 'FRATURA' },
            { keys: ['canal mandibular','íntima proximidade','intima proximidade','nervo alveolar'], label: 'CANAL MAND.' },
            { keys: ['implante','osseointegrado','peri-implantite'], label: 'IMPLANTE' },
            { keys: ['atm','côndilo','articulação temporomandibular'], label: 'ATM' },
            { keys: ['alvéolo','alveolo','alveolite','pós-exodontia'], label: 'ALVÉOLO' },
            { keys: ['raízes residuais','raiz residual','remanescente radicular','raiz retida'], label: 'RAIZ RES.' },
            { keys: ['cálculo','calculo','tártaro'], label: 'CÁLCULO' },
            { keys: ['atrição','desgaste','sobrecarga oclusal'], label: 'DESGASTE' },
            { keys: ['contenção','aparelho ortodôntico','braquete'], label: 'ORTODONTIA' },
            { keys: ['incisivo','canino','central','lateral','anterior'], label: 'REG. ANTERIOR' },
            { keys: ['molar','pré-molar','premolar','posterior'], label: 'REG. POSTERIOR' },
        ];
        for (const c of ctx) {
            if (c.keys.some(k => lower.includes(k))) return { label: c.label, number: null };
        }
        return { label: 'ACHADO', number: null };
    }

    function updateFindingCard(text, sevColor, sevLevel) {
        const card   = document.getElementById('finding-card');
        const badge  = document.getElementById('card-severity-badge');
        const sumEl  = document.getElementById('card-summary');
        const fullEl = document.getElementById('card-full');
        const btnExp = document.getElementById('btn-expand');
        const tags   = document.getElementById('card-impact-tags');
        if (!text || text.length < 2) { card.style.display = 'none'; return; }

        // Bordas coloridas com a cor de severidade
        card.style.borderLeftColor   = sevColor;
        card.style.borderBottomColor = sevColor;

        // Badge de severidade — usa SEV_LABELS (mesmos labels do resto do app)
        const sm = SEV_LABELS[sevLevel] || SEV_LABELS.complement;
        badge.innerHTML = `<span class="severity-badge sev-${sevLevel}">${sm.badge}</span>`;

        // Resumo + full
        cardExpanded = false;
        const { summary, full } = makeSummary(text);
        sumEl.textContent = summary;
        if (full) {
            fullEl.textContent = full; fullEl.classList.remove('open');
            btnExp.textContent = 'Ver detalhes ↓'; btnExp.style.display = 'inline-block';
        } else {
            fullEl.textContent = ''; fullEl.classList.remove('open'); btnExp.style.display = 'none';
        }

        // Conduta + Exame
        const clinicalRow   = document.getElementById('card-clinical-row');
        const impacts       = getImpacts(text);
        const recommends    = getRecommends(text);
        tags.innerHTML      = impacts.map(t => `<span class="impact-tag">${t}</span>`).join('');
        document.getElementById('card-recommend-tags').innerHTML =
            recommends.map(t => `<span class="recommend-tag">${t}</span>`).join('');
        if (impacts.length || recommends.length) clinicalRow.classList.add('visible');
        else clinicalRow.classList.remove('visible');

        card.style.display = 'block';
    }

    // ---- POSICIONAMENTO DO CARD ----
    // Estratégia: posiciona o card abaixo da anotação se tiver espaço, senão acima.
    // No mobile portrait o zoom já empurra a anotação para 65% da altura,
    // então o card aparece na parte superior com boa correlação visual.
    function positionCard(anno) {
        const card = document.getElementById('finding-card');
        if (!card || card.style.display === 'none') return;
        const cn = getAnnoCenterNorm(anno);
        if (!cn) return;

        const vW = viewer.offsetWidth;
        const vH = viewer.offsetHeight;
        const mobile = isMobilePortrait();

        // Em mobile o card já tem width = 82vw via CSS; apenas define top/left
        const cardW = card.offsetWidth  || (mobile ? vW * 0.82 : 340);
        const cardH = card.offsetHeight || (mobile ? 140 : 180);
        const gap   = mobile ? 40 : 28;
        const pad   = mobile ? 8  : 12;

        // Centro da anotação em coordenadas do viewer
        const cy = cn.y * img.naturalHeight * scale + panY;
        const cx = cn.x * img.naturalWidth  * scale + panX;

        // Vertical: abaixo se couber, senão acima
        let top;
        if (cy + gap + cardH + pad < vH) {
            top = cy + gap;
        } else {
            top = cy - gap - cardH;
        }
        top = Math.max(pad, Math.min(top, vH - cardH - pad));

        // Horizontal: centrado na anotação, travado nas bordas
        let left = cx - cardW / 2;
        left = Math.max(pad, Math.min(left, vW - cardW - pad));

        card.style.left   = left + 'px';
        card.style.top    = top  + 'px';
        card.style.bottom = 'auto';
        card.style.right  = 'auto';
    }

    window.closeCard = function() {
        const card = document.getElementById('finding-card');
        card.style.display = 'none';
        card.style.top = ''; card.style.left = ''; card.style.bottom = ''; card.style.right = '';
        stopPulse();
    };

    function resetView() {
        activeAnnotationId = null; showAll = false; activeFilter = null;
        closeCard();
        document.querySelectorAll('.finding-item').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.sev-count').forEach(el => el.classList.remove('active-filter'));
        stopPulse(); fitImage(); render();
    }

    // ---- DRAW ----
    function buildSmoothPath(ctx, pts, closed) {
        if (pts.length < 2) return;
        ctx.beginPath();
        if (pts.length === 2) { ctx.moveTo(pts[0].x, pts[0].y); ctx.lineTo(pts[1].x, pts[1].y); return; }
        const n = pts.length; const tension = 0.35;
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 0; i < (closed ? n : n - 1); i++) {
            const p0 = pts[(i-1+n)%n], p1 = pts[i], p2 = pts[(i+1)%n], p3 = pts[(i+2)%n];
            ctx.bezierCurveTo(
                p1.x + (p2.x-p0.x)*tension, p1.y + (p2.y-p0.y)*tension,
                p2.x - (p3.x-p1.x)*tension, p2.y - (p3.y-p1.y)*tension,
                p2.x, p2.y
            );
        }
        if (closed) ctx.closePath();
    }

    function hexAlpha(hex, alpha) {
        const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        return `rgba(${r},${g},${b},${alpha})`;
    }

    function drawAnnotation(anno, isActive) {
        const el    = document.querySelector(`p[data-annotation-id="${anno.id}"]`);
        const color = (el && el.dataset.severityColor) ? el.dataset.severityColor : (anno.color || '#00FFFF');
        const baseWidth = (anno.thickness || 4) * drawingScale;
        const isZoom = isActive === true;
        const strokeW = isZoom ? baseWidth * 0.8 : baseWidth * 1.4;
        const strokeAlpha = isZoom ? 1.0 : 0.90;
        ctx.save(); ctx.lineJoin = 'round'; ctx.lineCap = 'round';

        if (anno.points && anno.fillColor) {
            const pts = anno.points.map(p => ({ x: p.x*img.naturalWidth, y: p.y*img.naturalHeight }));
            const cx = pts.reduce((s,p)=>s+p.x,0)/pts.length;
            const cy = pts.reduce((s,p)=>s+p.y,0)/pts.length;
            const maxR = Math.max(...pts.map(p=>Math.hypot(p.x-cx,p.y-cy)))*1.1;
            if (isZoom) {
                const gp = (Math.sin(pulsePhase*1.2)+1)/2;
                ctx.save(); ctx.filter=`blur(${5*drawingScale}px)`;
                buildSmoothPath(ctx,pts,true);
                ctx.strokeStyle=hexAlpha(color,0.25+gp*0.15); ctx.lineWidth=strokeW*4; ctx.stroke();
                ctx.filter='none'; ctx.restore();
            }
            buildSmoothPath(ctx,pts,true);
            const grad = ctx.createRadialGradient(cx,cy,0,cx,cy,maxR);
            const fo = isZoom ? 0.06 : 0.11;
            grad.addColorStop(0,hexAlpha(color,fo*1.5)); grad.addColorStop(0.6,hexAlpha(color,fo)); grad.addColorStop(1,hexAlpha(color,0));
            ctx.fillStyle=grad; ctx.fill();
            if (!isZoom) { buildSmoothPath(ctx,pts,true); ctx.strokeStyle='rgba(0,0,0,0.45)'; ctx.lineWidth=strokeW+2.5*drawingScale; ctx.stroke(); }
            buildSmoothPath(ctx,pts,true); ctx.strokeStyle=hexAlpha(color,strokeAlpha); ctx.lineWidth=strokeW; ctx.stroke();
            if (isZoom) {
                const dL=8*drawingScale, dG=12*drawingScale, dO=(pulsePhase*12)%(dL+dG);
                buildSmoothPath(ctx,pts,true); ctx.setLineDash([dL,dG]); ctx.lineDashOffset=-dO;
                ctx.strokeStyle='rgba(255,255,255,0.45)'; ctx.lineWidth=strokeW*0.7; ctx.stroke();
                ctx.setLineDash([]); ctx.lineDashOffset=0;
            }
        } else if (anno.points) {
            const pts = anno.points.map(p => ({ x: p.x*img.naturalWidth, y: p.y*img.naturalHeight }));
            if (isZoom) {
                const gp=(Math.sin(pulsePhase*1.2)+1)/2;
                ctx.save(); ctx.filter=`blur(${4*drawingScale}px)`;
                buildSmoothPath(ctx,pts,false); ctx.strokeStyle=hexAlpha(color,0.28+gp*0.14); ctx.lineWidth=strokeW*3.5; ctx.stroke();
                ctx.filter='none'; ctx.restore();
            }
            if (!isZoom) { buildSmoothPath(ctx,pts,false); ctx.strokeStyle='rgba(0,0,0,0.45)'; ctx.lineWidth=strokeW+2*drawingScale; ctx.stroke(); }
            buildSmoothPath(ctx,pts,false); ctx.strokeStyle=hexAlpha(color,strokeAlpha); ctx.lineWidth=strokeW; ctx.stroke();
        } else if (anno.type && anno.size) {
            const x=anno.x*img.naturalWidth, y=anno.y*img.naturalHeight, s=anno.size*img.naturalWidth;
            let hL=s*0.3, sW=s*0.1;
            ctx.translate(x,y); ctx.rotate(anno.rotation); ctx.scale(anno.scale,anno.scale);
            ctx.beginPath();
            if (anno.type==='normal') {
                ctx.moveTo(-s/2+hL,0); ctx.lineTo(s/2,0); ctx.lineTo(s/2-hL,-hL/2); ctx.moveTo(s/2,0); ctx.lineTo(s/2-hL,hL/2);
                ctx.fillStyle=color; ctx.fill(); ctx.strokeStyle=color; ctx.lineWidth=sW; ctx.lineCap='round'; ctx.stroke();
            } else if (anno.type==='outline') {
                hL=s*0.4; sW=s*0.15;
                ctx.moveTo(-s/2,-sW/2); ctx.lineTo(-s/2,sW/2); ctx.lineTo(s/2-hL,sW/2); ctx.lineTo(s/2-hL,hL/2);
                ctx.lineTo(s/2,0); ctx.lineTo(s/2-hL,-hL/2); ctx.lineTo(s/2-hL,-sW/2); ctx.closePath();
                ctx.strokeStyle=color; ctx.lineWidth=isActive?4*drawingScale:2*drawingScale; ctx.lineJoin='miter'; ctx.stroke();
            } else if (anno.type==='complex') {
                hL=s*0.4; sW=s*0.2;
                ctx.moveTo(-s/2,-sW/2); ctx.lineTo(-s/2,sW/2); ctx.lineTo(s/2-hL,sW/2); ctx.lineTo(s/2-hL,hL/1.5);
                ctx.lineTo(s/2,0); ctx.lineTo(s/2-hL,-hL/1.5); ctx.lineTo(s/2-hL,-sW/2); ctx.closePath();
                ctx.fillStyle=color; ctx.fill(); ctx.strokeStyle=color; ctx.lineWidth=1*drawingScale; ctx.lineJoin='miter'; ctx.stroke();
            }
        } else if (anno.text && anno.x !== undefined) {
            const x=anno.x*img.naturalWidth, y=anno.y*img.naturalHeight;
            const fs=(parseInt(anno.font)||24)*drawingScale;
            ctx.font=`bold ${fs}px Arial`; ctx.textAlign='center';
            ctx.lineWidth=5*drawingScale; ctx.strokeStyle='rgba(0,0,0,0.7)'; ctx.strokeText(anno.text,x,y);
            ctx.fillStyle=color; ctx.fillText(anno.text,x,y);
        } else if (anno.start && anno.end) {
            const p1={x:anno.start.x*img.naturalWidth,y:anno.start.y*img.naturalHeight};
            const p2={x:anno.end.x*img.naturalWidth,  y:anno.end.y*img.naturalHeight};
            ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y);
            ctx.strokeStyle=color; ctx.lineWidth=baseWidth; ctx.stroke();
            if (anno.text) {
                const fs=20*drawingScale; ctx.font=`bold ${fs}px Arial`; ctx.textAlign='center';
                const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2;
                ctx.lineWidth=4*drawingScale; ctx.strokeStyle='rgba(0,0,0,0.7)'; ctx.strokeText(anno.text,mx,my-10);
                ctx.fillStyle=color; ctx.fillText(anno.text,mx,my-10);
            }
        }
        ctx.restore();
    }

    // ---- ZOOM NATURAL ----
    function zoomNatural(anno) {
        let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
        if (anno.points) {
            anno.points.forEach(p=>{minX=Math.min(minX,p.x);maxX=Math.max(maxX,p.x);minY=Math.min(minY,p.y);maxY=Math.max(maxY,p.y);});
        } else if (anno.start&&anno.end) {
            minX=Math.min(anno.start.x,anno.end.x);maxX=Math.max(anno.start.x,anno.end.x);
            minY=Math.min(anno.start.y,anno.end.y);maxY=Math.max(anno.start.y,anno.end.y);
        } else if (anno.x!==undefined) {
            let sz=anno.size?(anno.size*(anno.scale||1)):0.08;
            minX=anno.x-sz/2;maxX=anno.x+sz/2;minY=anno.y-sz/2;maxY=anno.y+sz/2;
        }
        if (maxX-minX<0.1){minX-=0.1;maxX+=0.1;}
        if (maxY-minY<0.1){minY-=0.1;maxY+=0.1;}
        const regW=(maxX-minX)*img.naturalWidth;
        const regH=(maxY-minY)*img.naturalHeight;
        const landscape=isLandscapeMobile();
        const mobile=isMobilePortrait();
        const padX=canvas.width *(landscape?0.18:0.30);
        const padY=canvas.height*(landscape?0.18:0.30);
        let tScale=Math.min((canvas.width-padX)/regW,(canvas.height-padY)/regH);
        tScale=Math.min(tScale,3.5);
        tScale=Math.max(tScale,Math.min(canvas.width/img.naturalWidth,canvas.height/img.naturalHeight));
        const cX=((minX+maxX)/2)*img.naturalWidth;
        const cY=((minY+maxY)/2)*img.naturalHeight;
        scale=tScale;
        panX=canvas.width/2 - cX*scale;
        // Mobile portrait: empurra anotação para 65% da altura → card aparece acima com espaço
        const ratioY = landscape ? 0.47 : mobile ? 0.65 : 0.50;
        panY=canvas.height*ratioY - cY*scale;
    }

    // ---- CLICK NA LISTA ----
    listEl.addEventListener('click', e => {
        const item = e.target.closest('.finding-item');
        if (!item) return;
        document.querySelectorAll('.finding-item').forEach(el => el.classList.remove('active'));
        const id = item.dataset.annotationId;
        if (activeAnnotationId === id) {
            resetView();
        } else {
            activeAnnotationId = id; showAll = false;
            item.classList.add('active');
            const anno = DATA.annotations.find(a => a.id === id);
            if (anno) {
                const sevColor = item.dataset.severityColor || '#00ffff';
                const sevLevel = item.dataset.severity || 'complement';
                const bodyEl  = item.querySelector('.item-body');
                const cardText = (bodyEl ? bodyEl.innerText : item.innerText).replace(/\n/g,' ').trim();
                updateFindingCard(cardText, sevColor, sevLevel);
                zoomNatural(anno);
                // Posiciona via JS apenas no portrait; landscape e desktop ficam fixos via CSS
                if (isMobilePortrait()) {
                    requestAnimationFrame(() => positionCard(anno));
                }
                startPulse();
            }
        }
        render();
    });

    // ---- MOUSE / TOUCH ----
    viewer.addEventListener('mousedown', e=>{isDragging=true;startX=e.clientX-panX;startY=e.clientY-panY;startClickX=e.clientX;startClickY=e.clientY;});
    viewer.addEventListener('mousemove', e=>{if(isDragging){panX=e.clientX-startX;panY=e.clientY-startY;render();}});
    viewer.addEventListener('mouseup', ()=>isDragging=false);

    viewer.addEventListener('click', e=>{
        if(Math.abs(e.clientX-startClickX)>5||Math.abs(e.clientY-startClickY)>5)return;
        if(e.target.closest('#finding-card')||e.target.closest('#app-header'))return;

        // Modo spotlight: qualquer clique no canvas avança para o próximo achado
        if (activeFilter) {
            const filteredAnnos = DATA.annotations.filter(anno => {
                const li = document.querySelector(`.finding-item[data-annotation-id="${anno.id}"]`);
                return li && li.dataset.severity === activeFilter;
            });
            if (filteredAnnos.length > 1) {
                spotlightIndex = (spotlightIndex + 1) % filteredAnnos.length;
                render();
                return;
            }
        }

        const rect=canvas.getBoundingClientRect();
        const relX=((e.clientX-rect.left-panX)/scale)/img.naturalWidth;
        const relY=((e.clientY-rect.top-panY)/scale)/img.naturalHeight;
        let clickedAnno=null,minDist=Infinity;
        DATA.annotations.forEach(anno=>{
            let dist=Infinity;
            if(anno.points){anno.points.forEach(p=>{const d=Math.hypot(p.x-relX,p.y-relY);if(d<dist)dist=d;});}
            else if(anno.start&&anno.end){const mx=(anno.start.x+anno.end.x)/2,my=(anno.start.y+anno.end.y)/2;dist=Math.hypot(mx-relX,my-relY);}
            else if(anno.x!==undefined){dist=Math.hypot(anno.x-relX,anno.y-relY);}
            if(dist<0.05&&dist<minDist){minDist=dist;clickedAnno=anno;}
        });
        if(clickedAnno){
            const li=document.querySelector(`.finding-item[data-annotation-id="${clickedAnno.id}"]`);
            if(li){li.click();li.scrollIntoView({behavior:'smooth',block:'nearest'});}
        } else { resetView(); }
    });

    viewer.addEventListener('wheel',e=>{
        e.preventDefault();const d=e.deltaY>0?0.9:1.1;
        const mx=e.clientX-canvas.getBoundingClientRect().left;
        const my=e.clientY-canvas.getBoundingClientRect().top;
        panX=mx-(mx-panX)*d;panY=my-(my-panY)*d;scale*=d;render();
    });

    let idist=0,iscale=1;
    viewer.addEventListener('touchstart',e=>{
        if(e.touches.length===2){idist=Math.hypot(e.touches[0].pageX-e.touches[1].pageX,e.touches[0].pageY-e.touches[1].pageY);iscale=scale;}
        else if(e.touches.length===1){isDragging=true;startX=e.touches[0].clientX-panX;startY=e.touches[0].clientY-panY;startClickX=e.touches[0].clientX;startClickY=e.touches[0].clientY;}
    },{passive:false});
    viewer.addEventListener('touchmove',e=>{
        e.preventDefault();
        if(e.touches.length===2){
            const dist=Math.hypot(e.touches[0].pageX-e.touches[1].pageX,e.touches[0].pageY-e.touches[1].pageY);
            const delta=dist/idist;const cx=viewer.offsetWidth/2,cy=viewer.offsetHeight/2;
            const ns=iscale*delta;panX=cx-(cx-panX)*(ns/scale);panY=cy-(cy-panY)*(ns/scale);scale=ns;render();
        } else if(isDragging&&e.touches.length===1){panX=e.touches[0].clientX-startX;panY=e.touches[0].clientY-startY;render();}
    },{passive:false});
    viewer.addEventListener('touchend',()=>isDragging=false);

    // ---- SMOOTH ZOOM ----
    function smoothZoomTo(targetScale, targetPanX, targetPanY, duration) {
        if (animFrame) cancelAnimationFrame(animFrame);
        const startScale=scale, startPanX=panX, startPanY=panY, startTime=performance.now();
        function ease(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}
        function step(now){
            const t=Math.min((now-startTime)/duration,1), ev=ease(t);
            scale=startScale+(targetScale-startScale)*ev;
            panX =startPanX +(targetPanX -startPanX )*ev;
            panY =startPanY +(targetPanY -startPanY )*ev;
            render();
            if(t<1) animFrame=requestAnimationFrame(step); else animFrame=null;
        }
        animFrame=requestAnimationFrame(step);
    }

    function calcZoomForAnnos(annos) {
        let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
        annos.forEach(anno=>{
            if(anno.points){anno.points.forEach(p=>{minX=Math.min(minX,p.x);maxX=Math.max(maxX,p.x);minY=Math.min(minY,p.y);maxY=Math.max(maxY,p.y);});}
            else if(anno.start&&anno.end){minX=Math.min(minX,anno.start.x,anno.end.x);maxX=Math.max(maxX,anno.start.x,anno.end.x);minY=Math.min(minY,anno.start.y,anno.end.y);maxY=Math.max(maxY,anno.start.y,anno.end.y);}
            else if(anno.x!==undefined){const s=anno.size?(anno.size*(anno.scale||1)):0.08;minX=Math.min(minX,anno.x-s/2);maxX=Math.max(maxX,anno.x+s/2);minY=Math.min(minY,anno.y-s/2);maxY=Math.max(maxY,anno.y+s/2);}
        });
        if(!isFinite(minX))return null;
        const pad=0.08;
        minX=Math.max(0,minX-pad);maxX=Math.min(1,maxX+pad);minY=Math.max(0,minY-pad);maxY=Math.min(1,maxY+pad);
        const regW=(maxX-minX)*img.naturalWidth, regH=(maxY-minY)*img.naturalHeight;
        let ts=Math.min((canvas.width-120)/regW,(canvas.height-120)/regH);
        ts=Math.max(ts,Math.min(canvas.width/img.naturalWidth,canvas.height/img.naturalHeight));
        const cX=((minX+maxX)/2)*img.naturalWidth, cY=((minY+maxY)/2)*img.naturalHeight;
        return {scale:ts, panX:canvas.width/2-cX*ts, panY:canvas.height/2-cY*ts};
    }

    function toggleAllAction(){
        activeFilter=null; showAll=!showAll; activeAnnotationId=null; closeCard();
        document.querySelectorAll('.finding-item').forEach(el=>el.classList.remove('active'));
        document.querySelectorAll('.sev-count').forEach(el=>el.classList.remove('active-filter'));
        stopPulse();
        const ts=calcZoomForAnnos(DATA.annotations);
        if(ts&&showAll) smoothZoomTo(ts.scale,ts.panX,ts.panY,420);
        else smoothZoomTo(Math.min(canvas.width/img.naturalWidth,canvas.height/img.naturalHeight),(canvas.width-img.naturalWidth*Math.min(canvas.width/img.naturalWidth,canvas.height/img.naturalHeight))/2,(canvas.height-img.naturalHeight*Math.min(canvas.width/img.naturalWidth,canvas.height/img.naturalHeight))/2,380);
        render();
    }

    function activateSeverityFilter(sevLevel) {
        if(activeFilter===sevLevel){
            activeFilter=null; showAll=false;
            document.querySelectorAll('.sev-count').forEach(el=>el.classList.remove('active-filter'));
            document.querySelectorAll('.finding-item').forEach(el=>el.classList.remove('active'));
            activeAnnotationId=null; closeCard(); stopPulse();
            smoothZoomTo(Math.min(canvas.width/img.naturalWidth,canvas.height/img.naturalHeight),(canvas.width-img.naturalWidth*Math.min(canvas.width/img.naturalWidth,canvas.height/img.naturalHeight))/2,(canvas.height-img.naturalHeight*Math.min(canvas.width/img.naturalWidth,canvas.height/img.naturalHeight))/2,380);
            render(); return;
        }
        activeFilter=sevLevel; showAll=false; activeAnnotationId=null; closeCard(); stopPulse();
        spotlightIndex = 0;
        document.querySelectorAll('.finding-item').forEach(el=>el.classList.remove('active'));
        document.querySelectorAll('.sev-count').forEach(el=>el.classList.remove('active-filter'));
        const badge=document.querySelector(`.sev-count.${sevLevel}`);
        if(badge)badge.classList.add('active-filter');
        const filteredAnnos=DATA.annotations.filter(anno=>{
            const li=document.querySelector(`.finding-item[data-annotation-id="${anno.id}"]`);
            return li&&li.dataset.severity===sevLevel;
        });
        if(filteredAnnos.length>0){
            if(filteredAnnos.length===1){
                const savedS=scale,savedPX=panX,savedPY=panY;
                fitImage(); const fS=scale,fPX=panX,fPY=panY;
                zoomNatural(filteredAnnos[0]);
                const tS=scale,tPX=panX,tPY=panY;
                scale=fS;panX=fPX;panY=fPY;
                smoothZoomTo(tS,tPX,tPY,480);
            } else {
                const ts=calcZoomForAnnos(filteredAnnos);
                if(ts)smoothZoomTo(ts.scale,ts.panX,ts.panY,450);
            }
        }
        startPulse(); render();
    }

    document.getElementById('btn-toggle-all').addEventListener('click',toggleAllAction);
    document.getElementById('btn-toggle-all-header').addEventListener('click',toggleAllAction);
    document.getElementById('btn-reset-zoom').addEventListener('click',resetView);

    function buildSeveritySummary(counts, total) {
        const el=document.getElementById('severity-summary');
        const parts=[];
        const defs=[
            {key:'critical',  cls:'critical'},
            {key:'semi',      cls:'semi'},
            {key:'attention', cls:'attention'},
            {key:'complement',cls:'complement'},
        ];
        defs.forEach(d=>{
            if(!counts[d.key])return;
            const n = counts[d.key];
            const lbl = SEV_LABELS[d.key].short;
            parts.push(`<span class="sev-count ${d.cls}" data-filter="${d.key}"><span class="sev-dot ${d.cls}"></span><span>${n} · ${lbl}</span></span>`);
        });
        el.innerHTML=`<span style="font-size:11px;color:#555;margin-right:4px;">${total} achados</span>`+parts.join('');
        el.querySelectorAll('.sev-count[data-filter]').forEach(badge=>{
            badge.addEventListener('click',()=>activateSeverityFilter(badge.dataset.filter));
        });
    }
} // fim do bloco else DATA
</script>
</body>
