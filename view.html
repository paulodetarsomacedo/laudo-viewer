<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laudo Interativo</title>
    <style>
        :root { --bg-color: #000; --panel-bg: #1a1a1a; --text-color: #eee; --accent: #007bff; }
        body { margin: 0; padding: 0; background: var(--bg-color); color: var(--text-color); font-family: sans-serif; height: 100vh; display: flex; overflow: hidden; }

        /* Viewer (Imagem) */
        #viewer-area { flex: 1; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; background: #000; }
        canvas { display: block; }

        /* Sidebar (Lista) */
        #sidebar { 
            width: 320px; background: var(--panel-bg); display: flex; flex-direction: column; 
            border-left: 1px solid #333; z-index: 10; box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }

        #header { padding: 15px; background: #222; text-align: center; border-bottom: 1px solid #333; }
        #header h2 { margin: 0; color: var(--accent); font-size: 18px; }

        #findings-list { flex: 1; overflow-y: auto; padding: 15px; }
        
        .finding-item { 
            background: #2a2a2a; margin-bottom: 12px; padding: 12px; border-radius: 8px; 
            cursor: pointer; border-left: 5px solid transparent; transition: all 0.2s;
            font-size: 14px; line-height: 1.4; color: #ccc;
        }
        .finding-item:hover { background: #333; color: #fff; }
        .finding-item.active { background: #333; color: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.5); }

        #signature-area { padding: 20px; text-align: center; border-top: 1px solid #333; background: #222; }
        #signature-img { max-width: 150px; filter: invert(1); opacity: 0.9; } /* Inverte cor para fundo escuro */

        /* --- LAYOUT MOBILE (CARROSSEL INFERIOR) --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            
            #viewer-area { height: 60%; width: 100%; order: 1; }
            
            #sidebar { 
                height: 40%; width: 100%; order: 2; border-left: none; border-top: 1px solid #333;
                display: flex; flex-direction: column;
            }

            #header, #signature-area { display: none; } /* Oculta header e assinatura no mobile para dar espaço */

            #findings-list { 
                display: flex; flex-direction: row; /* Horizontal */
                overflow-x: auto; overflow-y: hidden; /* Scroll lateral */
                padding: 10px; gap: 10px; white-space: normal;
                align-items: center;
            }

            .finding-item {
                flex: 0 0 85%; /* Item ocupa 85% da largura da tela */
                width: 85%; 
                margin-bottom: 0; height: auto;
                display: flex; align-items: center;
                font-size: 13px;
                border-bottom: 4px solid transparent; /* Borda colorida embaixo no mobile */
                border-left: none;
            }
        }
    </style>
</head>
<body>

<div id="viewer-area">
    <canvas id="canvas"></canvas>
</div>

<div id="sidebar">
    <div id="header"><h2>Achados Radiográficos</h2></div>
    <div id="findings-list">Carregando...</div>
    <div id="signature-area">
        <img id="signature-img" src="" alt="Assinatura" style="display:none;">
    </div>
</div>

<script>
    let DATA = null;
    try {
        const hash = window.location.hash.substring(1);
        if (hash) {
            const json = decodeURIComponent(escape(atob(hash)));
            DATA = JSON.parse(json);
        }
    } catch(e) { console.error(e); }

    if (!DATA) {
        document.getElementById('findings-list').innerHTML = "<p style='text-align:center; color:red; padding:20px;'>Erro ao carregar dados.</p>";
    } else {
        // 1. Renderiza HTML da Lista
        const listEl = document.getElementById('findings-list');
        listEl.innerHTML = DATA.findingsHtml || "<p style='padding:10px;'>Nenhum achado interativo.</p>";

        // 2. Renderiza Assinatura (se houver Base64)
        if (DATA.signature) {
            const sigImg = document.getElementById('signature-img');
            sigImg.src = DATA.signature;
            sigImg.style.display = 'inline-block';
        }

        // 3. Aplica cores às bordas dos itens da lista
        const items = listEl.querySelectorAll('p[data-highlight-color]');
        items.forEach(p => {
            p.classList.add('finding-item');
            const color = p.dataset.highlightColor;
            // No Desktop borda na esquerda, no Mobile borda embaixo (via CSS media query + inline style)
            p.style.borderLeftColor = color; 
            p.style.borderBottomColor = color;
        });

        // --- LÓGICA DO CANVAS ---
        const viewer = document.getElementById('viewer-area');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let img = new Image();
        let scale = 1, panX = 0, panY = 0;
        let isDragging = false, startX, startY;
        let activeAnnotationId = null; // ID do item ativo (destacado)
        
        // Fator de escala para desenhos ficarem proporcionais
        // Baseado em uma largura de referência de 1000px.
        // Se a imagem for 2000px, traços serão 2x mais grossos.
        let drawingScale = 1; 

        img.onload = () => {
            resize();
            // Define o fator de escala baseado na resolução real da imagem
            drawingScale = img.naturalWidth / 1000; 
            fitImage();
            render();
        };
        img.src = DATA.image;

        window.addEventListener('resize', () => { resize(); fitImage(); render(); });

        function resize() {
            canvas.width = viewer.clientWidth;
            canvas.height = viewer.clientHeight;
        }

        function fitImage() {
            const rW = canvas.width / img.naturalWidth;
            const rH = canvas.height / img.naturalHeight;
            scale = Math.min(rW, rH);
            panX = (canvas.width - img.naturalWidth * scale) / 2;
            panY = (canvas.height - img.naturalHeight * scale) / 2;
        }

        // --- RENDERIZAÇÃO ---
        function render() {
            // Limpa
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Aplica Pan/Zoom
            ctx.setTransform(scale, 0, 0, scale, panX, panY);
            ctx.drawImage(img, 0, 0);

            // Desenha Anotação Ativa
            if (activeAnnotationId) {
                const anno = DATA.annotations.find(a => a.id === activeAnnotationId);
                if (anno) drawAnnotation(anno);
            }
        }

        function drawAnnotation(anno) {
            // Recupera a cor original enviada pelo script.js
            // Tenta pegar do elemento HTML (prioridade) ou do objeto anno
            const el = document.querySelector(`p[data-annotation-id="${anno.id}"]`);
            const color = el ? el.dataset.highlightColor : (anno.color || '#00FFFF');

            ctx.save();
            ctx.strokeStyle = color;
            ctx.fillStyle = color;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            // Efeito Neon
            ctx.shadowColor = color;
            ctx.shadowBlur = 15 * drawingScale; 

            // Espessura Proporcional
            const baseThickness = anno.thickness || 3;
            ctx.lineWidth = baseThickness * drawingScale * 1.5; // 1.5x para destaque

            // Lógica de desenho baseada no tipo
            if (anno.points && anno.fillColor) { // Polígono
                ctx.beginPath();
                anno.points.forEach((p, i) => {
                    const x = p.x * img.naturalWidth;
                    const y = p.y * img.naturalHeight;
                    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                });
                ctx.closePath();
                ctx.stroke();
                ctx.globalAlpha = 0.3; ctx.fill(); 
            } else if (anno.start && anno.end) { // Medida
                const x1 = anno.start.x * img.naturalWidth, y1 = anno.start.y * img.naturalHeight;
                const x2 = anno.end.x * img.naturalWidth, y2 = anno.end.y * img.naturalHeight;
                ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
                
                // Texto Proporcional
                const fontSize = (24 * drawingScale);
                ctx.font = `bold ${fontSize}px Arial`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
                ctx.shadowBlur = 0; // Texto nítido
                ctx.lineWidth = 4 * drawingScale; ctx.strokeStyle = 'black'; // Contorno preto
                const mx = (x1+x2)/2, my = (y1+y2)/2;
                ctx.strokeText(anno.text, mx, my - 10);
                ctx.fillText(anno.text, mx, my - 10);

            } else if (anno.type && anno.size) { // Seta
                const x = anno.x * img.naturalWidth, y = anno.y * img.naturalHeight;
                const size = anno.size * img.naturalWidth;
                ctx.translate(x, y); ctx.rotate(anno.rotation); ctx.scale(anno.scale, anno.scale);
                ctx.beginPath(); 
                ctx.moveTo(-size/2, 0); ctx.lineTo(size/2, 0); 
                ctx.lineTo(size/2 - size*0.3, -size*0.2); 
                ctx.moveTo(size/2, 0); ctx.lineTo(size/2 - size*0.3, size*0.2); 
                ctx.stroke();

            } else if (anno.text) { // Texto
                const x = anno.x * img.naturalWidth, y = anno.y * img.naturalHeight;
                const fs = (parseInt(anno.font)||24) * drawingScale;
                ctx.font = `bold ${fs}px Arial`;
                ctx.shadowBlur = 0; ctx.lineWidth = 4 * drawingScale; ctx.strokeStyle = 'black';
                ctx.strokeText(anno.text, x, y);
                ctx.fillText(anno.text, x, y);

            } else if (anno.points) { // Desenho Livre
                ctx.beginPath();
                anno.points.forEach((p, i) => {
                    const x = p.x * img.naturalWidth, y = p.y * img.naturalHeight;
                    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                });
                ctx.stroke();
            }

            ctx.restore();
        }

        // --- INTERAÇÃO (CLIQUE NA LISTA) ---
        // Lógica de Toggle: Clica -> Ativa, Clica de novo -> Desativa
        listEl.addEventListener('click', (e) => {
            const item = e.target.closest('.finding-item');
            if (!item) return;

            // Remove classe 'active' de todos
            document.querySelectorAll('.finding-item').forEach(el => el.classList.remove('active'));

            const id = item.dataset.annotationId;
            
            if (activeAnnotationId === id) {
                // Se clicou no que já estava ativo: DESATIVA
                activeAnnotationId = null;
                // Volta ao zoom padrão
                fitImage();
            } else {
                // Se clicou em um novo: ATIVA
                activeAnnotationId = id;
                item.classList.add('active');
                
                // Centraliza e dá Zoom na anotação
                const anno = DATA.annotations.find(a => a.id === id);
                if (anno) zoomToAnnotation(anno);
            }
            render();
        });

        function zoomToAnnotation(anno) {
            // Calcula o centro da anotação
            let cx = 0.5, cy = 0.5;
            if (anno.start) { cx = (anno.start.x + anno.end.x)/2; cy = (anno.start.y + anno.end.y)/2; }
            else if (anno.points) { cx = anno.points[0].x; cy = anno.points[0].y; }
            else { cx = anno.x; cy = anno.y; }

            // Converte para pixels reais
            const imgX = cx * img.naturalWidth;
            const imgY = cy * img.naturalHeight;

            // Define um zoom (ex: 2.5x)
            scale = Math.min(canvas.width / img.naturalWidth, canvas.height / img.naturalHeight) * 2.5;
            
            // Centraliza
            panX = (canvas.width / 2) - (imgX * scale);
            panY = (canvas.height / 2) - (imgY * scale);
        }

        // --- INTERAÇÃO (PAN/ZOOM MOUSE) ---
        viewer.addEventListener('mousedown', e => { isDragging = true; startX = e.clientX - panX; startY = e.clientY - panY; });
        window.addEventListener('mousemove', e => { if(isDragging) { panX = e.clientX - startX; panY = e.clientY - startY; render(); } });
        window.addEventListener('mouseup', () => isDragging = false);
        viewer.addEventListener('wheel', e => {
            e.preventDefault();
            const d = e.deltaY > 0 ? 0.9 : 1.1;
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            const ns = scale * d;
            panX = mx - (mx - panX) * d;
            panY = my - (my - panY) * d;
            scale = ns;
            render();
        });
        
        // Touch (Mobile)
        let initDist = 0, initScale = 1;
        viewer.addEventListener('touchstart', e => { 
            if (e.touches.length === 2) { 
                initDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY); 
                initScale = scale; 
            } else if (e.touches.length === 1) { 
                isDragging = true; startX = e.touches[0].clientX - panX; startY = e.touches[0].clientY - panY; 
            } 
        }, {passive: false});

        viewer.addEventListener('touchmove', e => { 
            e.preventDefault(); 
            if (e.touches.length === 2) { 
                const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY); 
                const delta = dist / initDist; 
                const cx = viewer.offsetWidth / 2, cy = viewer.offsetHeight / 2; 
                const ns = initScale * delta; 
                panX = cx - (cx - panX) * (ns / scale); 
                panY = cy - (cy - panY) * (ns / scale); 
                scale = ns; 
                render(); 
            } else if (isDragging && e.touches.length === 1) { 
                panX = e.touches[0].clientX - startX; 
                panY = e.touches[0].clientY - startY; 
                render(); 
            } 
        }, {passive: false});
        viewer.addEventListener('touchend', () => isDragging = false);
    }
</script>
</body>
</html>
